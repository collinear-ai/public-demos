<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collinear AI — Long-Horizon Tasks</title>
<style>
:root {
  --orange: #F5A623; --orange-light: #FFF8EE; --orange-dark: #D4880E;
  --green: #34C759; --green-bg: #E8F8EE; --green-dark: #248A3D;
  --red: #FF3B30; --red-bg: #FFF0EF;
  --blue: #007AFF; --blue-bg: #EEF4FF;
  --purple: #AF52DE; --purple-bg: #F5EEFA;
  --teal: #5AC8FA; --teal-bg: #E8F8FD;
  --amber: #FF9500; --amber-bg: #FFF5E6;
  --indigo: #5856D6; --indigo-bg: #EEEEFB;
  --g50: #FAFAFA; --g100: #F5F5F5; --g150: #EFEFEF; --g200: #E5E5E5;
  --g300: #D4D4D4; --g400: #A3A3A3; --g500: #737373; --g600: #525252;
  --g700: #404040; --g800: #262626; --g900: #171717;
  --sidebar-w: 220px; --radius: 8px; --radius-lg: 12px;
}
html.dark {
  --g50: #1a1a1a; --g100: #222; --g150: #2a2a2a; --g200: #333;
  --g300: #444; --g400: #666; --g500: #999; --g600: #bbb;
  --g700: #ccc; --g800: #ddd; --g900: #f0f0f0;
  --orange-light: #3d2a1a;
}
html.dark body { background: #111; color: #f0f0f0; }
html.dark .sidebar { background: #1a1a1a; border-color: #333; }
html.dark .card { background: #1e1e1e; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
html.dark .main-header { background: #1a1a1a; border-color: #333; }
html.dark .rsection { border-color: #333; }
html.dark .rsection-header { background: #1e1e1e; border-color: #333; }
html.dark .md-content { background: #1e1e1e; border-color: #333; }
html.dark .metric-box { background: #1e1e1e; border-color: #333; }
html.dark .env-pill { border-color: #444; background: #1e1e1e; color: #999; }
html.dark .back-link-bar { border-color: #333; }
html.dark .back-link { color: #666; }
html.dark .profile-card { background: #1e1e1e; border-color: #333; }
html.dark .code-wrap { background: #111; }
html.dark .code-header { background: #0a0a0a; }
html.dark .kv-table th { background: #222; border-color: #333; }
html.dark .kv-table td { border-color: #333; }
html.dark .career-item { background: #1e1e1e; }
html.dark .score-card { background: #1e1e1e; border-color: #333; }
html.dark .rel-item { background: #1e1e1e; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--g50); color: var(--g900); line-height:1.5; display:flex; height:100vh; overflow:hidden; }

/* === LEFT SIDEBAR === */
.sidebar { width: var(--sidebar-w); background: white; border-right:1px solid var(--g200); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-brand { padding:16px 16px 12px; display:flex; align-items:center; gap:10px; font-size:16px; font-weight:700; color:var(--orange); letter-spacing:-0.5px; border-bottom:1px solid var(--g200); }
.sidebar-brand span { color:var(--g600); font-weight:400; font-size:14px; }
.sidebar-brand svg { flex-shrink:0; }
.sidebar-nav { padding:8px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; color:var(--g600); transition:all .15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; }
.sidebar-item:hover { background:var(--g100); }
.sidebar-item.active { background:var(--orange-light); color:var(--orange-dark); font-weight:600; }
.sidebar-item svg { width:18px; height:18px; flex-shrink:0; }
.sidebar-divider { height:1px; background:var(--g200); margin:8px 12px; }
.sidebar-section { padding:8px 16px 4px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--g400); }
.env-pills { padding:8px 12px; display:flex; gap:4px; }
.env-pill { flex:1; padding:6px 8px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid var(--g200); background:white; color:var(--g500); text-align:center; transition:all .15s; }
.env-pill:hover { border-color:var(--orange); }
.env-pill.active { background:var(--orange); border-color:var(--orange); color:white; }
.sidebar-count { font-size:10px; background:var(--g200); color:var(--g600); padding:1px 6px; border-radius:8px; margin-left:auto; }

/* === RIGHT MAIN === */
.main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.main-header { background:white; border-bottom:1px solid var(--g200); padding:14px 24px; display:flex; align-items:center; gap:12px; flex-shrink:0; min-height:56px; }
.main-header h2 { font-size:16px; font-weight:700; }
.main-header .subtitle { font-size:13px; color:var(--g500); font-weight:400; }
.main-content { flex:1; overflow-y:auto; padding:24px; }

/* === CARDS === */
.card { background:white; border-radius:var(--radius-lg); box-shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04); padding:24px; margin-bottom:20px; }
.card-title { font-size:13px; font-weight:600; color:var(--g500); text-transform:uppercase; letter-spacing:.5px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.card-title .dot { width:8px; height:8px; border-radius:50%; }

/* === BADGES === */
.badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-pass { background:var(--green-bg); color:var(--green-dark); }
.badge-fail { background:var(--red-bg); color:var(--red); }
.badge-info { background:var(--blue-bg); color:var(--blue); }
.badge-warn { background:var(--orange-light); color:var(--orange-dark); }
.badge-purple { background:var(--purple-bg); color:var(--purple); }
.badge-teal { background:var(--teal-bg); color:var(--teal); }
.badge-lg { font-size:13px; padding:4px 14px; }

/* === METRICS === */
.metrics-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.metric-box { background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:12px 16px; min-width:100px; flex:1; }
.metric-label { font-size:11px; font-weight:500; color:var(--g500); text-transform:uppercase; letter-spacing:.4px; }
.metric-val { font-size:18px; font-weight:700; margin-top:2px; color:var(--g800); }

/* === COLLAPSIBLE SECTIONS === */
.rsection { border:1px solid var(--g200); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:12px; }
.rsection-header { display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--g50); border-bottom:1px solid var(--g200); cursor:pointer; }
.rsection-header:hover { background:var(--g100); }
.rsection-header h3 { font-size:14px; font-weight:600; flex:1; }
.collapsible { overflow:hidden; transition:max-height .3s ease; }
.chevron-toggle { transition:transform .2s; display:inline-block; color:var(--g400); font-size:12px; }
.chevron-toggle.open { transform:rotate(180deg); }

/* === RUBRIC ROWS === */
.rrow { display:flex; align-items:flex-start; padding:12px 20px; border-bottom:1px solid var(--g150); font-size:13px; transition:background .1s; }
.rrow:last-child { border-bottom:none; } .rrow:hover { background:var(--g50); }
.rrow .ci { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; font-weight:700; margin-right:12px; margin-top:2px; }
.rrow .ct { flex:1; color:var(--g700); } .rrow .cs { font-weight:600; font-size:12px; margin-left:12px; min-width:60px; text-align:right; color:var(--g400); white-space:nowrap; }

/* === DIMENSION ITEMS === */
.dim-item { padding:16px 20px; border-bottom:1px solid var(--g150); }
.dim-item:last-child { border-bottom:none; }
.dim-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
.dim-name { font-size:14px; font-weight:600; color:var(--g800); }
.dim-reason { font-size:13px; color:var(--g600); line-height:1.7; }

/* === PROFILES === */
.profile-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; margin-bottom:24px; }
.profile-card { background:white; border:1px solid var(--g200); border-radius:var(--radius-lg); padding:16px; transition:box-shadow .15s; cursor:pointer; }
.profile-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); }
.profile-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:white; flex-shrink:0; }
.profile-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.profile-name { font-size:15px; font-weight:600; }
.profile-title { font-size:12px; color:var(--g500); }
.profile-meta { font-size:12px; color:var(--g500); margin-top:4px; }

/* === JSON/KV TABLE === */
.kv-table { border-collapse:collapse; width:100%; font-size:13px; }
.kv-table th { text-align:left; padding:6px 12px; background:var(--g100); border:1px solid var(--g200); font-weight:600; color:var(--g700); }
.kv-table td { padding:6px 12px; border:1px solid var(--g200); color:var(--g700); vertical-align:top; }
.kv-table td:first-child { font-weight:600; color:var(--g800); width:180px; white-space:nowrap; }

/* === PERSONA DETAIL === */
.persona-section { margin-bottom:16px; }
.persona-section-title { font-size:11px; font-weight:700; color:var(--g500); text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px; }
.career-item { margin-bottom:8px; padding:10px 14px; background:var(--g50); border-radius:8px; border-left:3px solid var(--orange); }
.career-item .cr-role { font-size:13px; font-weight:600; color:var(--g900); }
.career-item .cr-company { font-size:12px; color:var(--g500); }
.career-item .cr-note { font-size:12px; color:var(--g600); margin-top:4px; font-style:italic; }
.rel-item { display:flex; gap:8px; padding:8px 12px; background:var(--g50); border-radius:6px; margin-bottom:6px; }
.rel-item .rel-name { font-size:13px; font-weight:600; color:var(--g800); min-width:120px; }
.rel-item .rel-desc { font-size:12px; color:var(--g600); }

/* === SCORING GUIDE === */
.score-guide { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.score-card { flex:1; min-width:140px; padding:8px 10px; border-radius:6px; background:var(--g50); border:1px solid var(--g200); }
.score-card .sc-num { font-size:15px; font-weight:800; }
.score-card .sc-desc { font-size:11px; color:var(--g600); margin-top:2px; line-height:1.5; }

/* === MD CONTENT === */
.md-content { font-size:14px; color:var(--g700); line-height:1.7; max-height:600px; overflow-y:auto; padding:20px; background:var(--g50); border-radius:8px; border:1px solid var(--g200); }
.md-content.full { max-height:none; }
.md-content h1 { font-size:20px; font-weight:700; color:var(--g900); margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--g200); }
.md-content h2 { font-size:17px; font-weight:700; color:var(--g800); margin:20px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--g200); }
.md-content h3 { font-size:15px; font-weight:600; color:var(--g800); margin:16px 0 8px; }
.md-content h4 { font-size:14px; font-weight:600; color:var(--g700); margin:12px 0 6px; }
.md-content p { margin:0 0 12px; }
.md-content ul,.md-content ol { margin:0 0 12px; padding-left:24px; }
.md-content li { margin-bottom:4px; }
.md-content table { border-collapse:collapse; width:100%; margin:12px 0; font-size:13px; }
.md-content table th { background:var(--g100); font-weight:600; color:var(--g800); text-align:left; padding:8px 12px; border:1px solid var(--g200); }
.md-content table td { padding:6px 12px; border:1px solid var(--g200); color:var(--g700); }
.md-content table tr:hover td { background:#FFFDE7; }
.md-content pre { background:var(--g800); color:#E0E0E0; padding:14px 16px; border-radius:8px; overflow-x:auto; font-family:'SF Mono',Menlo,monospace; font-size:12px; line-height:1.5; margin:12px 0; }
.md-content code { background:var(--g150); padding:2px 5px; border-radius:3px; font-family:'SF Mono',Menlo,monospace; font-size:12px; }
.md-content pre code { background:none; padding:0; }
.md-content blockquote { border-left:3px solid var(--orange); padding:8px 16px; margin:12px 0; background:var(--orange-light); border-radius:0 6px 6px 0; }
.md-content hr { border:none; border-top:1px solid var(--g200); margin:16px 0; }
.md-content strong { color:var(--g900); }

/* === CODE DISPLAY === */
.code-wrap { background:var(--g800); border-radius:var(--radius-lg); overflow:hidden; }
.code-header { padding:10px 16px; background:var(--g900); display:flex; align-items:center; gap:8px; }
.code-header .ch-dot { width:10px; height:10px; border-radius:50%; }
.code-header .ch-name { font-size:12px; color:var(--g400); font-family:'SF Mono',Menlo,monospace; margin-left:8px; }
.code-body { padding:16px; overflow:auto; max-height:80vh; font-family:'SF Mono',Menlo,monospace; font-size:12px; line-height:1.6; color:#E0E0E0; white-space:pre; }
.code-body .kw { color:#C792EA; } .code-body .fn { color:#82AAFF; } .code-body .st { color:#C3E88D; }
.code-body .cm { color:#546E7A; font-style:italic; } .code-body .dc { color:#FFCB6B; } .code-body .nu { color:#F78C6C; }

/* === PANELS === */
.panel { display:none; flex-direction:column; flex:1; overflow:hidden; }
.panel.active { display:flex; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--g300); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--g400); }
</style>

<script>
let DATA=null, currentEnv='cerulean_qbr', currentView='overview';
const ENV_META={
  cerulean_qbr:{name:'Cerulean Analytics',sub:'Q1 Quarterly Business Review'},
  pinnacle_migration:{name:'Pinnacle Health Systems',sub:'CloudRad Vendor Migration'}
};
const COLORS=['#F5A623','#007AFF','#34C759','#AF52DE','#FF3B30','#5856D6','#FF9500','#00C7BE','#2E86AB','#A23B72','#F18F01','#C73E1D'];

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function md(raw){
  let s=esc(raw);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    if(/[┌┐└┘├┤┬┴┼─│▼▲►◄═║╔╗╚╝╠╣╦╩╬]/.test(code))return'<div style="background:var(--g800);color:#A5D6A7;padding:16px;border-radius:8px;overflow-x:auto;font-family:\'SF Mono\',Menlo,monospace;font-size:11px;line-height:1.4;white-space:pre;margin:12px 0">'+code+'</div>';
    return'<pre><code>'+code+'</code></pre>';
  });
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/((?:^\|.+\|$\n?)+)/gm,function(block){
    const rows=block.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2)return block;
    const isSep=r=>/^\|[\s\-:|]+\|$/.test(r);
    let html='<table>';let headerDone=false;
    rows.forEach((row,i)=>{
      if(isSep(row)){headerDone=true;return;}
      const cells=row.split('|').slice(1,-1).map(c=>c.trim());
      if(!headerDone&&i===0)html+='<thead><tr>'+cells.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
      else html+='<tr>'+cells.map(c=>'<td>'+c+'</td>').join('')+'</tr>';
    });
    html+='</tbody></table>';return html;
  });
  s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^---+$/gm,'<hr>');
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/((?:^[\s]*[-*] .+$\n?)+)/gm,function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\s*[-*] /,''));
    return'<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
  });
  s=s.replace(/((?:^\d+\. .+$\n?)+)/gm,function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\d+\. /,''));
    return'<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
  });
  s=s.replace(/\n\n+/g,'</p><p>');
  s=s.replace(/\n/g,'<br>');
  if(!/^<[huptdob]/.test(s))s='<p>'+s+'</p>';
  s=s.replace(/<p>\s*<\/p>/g,'');
  s=s.replace(/<p>(<(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote))/g,'$1');
  s=s.replace(/(<\/(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote)>)<\/p>/g,'$1');
  return s;
}

function mbox(label,val){return`<div class="metric-box"><div class="metric-label">${esc(label)}</div><div class="metric-val">${esc(String(val==null?'':val))}</div></div>`;}

function renderObj(obj,depth){
  depth=depth||0;
  if(obj==null)return'';
  if(typeof obj==='string'||typeof obj==='number'||typeof obj==='boolean')return esc(String(obj));
  if(Array.isArray(obj)){
    if(obj.length===0)return'<em style="color:var(--g400)">none</em>';
    if(typeof obj[0]==='string'||typeof obj[0]==='number')return obj.map(v=>`<span class="badge badge-info" style="margin:2px">${esc(String(v))}</span>`).join('');
    return'<ul style="list-style:none;padding:0">'+obj.map(v=>'<li style="padding:4px 0;border-bottom:1px solid var(--g150)">'+renderObj(v,depth+1)+'</li>').join('')+'</ul>';
  }
  let h='<table class="kv-table">';
  for(const[k,v]of Object.entries(obj)){
    h+=`<tr><td>${esc(k.replace(/_/g,' '))}</td><td>`;
    if(typeof v==='object'&&v!==null)h+=renderObj(v,depth+1);
    else h+=esc(String(v==null?'':v));
    h+='</td></tr>';
  }
  h+='</table>';
  return h;
}

function renderRubrics(){
  const env=DATA[currentEnv],rubrics=env.rubrics||{},meta=ENV_META[currentEnv];
  let h='';

  document.getElementById('hdr-rubrics').innerHTML=`Rubrics <span class="subtitle">${esc(meta.name)}</span>`;

  const scale=rubrics.scoring_scale;

    h+='</div>';

    h+=`<div class="collapsible" id="${id}" style="max-height:0">`;

    // Programmatic checks
    if(task.programmatic_checks&&task.programmatic_checks.length){
      h+='<div style="padding:10px 20px;font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--g200);background:var(--blue-bg)">Programmatic Checks</div>';
      task.programmatic_checks.forEach(check=>{
        const typeIcon=check.type==='boolean'?'&#9745;':check.type==='checklist'?'&#9776;':'&#8776;';
        h+='<div class="rrow">';
        h+=`<div class="ci" style="background:var(--blue-bg);color:var(--blue)">${typeIcon}</div>`;
        h+=`<div class="ct"><strong>${esc(check.name||'')}</strong><div style="font-size:12px;color:var(--g500);margin-top:2px">${esc(check.description||'')}</div>`;
        if(check.items&&check.items.length){
          h+='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">';
          check.items.forEach(item=>{h+=`<span class="badge badge-info">${esc(String(item).replace(/_/g,' '))}</span>`;});
          h+='</div>';
        }
        h+=`</div><div class="cs">${esc(check.type||'')}</div></div>`;
      });
    }

    // Rubric criteria
    if(task.rubric_criteria&&task.rubric_criteria.length){
      h+='<div style="padding:10px 20px;font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--g200);border-top:1px solid var(--g200);background:var(--purple-bg)">Rubric Criteria</div>';

        h+=`<div class="dim-reason">${esc(crit.description||'')}</div>`;
        if(crit.scoring){
          const sColors={1:'var(--red)',2:'var(--orange)',3:'var(--amber)',4:'var(--blue)',5:'var(--green)'};
          h+='<div class="score-guide">';
          for(const[score,guide]of Object.entries(crit.scoring)){
            h+=`<div class="score-card"><div class="sc-num" style="color:${sColors[score]||'var(--g700)'}">${score}</div><div class="sc-desc">${esc(guide)}</div></div>`;

          h+='</div>';
        }
        h+='</div>';
      });
    }

    h+='</div></div>';
  });

  document.getElementById('rubrics-content').innerHTML=h;
}

/* ============ VERIFIERS ============ */
function renderVerifiers(){
  const env=DATA[currentEnv],meta=ENV_META[currentEnv];
  document.getElementById('hdr-verifiers').innerHTML=`Verifiers <span class="subtitle">${esc(meta.name)}</span>`;

  const code=env.verifiers_code||'';
  // Basic Python syntax highlighting
  let highlighted=esc(code);
  // Comments
  highlighted=highlighted.replace(/(#[^\n]*)/g,'<span class="cm">$1</span>');
  // Strings (triple-quoted first, then single/double)
  highlighted=highlighted.replace(/(&#34;&#34;&#34;[\s\S]*?&#34;&#34;&#34;|&#39;&#39;&#39;[\s\S]*?&#39;&#39;&#39;)/g,'<span class="st">$1</span>');
  highlighted=highlighted.replace(/(f?&#34;(?:[^&#]|&[^#]|&#[^3]|&#3[^4])*?&#34;)/g,'<span class="st">$1</span>');
  highlighted=highlighted.replace(/(f?&#39;(?:[^&#]|&[^#]|&#[^3]|&#3[^9])*?&#39;)/g,'<span class="st">$1</span>');
  // Keywords
  const kws='import|from|def|class|return|if|elif|else|for|while|in|not|and|or|is|None|True|False|try|except|raise|with|as|pass|break|continue|yield|lambda|assert|finally|global|nonlocal'.split('|');
  kws.forEach(kw=>{
    highlighted=highlighted.replace(new RegExp('\\b('+kw+')\\b','g'),'<span class="kw">$1</span>');
  });
  // Decorators
  highlighted=highlighted.replace(/(@\w+)/g,'<span class="dc">$1</span>');
  // Numbers
  highlighted=highlighted.replace(/\b(\d+\.?\d*)\b/g,'<span class="nu">$1</span>');

  const lines=code.split('\n').length;
  let h=`<div style="margin-bottom:16px;display:flex;align-items:center;gap:12px">`;
  h+=`<span class="badge badge-info badge-lg">${lines} lines</span>`;
  h+=`<span class="badge badge-warn badge-lg">${(code.length/1024).toFixed(0)} KB</span>`;
  h+='</div>';

  h+='<div class="code-wrap">';
  h+='<div class="code-header"><div class="ch-dot" style="background:#FF5F56"></div><div class="ch-dot" style="background:#FFBD2E"></div><div class="ch-dot" style="background:#27C93F"></div><div class="ch-name">verifiers.py</div></div>';
  h+=`<div class="code-body">${highlighted}</div>`;
  h+='</div>';

  document.getElementById('verifiers-content').innerHTML=h;
}

  updateCounts();
  renderCurrentView();
}

d to team members who don't know her well."]}],"rubrics":{"scoring_scale":{"1":"Unacceptable - fails the requirement or introduces a problem","2":"Below expectations - partially meets the requirement with significant gaps","3":"Meets expectations - satisfactory completion with minor gaps","4":"Exceeds expectations - strong execution with attention to detail","5":"Exceptional - demonstrates deep understanding of personas and context"},"T1_pull_revenue_metrics":{"programmatic_checks":[{"id":"T1_PC1","name":"slack_message_sent","description":"A Slack DM was sent to kenji_watanabe","type":"boolean"},{"id":"T1_PC2","name":"correct_channel","description":"Message was sent as a DM, not in a public channel (Kenji prefers DMs for data requests)","type":"boolean"},{"id":"T1_PC3","name":"data_points_specified","description":"Message includes all required data points: net new ARR, pipeline coverage ratio, win rate by segment, average deal cycle, top 10 deals, deals lost to Acme","type":"checklist","items":["net_new_arr","pipeline_coverage_ratio","win_rate_by_segment","average_deal_cycle","top_10_deals","deals_lost_to_acme"]},{"id":"T1_PC4","name":"deadline_included","description":"Message includes a specific deadline (date and time, not 'ASAP')","type":"boolean"},{"id":"T1_PC5","name":"response_acknowledged","description":"Agent acknowledged Kenji's response (even if it was just an emoji reaction)","type":"boolean"}],"rubric_criteria":[{"id":"T1_R1","name":"communication_style_match","dimension":"Persona Fidelity","description":"Did the agent match Kenji's communication preferences? Kenji prefers terse, bullet-point communication. He uses emoji reactions instead of words. A message that is overly verbose, uses flowery language, or sends a wall of text would score low.\n","scoring":{"1":"Sent a multi-paragraph message with pleasantries and excessive context","2":"Sent a structured message but included unnecessary preamble or over-explained","3":"Sent a reasonable message with bullet points but slightly too long","4":"Terse, bullet-pointed message that respects Kenji's style. Included a Notion link for details.","5":"Perfectly calibrated - brief bullets, specific data points, deadline, no fluff. Linked to a detailed doc rather than putting everything in the message."}},{"id":"T1_R2","name":"data_precision","dimension":"Content Quality","description":"Are the data requirements specified with the precision Marcus Tan-Ohara would expect? Marcus corrects rounded numbers. The request should specify exact figures, not 'approximately' or 'ballpark.'\n","scoring":{"1":"Vague request ('send me the revenue data')","2":"Lists some metrics but uses imprecise language ('about $4M target')","3":"Lists all required metrics with reasonable precision","4":"Lists all metrics with exact targets and specifies data format (exact $, not rounded)","5":"Lists all metrics, specifies precision requirements, requests both Salesforce and Clari sources (anticipating Lena's cross-reference), and notes Marcus's preference for exact figures"}},{"id":"T1_R3","name":"follow_up_judgment","dimension":"Behavioral Appropriateness","description":"Did the agent handle follow-up appropriately? Kenji responds within his own timeline (typically <4 hours). Following up too aggressively would be disrespectful; not following up at all if the deadline is at risk would be negligent.\n","scoring":{"1":"Followed up multiple times within the first hour","2":"Followed up within 2 hours without waiting for the expected response window","3":"Waited an appropriate amount of time but followed up with unnecessary urgency","4":"Followed up once after 4+ hours with a polite, brief check-in","5":"Waited appropriately, followed up once with context ('checking in since we need this for the deck by Thursday'), and accepted Kenji's timeline"}}]},"T2_collect_cs_health_scores":{"programmatic_checks":[{"id":"T2_PC1","name":"slack_message_sent","description":"A Slack DM was sent to priya_narayanan","type":"boolean"},{"id":"T2_PC2","name":"timezone_respected","description":"Message was sent during Priya's working hours (08:00–17:30 PT)","type":"boolean"},{"id":"T2_PC3","name":"data_points_requested","description":"Message requests all required data: NRR, logo churn, NPS trend, at-risk accounts, top 5 expansion opps","type":"checklist","items":["nrr_current_vs_target","logo_churn_details","nps_trend","at_risk_accounts_with_reasons","top_5_expansion_opportunities"]},{"id":"T2_PC4","name":"loom_accepted","description":"If Priya sent a Loom video, agent accepted it (did not ask for a written document instead)","type":"boolean","conditional":true}],"rubric_criteria":[{"id":"T2_R1","name":"communication_warmth_match","dimension":"Persona Fidelity","description":"Did the agent match Priya's warm, enthusiastic communication style? Priya uses exclamation points, emoji, and expressive language. A cold, terse message (appropriate for Kenji) would feel wrong to Priya.\n","scoring":{"1":"Cold, terse message that reads like a task assignment","2":"Polite but flat - no warmth or acknowledgment of relationship","3":"Friendly and professional with appropriate tone","4":"Warm, matches Priya's energy, uses some positive language ('would love your input on this!')","5":"Perfectly matched - warm tone, acknowledges Priya's expertise, shows genuine interest in her perspective while being clear on the data needed"}},{"id":"T2_R2","name":"retention_vs_expansion_balance","dimension":"Strategic Awareness","description":"Did the agent handle the tension between Priya's retention focus and Lena's expansion focus? Priya will naturally emphasize at-risk accounts. Lena wants to see expansion opportunities. The agent must capture both without alienating Priya.\n","scoring":{"1":"Only asked for at-risk data or only asked for expansion data","2":"Asked for both but clearly prioritized one over the other in a way that would concern Priya or disappoint Lena","3":"Requested both retention and expansion data equally","4":"Requested both, framed expansion in a way Priya would accept ('which healthy accounts have the most upside?')","5":"Artfully balanced both perspectives, acknowledged Priya's retention focus while explaining the expansion data need in terms of Lena's QBR expectations"}},{"id":"T2_R3","name":"data_freshness_awareness","dimension":"Domain Knowledge","description":"Did the agent flag or inquire about Gainsight data freshness? The Gainsight → Salesforce integration is flaky, and health scores may be up to 2 weeks stale.\n","scoring":{"1":"Did not consider data freshness at all","2":"Accepted data without questioning when it was last refreshed","3":"Asked about data freshness in a general way","4":"Specifically asked about Gainsight sync date and flagged the known integration issue","5":"Asked about sync date, flagged the known issue, and proactively suggested a workaround (e.g., 'if Gainsight is stale, could you pull a manual export?')"}}]},"T3_gather_product_roadmap":{"programmatic_checks":[{"id":"T3_PC1","name":"email_sent","description":"An email was sent to tomas_rezende (not a Slack message)","type":"boolean"},{"id":"T3_PC2","name":"email_not_slack","description":"No Slack DM was sent to Tomás (he prefers email for cross-functional requests)","type":"boolean"},{"id":"T3_PC3","name":"structured_request","description":"Email contains a numbered list of requested items","type":"boolean"},{"id":"T3_PC4","name":"deadline_with_lead_time","description":"Deadline is at least 48 hours from send time","type":"boolean"},{"id":"T3_PC5","name":"no_sales_framing","description":"Email does NOT use phrases like 'features Sales needs' or 'features for closing deals'","type":"boolean"}],"rubric_criteria":[{"id":"T3_R1","name":"channel_appropriateness","dimension":"Persona Fidelity","description":"Did the agent use the right channel? Tomás prefers async email for cross-functional requests. Using Slack would be a persona mismatch.\n","scoring":{"1":"Sent via Slack DM or Slack channel","2":"Sent via email but with Slack-like informality","3":"Sent via email with appropriate formality","4":"Sent via email with structured, numbered request matching Tomás's preferred format","5":"Email with structured request, appropriate formality, no sales framing, and sufficient lead time"}},{"id":"T3_R2","name":"diplomatic_framing","dimension":"Political Awareness","description":"Did the agent avoid triggering the Sales-Engineering tension? Tomás resists requests framed as 'Sales needs.' The request should be framed around product achievements and roadmap, not commercial pressure.\n","scoring":{"1":"Explicitly framed as 'features Sales needs for the QBR' or 'deals that need these features'","2":"Mentioned Sales or revenue context in a way that would trigger Tomás's resistance","3":"Neutral framing that avoids Sales context but doesn't positively frame engineering achievements","4":"Framed around product accomplishments and roadmap vision","5":"Framed as celebrating engineering achievements in Q1 and sharing the product vision for Q2 - something Tomás would be proud to contribute to"}},{"id":"T3_R3","name":"tentative_item_handling","dimension":"Integrity","description":"When Tomás flagged items as tentative/uncommitted, did the agent respect this and avoid presenting them as confirmed?\n","scoring":{"1":"Included tentative items as confirmed in the deck","2":"Included tentative items with a vague qualifier ('upcoming')","3":"Included tentative items clearly marked as tentative","4":"Excluded tentative items from the main deck, noted them in appendix with caveats","5":"Excluded tentative items, informed Rachel of the distinction, and asked her to decide whether to include with caveats"}}]},"T4_compile_competitive_intel":{"programmatic_checks":[{"id":"T4_PC1","name":"slack_message_sent","description":"Slack DM sent to diego_fuentes_rios","type":"boolean"},{"id":"T4_PC2","name":"sent_during_hours","description":"Message sent during Diego's working hours (09:00–18:00 ET)","type":"boolean"},{"id":"T4_PC3","name":"acme_mentioned","description":"Request specifically mentions Acme Observability","type":"boolean"},{"id":"T4_PC4","name":"gong_data_requested","description":"Request includes ask for Gong competitive win rate data","type":"boolean"}],"rubric_criteria":[{"id":"T4_R1","name":"competitive_scope_balance","dimension":"Content Quality","description":"Did the agent request both competitive positioning AND customer storytelling? Diego over-indexes on competitive framing. The agent should request customer narratives alongside competitive analysis.\n","scoring":{"1":"Only asked for competitive analysis, reinforcing Diego's blind spot","2":"Primarily competitive focus with a vague mention of customer stories","3":"Balanced request for competitive data and customer narratives","4":"Explicitly requested customer win stories alongside competitive data, noting the QBR audience","5":"Requested both, explained why customer stories matter for this specific audience (Lena and Marcus want evidence, not only positioning), and suggested Siobhán's deal narratives"}},{"id":"T4_R2","name":"work_hours_respect","dimension":"Behavioral Appropriateness","description":"Did the agent respect Diego's strong work-life boundaries (he disconnects fully after 18:00 ET)?\n","scoring":{"1":"Sent a request after 18:00 ET or expected a response after hours","2":"Sent during hours but set an after-hours deadline","3":"Sent and expected response during business hours","4":"Sent during business hours with a reasonable deadline during the next business day","5":"Sent during business hours, set a business-hours deadline, and did not follow up outside working hours even under time pressure"}}]},"T5_draft_qbr_deck":{"programmatic_checks":[{"id":"T5_PC1","name":"all_inputs_used","description":"Deck incorporates data from all four inputs (T1, T2, T3, T4)","type":"checklist","items":["revenue_data_from_T1","cs_data_from_T2","roadmap_from_T3","competitive_from_T4"]},{"id":"T5_PC2","name":"required_sections_present","description":"Deck includes all 8 required sections","type":"checklist","items":["executive_summary","revenue_performance","pipeline_analysis","customer_health","product_roadmap","competitive_landscape","key_wins_losses","q2_plan"]},{"id":"T5_PC3","name":"slide_count","description":"Deck does not exceed 25 slides","type":"threshold","max_value":25},{"id":"T5_PC4","name":"shared_with_rachel","description":"Deck link shared with Rachel via Slack DM","type":"boolean"}],"rubric_criteria":[{"id":"T5_R1","name":"executive_summary_format","dimension":"Audience Awareness","description":"Does the executive summary follow Lena's 'start with the conclusion' mandate? The first slide should lead with the bottom line, not build up to it.\n","scoring":{"1":"Executive summary builds up to the conclusion or buries the key number","2":"Conclusion is present but not the first thing on the slide","3":"Conclusion leads the slide, followed by supporting context","4":"Strong conclusion-first format with exactly 3 supporting points (Lena's format)","5":"Conclusion-first, 3 supporting points, data-precise (Marcus), and includes a one-line strategic framing that Lena would appreciate"}},{"id":"T5_R2","name":"data_precision","dimension":"Stakeholder Calibration","description":"Does the deck present numbers with Marcus's expected precision (exact dollar amounts, no rounding) while also being scannable for Lena (who reads fast)?\n","scoring":{"1":"Numbers are rounded or inconsistent ('about $4M', 'roughly 30%')","2":"Most numbers are precise but some are rounded","3":"All numbers are precise","4":"All numbers precise, formatted consistently, with trend indicators","5":"Precise numbers with consistent formatting, trend indicators, and a 'so what' narrative that connects the data to strategy (serving both Marcus and Lena)"}},{"id":"T5_R3","name":"tension_navigation","dimension":"Political Sophistication","description":"Does the deck work around known political tensions (Priya's retention vs. Lena's expansion, Rachel's product blame vs. pricing reality, Tomás's tentative roadmap items)?\n","scoring":{"1":"Ignores tensions or takes a side that would create conflict in the QBR","2":"Includes conflicting data without reconciliation","3":"Presents data neutrally without highlighting tensions","4":"Works around tensions by presenting multiple perspectives with data support","5":"Artfully presents data that allows Lena to draw her own conclusions while giving Rachel plausible talking points - e.g., shows both product and pricing as factors in losses without assigning blame"}}]},"T6_schedule_prep_meeting":{"programmatic_checks":[{"id":"T6_PC1","name":"all_attendees_included","description":"Calendar invite includes Rachel, Priya, Kenji, Diego","type":"checklist","items":["rachel_whitford","priya_narayanan","kenji_watanabe","diego_fuentes_rios"]},{"id":"T6_PC2","name":"duration_correct","description":"Meeting is exactly 60 minutes","type":"exact_value","expected":60},{"id":"T6_PC3","name":"timezone_feasible","description":"Meeting is within the cross-timezone feasible window (10:00–17:00 CT)","type":"time_range","start":"10:00 CT","end":"17:00 CT"},{"id":"T6_PC4","name":"agenda_included","description":"Calendar invite body contains a meeting agenda","type":"boolean"},{"id":"T6_PC5","name":"three_days_before_qbr","description":"Meeting is scheduled at least 3 business days before the QBR date","type":"boolean"}],"rubric_criteria":[{"id":"T6_R1","name":"scheduling_optimization","dimension":"Operational Efficiency","description":"Did the agent optimize the scheduling across multiple constraints (timezones, preferences, existing calendar conflicts)?\n","scoring":{"1":"Proposed a time outside someone's working hours or during a known conflict","2":"Proposed a feasible time but didn't account for preferences (e.g., Kenji prefers mornings)","3":"Proposed a time within all constraints","4":"Proposed an optimal time accounting for constraints AND preferences, with a backup option","5":"Proposed an optimal time with preferences considered, checked for conflicts with Rachel's customer meetings, and proactively offered a backup slot"}},{"id":"T6_R2","name":"agenda_quality","dimension":"Content Quality","description":"Is the meeting agenda clear, time-boxed, and aligned with the QBR preparation needs?\n","scoring":{"1":"No agenda or a vague agenda ('discuss QBR deck')","2":"Basic agenda listing topics without time allocations","3":"Agenda with topics and time allocations","4":"Agenda with topics, time allocations, and owner for each section","5":"Agenda with topics, time allocations, owners, and specific asks ('Kenji: validate revenue figures on slides 3–7')"}}]},"T7_circulate_pre_read":{"programmatic_checks":[{"id":"T7_PC1","name":"email_sent","description":"Email sent via Gmail to all 4 prep meeting attendees","type":"boolean"},{"id":"T7_PC2","name":"timing_correct","description":"Email sent at least 48 hours before the scheduled prep meeting","type":"boolean"},{"id":"T7_PC3","name":"deck_link_included","description":"Email contains a link to the draft QBR deck","type":"boolean"},{"id":"T7_PC4","name":"no_extra_recipients","description":"Email was NOT sent to Lena, Tomás, Marcus, or Siobhán","type":"boolean"}],"rubric_criteria":[{"id":"T7_R1","name":"personalized_asks","dimension":"Persona Awareness","description":"Did the email include personalized review requests for each recipient based on their expertise?\n","scoring":{"1":"Generic 'please review' with no personalization","2":"Some personalization but missing key assignments","3":"Each person has a specific section to review","4":"Each person has a specific section, with context on what to look for","5":"Personalized asks that match each persona's strengths: Kenji validates numbers, Diego reviews competitive section, Priya reviews CS section, Rachel gets flagged items on specific slides"}}]},"T8_prep_meeting_followup":{"programmatic_checks":[{"id":"T8_PC1","name":"slack_summary_posted","description":"Meeting summary posted in Slack within 2 hours of meeting end","type":"boolean"},{"id":"T8_PC2","name":"action_items_have_owners","description":"Every action item has an assigned owner","type":"boolean"},{"id":"T8_PC3","name":"action_items_have_deadlines","description":"Every action item has a specific deadline","type":"boolean"},{"id":"T8_PC4","name":"priya_followup_dm","description":"A follow-up DM was sent to Priya asking for additional thoughts (she's conflict-avoidant in groups)","type":"boolean"}],"rubric_criteria":[{"id":"T8_R1","name":"conflict_avoidant_persona_handling","dimension":"Emotional Intelligence","description":"Did the agent proactively reach out to Priya for additional feedback she may not have shared in the group? This demonstrates understanding of her conflict-avoidant tendency.\n","scoring":{"1":"Did not follow up with Priya individually","2":"Followed up but with a generic message","3":"Followed up with a thoughtful message asking for additional input","4":"Followed up with a warm, specific message referencing a topic from the meeting where she seemed to hold back","5":"Followed up warmly, referenced a specific moment, created a safe space for candid feedback ('no wrong answers, just want to make sure we capture everything before we finalize')"}},{"id":"T8_R2","name":"conflict_documentation","dimension":"Professional Judgment","description":"If there were conflicting viewpoints in the meeting, did the agent document them factually without editorializing?\n","scoring":{"1":"Took a side or editorialized on disagreements","2":"Documented the winning argument only","3":"Documented both sides neutrally","4":"Documented both sides with the data each cited, flagged to Rachel for decision","5":"Documented all perspectives with supporting data, flagged to Rachel with a neutral framing, and suggested a path to resolution"}}]},"T9_finalize_deck":{"programmatic_checks":[{"id":"T9_PC1","name":"feedback_incorporated","description":"Changes from prep meeting feedback are reflected in the deck","type":"boolean"},{"id":"T9_PC2","name":"rachel_approved","description":"Rachel explicitly approved the final deck (👍, 'looks good', or equivalent)","type":"boolean"},{"id":"T9_PC3","name":"slide_count_final","description":"Final deck does not exceed 25 slides","type":"threshold","max_value":25}],"rubric_criteria":[{"id":"T9_R1","name":"feedback_fidelity","dimension":"Execution Quality","description":"Were all feedback items from the prep meeting accurately incorporated?\n","scoring":{"1":"Significant feedback items were missed or incorrectly implemented","2":"Most feedback incorporated but with some errors or omissions","3":"All feedback incorporated accurately","4":"All feedback incorporated with improvements that enhance the original suggestions","5":"All feedback incorporated, conflicting feedback resolved with Rachel's input documented, and a changelog provided showing what changed and why"}},{"id":"T9_R2","name":"approval_protocol","dimension":"Process Rigor","description":"Did the agent obtain explicit approval from Rachel before proceeding? No response does NOT count as approval.\n","scoring":{"1":"Proceeded without any approval","2":"Sent the deck but didn't wait for explicit approval before proceeding","3":"Sent the deck and waited for Rachel's response before proceeding","4":"Sent the deck with clear 'ready for your sign-off' language and waited for explicit confirmation","5":"Sent with sign-off request, listed key changes for easy review, waited for explicit confirmation, and confirmed receipt of approval"}}]},"T10_send_qbr_invite":{"programmatic_checks":[{"id":"T10_PC1","name":"all_attendees","description":"Invite includes all 7 required attendees: Rachel, Lena, Marcus, Priya, Diego, Kenji, Siobhán","type":"checklist","items":["rachel_whitford","lena_strom","marcus_tan_ohara","priya_narayanan","diego_fuentes_rios","kenji_watanabe","siobhan_omalley"]},{"id":"T10_PC2","name":"duration","description":"Meeting is 90 minutes","type":"exact_value","expected":90},{"id":"T10_PC3","name":"deck_attached","description":"Final deck link is included in the calendar invite","type":"boolean"},{"id":"T10_PC4","name":"agenda_in_body","description":"Agenda with time allocations is in the invite body","type":"boolean"},{"id":"T10_PC5","name":"conclusion_first_agenda","description":"Agenda starts with executive summary, not builds up to it","type":"boolean"}],"rubric_criteria":[{"id":"T10_R1","name":"lena_priority_scheduling","dimension":"Stakeholder Hierarchy","description":"Did the agent build the schedule around Lena's availability first (she is the most important and most constrained attendee)?\n","scoring":{"1":"Scheduled without checking Lena's calendar","2":"Checked Lena's calendar but didn't prioritize it over others","3":"Built schedule around Lena's availability","4":"Built around Lena, checked for travel blocks, and verified no all-hands conflict","5":"Built around Lena, checked all constraints, handled Siobhán's potential conflict with Rachel's input, and provided a backup option"}}]},"T11_executive_pre_brief":{"programmatic_checks":[{"id":"T11_PC1","name":"email_sent","description":"Email sent to Lena Ström","type":"boolean"},{"id":"T11_PC2","name":"timing","description":"Email sent approximately 24 hours before QBR","type":"time_window","target_hours_before":24,"tolerance_hours":4},{"id":"T11_PC3","name":"not_slack","description":"Sent via email, not Slack (Lena doesn't engage with long Slack messages)","type":"boolean"}],"rubric_criteria":[{"id":"T11_R1","name":"brevity_match","dimension":"Persona Fidelity","description":"Does the pre-brief match Lena's communication style? She reads short, directive emails. Three sections max. No filler.\n","scoring":{"1":"Long, verbose email with excessive context and preamble","2":"Moderately long email - more than 3 sections or includes unnecessary detail","3":"Concise email with the right structure but slightly too wordy","4":"Three sections (bottom line, three things to know, sensitive topics), concise, directive","5":"Perfectly matched to Lena's style - conclusion-first, exactly 3 sections, no filler, each bullet is a complete thought in one sentence. Includes a Lena-style one-liner framing if appropriate."}},{"id":"T11_R2","name":"sensitive_topic_coverage","dimension":"Strategic Awareness","description":"Does the pre-brief flag topics Lena should be prepared for? (Q4 miss root cause, Acme pricing pressure, NRR gap, at-risk enterprise accounts)\n","scoring":{"1":"No sensitive topics flagged","2":"One or two topics flagged but missing critical ones","3":"Key sensitive topics covered","4":"All sensitive topics covered with brief context and suggested talking points","5":"All sensitive topics covered, includes what Rachel has prepared for each, and anticipates questions Marcus or Siobhán might raise"}}]},"T12_post_qbr_actions":{"programmatic_checks":[{"id":"T12_PC1","name":"email_sent","description":"Email sent to all QBR attendees within 4 hours of meeting end","type":"boolean"},{"id":"T12_PC2","name":"action_items_structured","description":"Each action item has: description, owner, deadline","type":"boolean"},{"id":"T12_PC3","name":"notion_tasks_created","description":"Follow-up tasks created in Notion","type":"boolean"},{"id":"T12_PC4","name":"slack_summary_posted","description":"Brief summary posted in Slack","type":"boolean"}],"rubric_criteria":[{"id":"T12_R1","name":"lena_closing_captured","dimension":"Meeting Fidelity","description":"Did the action items reflect Lena's closing format ('What are the three things we're doing and who owns them?')? These three items should be prominently featured.\n","scoring":{"1":"Lena's three priorities are not captured or are buried in a long list","2":"Three priorities are listed but not prominently","3":"Three priorities are clearly listed at the top","4":"Three priorities are prominently featured with owners, deadlines, and Lena's exact framing","5":"Three priorities lead the email, additional action items follow separately, Lena's one-liner is quoted for alignment, and the structure mirrors her 'what, who, when' format"}},{"id":"T12_R2","name":"attribution_accuracy","dimension":"Execution Integrity","description":"Are action items attributed to the correct owners? If Lena assigned something to a specific person, it must not be redistributed.\n","scoring":{"1":"Action items are assigned to wrong people or redistributed from Lena's assignments","2":"Most assignments are correct but some are wrong or ambiguous","3":"All assignments match what was decided in the meeting","4":"All assignments correct, with context for each (why this person, what's the expected outcome)","5":"Perfect attribution, Marcus's financial follow-ups in his exact language, and proactive identification of cross-functional dependencies between action items"}}]},"global_rubrics":[{"id":"G_R1","name":"persona_differentiation","dimension":"Overall Persona Fidelity","description":"Across all tasks, did the agent meaningfully differentiate its communication style for each persona? (Terse for Kenji, warm for Priya, structured for Tomás, competitive-framed for Diego, brief for Lena, etc.)\n","scoring":{"1":"Used the same communication style for everyone","2":"Some differentiation but inconsistent","3":"Clear differentiation for most personas","4":"Consistent, appropriate differentiation for all personas","5":"Each interaction reads as if written by someone who genuinely knows and has worked with each persona - style, tone, vocabulary, and channel all calibrated"}},{"id":"G_R2","name":"dag_execution_order","dimension":"Project Management","description":"Did the agent respect the DAG dependencies? (e.g., did not draft the deck before all inputs were received, did not circulate pre-read before the meeting was scheduled)\n","scoring":{"1":"Executed tasks out of order, violating dependencies","2":"Mostly followed order but started a dependent task before its prerequisites completed","3":"Followed DAG order correctly","4":"Followed DAG order and parallelized independent tasks efficiently","5":"Perfect DAG execution with efficient parallelization, proactive identification of critical path bottlenecks, and contingency handling when a dependency was delayed"}},{"id":"G_R3","name":"tool_selection","dimension":"Tool Appropriateness","description":"Did the agent select the right tool for each interaction? (Email for Tomás, Slack DM for Kenji, Google Calendar for scheduling, etc.)\n","scoring":{"1":"Used wrong tools repeatedly (e.g., Slack for Tomás, email for Kenji)","2":"Mostly correct but some mismatches","3":"Correct tool selection for all tasks","4":"Correct tools with format optimization (e.g., bullet points in Slack for Kenji, numbered lists in email for Tomás)","5":"Perfect tool selection with format, tone, and channel optimized for each persona and context"}},{"id":"G_R4","name":"political_navigation","dimension":"Organizational Awareness","description":"Did the agent handle the organizational politics appropriately? (Sales-Engineering tension, retention-expansion tension, Q4 blame dynamics)\n","scoring":{"1":"Actions would create or escalate political conflicts","2":"Unaware of political dynamics - neutral but potentially clumsy","3":"Aware of dynamics and avoided obvious landmines","4":"Actively managed dynamics - framed requests to avoid triggers, balanced perspectives","5":"Sharp political instincts - each interaction strengthened relationships, anticipated tensions before they surfaced, and created outcomes where all parties felt heard"}}]},"project_dag":"# Scenario 1: Cerulean Analytics - Q1 Quarterly Business Review\n\n## Project Overview\n\n**Objective:** Coordinate the preparation and execution of Cerulean Analytics' Q1 Quarterly Business Review (QBR) on behalf of Rachel Whitford (VP of Sales). The QBR will be presented to the executive leadership team, led by Lena Ström (CRO), with participation from Finance, Customer Success, Product Marketing, Sales Operations, and Engineering.\n\n**Agent Role:** Executive assistant to Rachel Whitford, with access to Slack, Gmail, Google Calendar, Google Slides, Notion, Salesforce dashboards, and Gong.\n\n**Timeline:** 10 business days (2 calendar weeks)\n\n**Success Criteria:** A polished QBR deck is presented on schedule, all stakeholders are prepared, Lena receives a pre-brief, and post-QBR action items are distributed within 24 hours.\n\n---\n\n## Task DAG (Directed Acyclic Graph)\n\n```\nLevel 0 (parallel):  T1 ──┐\n                      T2 ──┤\n                      T3 ──┼──► T5 (draft deck)\n                      T4 ──┘         │\n                      T6 ─────────┐  │\n                                  ▼  ▼\nLevel 1:                    T7 (circulate pre-read)\n                                  │\nLevel 2:                    T8 (prep meeting follow-up)\n                                  │\nLevel 3:                    T9 (finalize deck)\n                                 / \\\nLevel 4:                   T10   T11\n                            │\nLevel 5:                   T12 (post-QBR actions)\n```\n\n### Dependency Table\n\n| Task ID | Task Name | Dependencies | Assigned Persona(s) | Tools Required | Est. Duration |\n|---------|-----------|-------------|---------------------|----------------|---------------|\n| T1 | Pull Revenue & Pipeline Metrics | - | Kenji Watanabe | Slack, Salesforce | 4 hours |\n| T2 | Collect Customer Health Scores | - | Priya Narayanan | Slack, Gainsight | 6 hours |\n| T3 | Gather Product Roadmap Highlights | - | Tomás Rezende | Gmail, Google Docs | 24 hours |\n| T4 | Compile Competitive Intelligence | - | Diego Fuentes-Ríos | Slack, Crayon | 4 hours |\n| T5 | Draft QBR Presentation Deck | T1, T2, T3, T4 | Rachel Whitford (review) | Google Slides, Notion | 8 hours |\n| T6 | Schedule QBR Prep Meeting | - | Priya, Kenji, Diego, Rachel | Google Calendar | 30 min |\n| T7 | Circulate Pre-Read Materials | T5, T6 | All prep attendees | Gmail, Google Drive | 30 min |\n| T8 | Prep Meeting Follow-Up | T7 | All prep attendees | Slack, Notion | 2 hours |\n| T9 | Finalize QBR Deck | T8 | Rachel Whitford (approval) | Google Slides, Slack | 4 hours |\n| T10 | Send QBR Calendar Invite | T9 | Full QBR attendee list | Google Calendar, Gmail | 30 min |\n| T11 | Executive Pre-Brief to Lena | T9 | Lena Ström | Gmail | 1 hour |\n| T12 | Post-QBR Action Items | T10 | All QBR attendees | Gmail, Slack, Notion | 2 hours |\n\n---\n\n## Detailed Task Specifications\n\n### T1: Pull Revenue & Pipeline Metrics\n**Description:** Request Q1 revenue data, pipeline metrics, and deal-level details from Kenji Watanabe. Data must include: net new ARR (vs. $4.2M target), pipeline coverage ratio, win rate by segment (SMB/mid-market/enterprise), average deal cycle length, top 10 deals by size, and deals lost to Acme.\n\n**Input:** None (Level 0)\n**Output:** Validated dataset (Google Sheet or Salesforce report link) confirmed by Kenji.\n**Communication Requirements:**\n- Send Slack DM to Kenji with specific data points needed and deadline.\n- If no response within 4 hours, follow up once. Do not follow up more than once.\n\n**Constraints:**\n- Data must be precise — no rounding or approximation.\n- Include both Salesforce and Clari data sources to ensure cross-system consistency.\n\n---\n\n### T2: Collect Customer Health Scores\n**Description:** Request customer health data from Priya Narayanan, including: NRR (target 115%, current 109%), logo churn details, NPS trend, at-risk accounts with reason codes, and top 5 expansion opportunities.\n\n**Input:** None (Level 0)\n**Output:** Customer health summary document or Gainsight export, validated by Priya.\n**Communication Requirements:**\n- Send Slack DM to Priya. She is remote (PT timezone) — send during her working hours (08:00–17:30 PT).\n- Accept varied response formats (documents, video walkthroughs, etc.) and extract key data points.\n- Capture qualitative commentary alongside quantitative data — narrative context on at-risk accounts adds value to the QBR.\n\n**Constraints:**\n- Gainsight data may be up to 2 weeks stale due to the flaky Salesforce integration. Flag any data freshness concerns.\n- The customer health section should include both at-risk accounts and expansion opportunities.\n\n---\n\n### T3: Gather Product Roadmap Highlights\n**Description:** Request Q2 product roadmap highlights from Tomás Rezende for inclusion in the QBR deck. Need: shipped features (Q1), planned features (Q2), and any features relevant to competitive positioning against Acme.\n\n**Input:** None (Level 0)\n**Output:** Product roadmap summary (bullet points or Google Doc), confirmed by Tomás.\n**Communication Requirements:**\n- Email Tomás (he handles cross-functional requests via email, not Slack). Subject line must be specific and include a deadline.\n- Provide a structured, numbered list of what is needed.\n- Give at least 48-hour lead time for a response.\n- If any technical characterization of a feature is corrected, accept the correction and update the deck.\n\n**Constraints:**\n- Do not present uncommitted or tentative roadmap items as confirmed in the deck.\n- Responses may include technical depth that needs to be translated for a non-engineering audience. Simplify without losing accuracy.\n\n---\n\n### T4: Compile Competitive Intelligence\n**Description:** Request the latest competitive intelligence briefing from Diego Fuentes-Ríos, specifically: Acme's recent product launches, pricing moves, wins/losses against Acme, and positioning recommendations.\n\n**Input:** None (Level 0)\n**Output:** Competitive intelligence summary (Notion doc, Slides, or other format).\n**Communication Requirements:**\n- Slack DM to Diego during business hours (09:00–18:00 ET).\n- Accept all response formats (documents, mockups, screenshots, Figma links).\n- Request that he include Gong data on competitive win rate (target >40%, current 34%).\n- Ask about Siobhán's recent competitive deals — Diego and Siobhán collaborate on intel.\n\n**Constraints:**\n- The competitive briefing must include quantitative win rate data alongside positioning narrative.\n- The briefing should balance competitive response with customer storytelling.\n- Do not send requests after 18:00 ET.\n\n---\n\n### T5: Draft QBR Presentation Deck\n**Description:** Compile all inputs from T1–T4 into a QBR presentation deck using Cerulean's standard template. The deck must include:\n1. Executive Summary (lead with the conclusion)\n2. Q1 Revenue Performance (vs. targets, trend, segment breakdown)\n3. Pipeline Analysis (coverage, quality, velocity)\n4. Customer Health (NRR, churn, NPS, at-risk accounts)\n5. Product Roadmap Highlights (shipped Q1, planned Q2)\n6. Competitive Landscape (Acme focus)\n7. Key Wins & Losses (with deal narratives from Siobhán)\n8. Q2 Plan & Resource Asks\n\n**Input:** T1 output (revenue data), T2 output (CS data), T3 output (roadmap), T4 output (competitive)\n**Output:** Draft Google Slides deck, shared with Rachel for review.\n**Communication Requirements:**\n- Share the draft deck link with Rachel via Slack DM for review and feedback.\n- Each section should lead with metrics, then narrative.\n- Data must be precise — use exact dollar amounts, not rounded figures.\n- The executive summary must follow conclusion-first format: conclusion, then 3 supporting points.\n\n**Constraints:**\n- Do NOT include uncommitted roadmap items flagged as tentative.\n- Customer health section must balance at-risk accounts with expansion opportunities.\n- Competitive section must include win rate data alongside positioning narrative.\n- Deck should not exceed 25 slides.\n\n---\n\n### T6: Schedule QBR Prep Meeting\n**Description:** Find a 60-minute slot for Rachel, Priya, Kenji, and Diego to review the draft QBR deck before the formal QBR. Must be scheduled at least 3 business days before the QBR date.\n\n**Input:** None (Level 0, but calendar constraints apply)\n**Output:** Google Calendar invite sent and accepted by all attendees.\n**Communication Requirements:**\n- Check Google Calendar for availability across all 4 attendees.\n- Priya is in PT — slot must be during her working hours (08:00–17:30 PT = 10:00–19:30 CT).\n- Kenji is available 08:30–17:30 CT.\n- Diego is in ET (09:00–18:00 ET = 08:00–17:00 CT).\n- Rachel is available 07:30–18:30 CT.\n- The overlapping window is 10:00–17:00 CT. Propose a slot in this range.\n- Include agenda in the calendar invite body: (1) Revenue walk-through, (2) CS highlights, (3) Competitive positioning, (4) Feedback on deck structure.\n\n**Constraints:**\n- Must not conflict with Rachel's existing customer meetings (she will not reschedule customers for internal meetings).\n- Prefer a morning slot (10:00–11:00 CT) if available.\n\n---\n\n### T7: Circulate Pre-Read Materials\n**Description:** Share the draft QBR deck and supporting materials with all prep meeting attendees at least 48 hours before the meeting.\n\n**Input:** T5 (draft deck completed), T6 (meeting scheduled — need the date to calculate 48-hour window)\n**Output:** Email sent to Rachel, Priya, Kenji, Diego with deck link and supporting documents.\n**Communication Requirements:**\n- Send via Gmail (not Slack — this is a formal pre-read distribution).\n- Subject line: \"QBR Prep: Pre-Read Materials - [Meeting Date]\"\n- Body should include: (1) link to deck, (2) specific sections each person should review, (3) request for written feedback in deck comments by 24 hours before meeting.\n- Direct each reviewer to their area of responsibility: Kenji validates numbers, Diego reviews competitive section, Priya reviews CS section.\n- Flag specific slides requiring Rachel's review.\n\n**Constraints:**\n- Must be sent at least 48 hours before the prep meeting. If the deck isn't ready in time, flag to Rachel and propose rescheduling.\n- Do NOT send to Lena, Tomás, Marcus, or Siobhán — this is a working session pre-read, not the final distribution.\n\n---\n\n### T8: Prep Meeting Follow-Up\n**Description:** After the prep meeting, distribute meeting notes and action items to all attendees. Track feedback items that need to be incorporated into the final deck.\n\n**Input:** T7 (meeting must have occurred — pre-read was circulated, meeting happened)\n**Output:** Meeting notes posted in Slack (#qbr-prep thread) and Notion page with action items.\n**Communication Requirements:**\n- Post summary in Slack within 2 hours of meeting end. Use a thread in the relevant channel.\n- Tag each person next to their action items with a clear deadline.\n- After the meeting, send a brief Slack DM to each attendee asking if they have any additional feedback not raised in the group session.\n- If there are conflicting viewpoints, flag both to Rachel for resolution.\n\n**Constraints:**\n- Action items must have owners and deadlines. Do not create open-ended items.\n- Notes must be factual — do not editorialize on disagreements.\n\n---\n\n### T9: Finalize QBR Deck\n**Description:** Incorporate all feedback from the prep meeting into the final QBR deck. Get Rachel's explicit approval before distribution.\n\n**Input:** T8 (feedback collected and action items completed)\n**Output:** Final Google Slides deck, approved by Rachel.\n**Communication Requirements:**\n- Share updated deck with Rachel via Slack DM with a summary of key changes and request for sign-off.\n- If Rachel requests a change that contradicts another stakeholder's input (e.g., including a tentative roadmap item), flag the tension and ask for a decision.\n\n**Constraints:**\n- Rachel must explicitly approve. A brief affirmative response (verbal, written, or emoji acknowledgment) counts as approval. No response does NOT count.\n- Deck must not exceed 25 slides.\n\n---\n\n### T10: Send QBR Calendar Invite\n**Description:** Schedule the formal QBR meeting and send the calendar invite with the final deck attached. Attendees: Rachel, Lena, Marcus, Priya, Diego, Kenji, Siobhán.\n\n**Input:** T9 (final deck approved)\n**Output:** Google Calendar invite sent with agenda and deck link.\n**Communication Requirements:**\n- 90-minute meeting. Find a slot that works for all 7 attendees.\n- Check Lena's calendar first — she is typically the most constrained.\n- If Siobhán has a conflict, check with Rachel whether to reschedule or proceed without her.\n- Calendar invite body must include: (1) Agenda with time allocations, (2) Link to final deck, (3) \"Please review slides 1–5 (executive summary) before the meeting.\"\n- Agenda must lead with the executive summary.\n\n**Constraints:**\n- Must accommodate Priya's PT timezone (meeting between 10:00–17:00 CT).\n- Check Lena's calendar for travel blocks.\n- Do NOT schedule on the same day as Cerulean's weekly all-hands (check calendar for recurring events).\n\n---\n\n### T11: Executive Pre-Brief to Lena\n**Description:** Send Lena Ström a pre-brief email 24 hours before the QBR with executive summary, key talking points, and sensitive topics she should be prepared for.\n\n**Input:** T9 (final deck approved)\n**Output:** Pre-brief email sent to Lena.\n**Communication Requirements:**\n- Send via email. Subject: \"QBR Pre-Brief: Key Themes & Sensitive Topics.\"\n- Keep it concise. 3 sections max:\n  1. **Bottom line:** One sentence summary of Q1 performance.\n  2. **Three things to know:** Bullet points — mix of wins and risks.\n  3. **Sensitive topics:** Items to be prepared to discuss (e.g., Q4 miss root cause, Acme pricing pressure, NRR gap).\n- Include: \"Rachel has prepared talking points on [specific topic] and can walk you through the data.\"\n\n**Constraints:**\n- Must be sent exactly 24 hours before the QBR.\n- Must include any at-risk enterprise accounts.\n- Format must be direct and conclusion-first — no filler.\n\n---\n\n### T12: Post-QBR Action Items\n**Description:** After the QBR meeting, compile action items, assign owners, set deadlines, and distribute to all attendees. Create follow-up tasks in Notion.\n\n**Input:** T10 (QBR meeting must have occurred)\n**Output:** (1) Email to all QBR attendees with action items, (2) Notion page with tracked tasks.\n**Communication Requirements:**\n- Send email within 4 hours of QBR conclusion. Subject: \"Q1 QBR: Action Items & Next Steps.\"\n- Each action item must have: description, owner, deadline, and priority level (if assigned during the meeting).\n- Post a brief summary in Slack so the broader team has visibility into outcomes.\n- If leadership made strategic pronouncements during the QBR, include them as quotes in the action items email.\n- Create Notion tasks for each action item with links to relevant data.\n\n**Constraints:**\n- Action items must reflect what was actually decided, not what the agent thinks should happen.\n- If leadership assigned something to a specific person, that assignment is final — do not redistribute.\n- Capture any financial follow-up items using precise language as stated in the meeting.\n- Prominently feature the top 3 priorities and their owners, as determined during the QBR.\n\n---\n\n## DAG Visualization (Mermaid)\n\n```mermaid\ngraph TD\n    T1[\"T1: Pull Revenue Metrics<br/>(Kenji)\"]\n    T2[\"T2: Collect CS Health Scores<br/>(Priya)\"]\n    T3[\"T3: Gather Product Roadmap<br/>(Tomás)\"]\n    T4[\"T4: Compile Competitive Intel<br/>(Diego)\"]\n    T5[\"T5: Draft QBR Deck\"]\n    T6[\"T6: Schedule Prep Meeting\"]\n    T7[\"T7: Circulate Pre-Read\"]\n    T8[\"T8: Prep Meeting Follow-Up\"]\n    T9[\"T9: Finalize QBR Deck\"]\n    T10[\"T10: Send QBR Invite\"]\n    T11[\"T11: Executive Pre-Brief<br/>(Lena)\"]\n    T12[\"T12: Post-QBR Actions\"]\n\n    T1 --> T5\n    T2 --> T5\n    T3 --> T5\n    T4 --> T5\n    T5 --> T7\n    T6 --> T7\n    T7 --> T8\n    T8 --> T9\n    T9 --> T10\n    T9 --> T11\n    T10 --> T12\n\n    style T1 fill:#4A90D9,color:#fff\n    style T2 fill:#4A90D9,color:#fff\n    style T3 fill:#4A90D9,color:#fff\n    style T4 fill:#4A90D9,color:#fff\n    style T6 fill:#4A90D9,color:#fff\n    style T5 fill:#F5A623,color:#fff\n    style T7 fill:#F5A623,color:#fff\n    style T8 fill:#7B68EE,color:#fff\n    style T9 fill:#7B68EE,color:#fff\n    style T10 fill:#D0021B,color:#fff\n    style T11 fill:#D0021B,color:#fff\n    style T12 fill:#D0021B,color:#fff\n```\n\n**Legend:**\n- Blue: Data Gathering (Level 0)\n- Orange: Preparation (Levels 1-2)\n- Purple: Refinement (Levels 3-4)\n- Red: Execution (Levels 4-5)\n","verifiers_code":"\"\"\"\nScenario 1: Cerulean Analytics - Q1 QBR Verifiers\n===================================================\n\nProgrammatic verifiers for each task in the QBR preparation DAG.\nThese verifiers run against an agent's action log (a structured record of\nevery tool call the agent made: Slack messages, emails, calendar invites, etc.)\n\nUsage:\n    from verifiers import QBRVerifier\n    verifier = QBRVerifier(action_log)\n    results = verifier.run_all()\n\nThe action_log is expected to be a list of dicts, each representing one tool\naction the agent performed. See ActionLog schema below.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom dataclasses import dataclass, field\nfrom datetime import datetime, timedelta\nfrom enum import Enum\nfrom typing import Any\n\n\n# =============================================================================\n# Action Log Schema\n# =============================================================================\n\nclass ActionType(Enum):\n    SLACK_MESSAGE = \"slack_message\"\n    EMAIL = \"email\"\n    CALENDAR_INVITE = \"calendar_invite\"\n    DOCUMENT_CREATE = \"document_create\"\n    DOCUMENT_EDIT = \"document_edit\"\n    DOCUMENT_SHARE = \"document_share\"\n    NOTION_TASK = \"notion_task\"\n    JIRA_TICKET = \"jira_ticket\"\n    FILE_UPLOAD = \"file_upload\"\n\n\n@dataclass\nclass Action:\n    \"\"\"Represents a single agent action from the tool-call log.\"\"\"\n    action_type: ActionType\n    timestamp: datetime\n    tool: str  # e.g., \"slack\", \"gmail\", \"google_calendar\", \"notion\"\n    recipient: str | None = None  # persona_id or channel name\n    channel: str | None = None  # \"dm\", \"channel\", or channel name\n    subject: str | None = None\n    body: str | None = None\n    attachments: list[str] = field(default_factory=list)\n    attendees: list[str] = field(default_factory=list)\n    duration_minutes: int | None = None\n    start_time: datetime | None = None\n    metadata: dict[str, Any] = field(default_factory=dict)\n\n\n@dataclass\nclass VerifierResult:\n    \"\"\"Result of a single programmatic check.\"\"\"\n    check_id: str\n    name: str\n    passed: bool\n    details: str\n    severity: str = \"error\"  # \"error\", \"warning\", \"info\"\n\n\n@dataclass\nclass RubricScore:\n    \"\"\"Result of a rubric evaluation (for LLM-as-judge).\"\"\"\n    rubric_id: str\n    name: str\n    dimension: str\n    score: int  # 1-5\n    justification: str\n    evidence: list[str] = field(default_factory=list)\n\n\n# =============================================================================\n# Persona Registry\n# =============================================================================\n\nPERSONAS = {\n    \"rachel_whitford\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (7, 30, 18, 30),  # (start_h, start_m, end_h, end_m)\n        \"preferred_channel\": \"slack\",\n        \"slack_style\": \"terse\",\n    },\n    \"marcus_tan_ohara\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (8, 0, 18, 0),\n        \"preferred_channel\": \"email\",\n        \"email_style\": \"formal\",\n    },\n    \"priya_narayanan\": {\n        \"timezone\": \"America/Los_Angeles\",\n        \"working_hours\": (8, 0, 17, 30),\n        \"preferred_channel\": \"slack\",\n        \"slack_style\": \"warm\",\n    },\n    \"diego_fuentes_rios\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (9, 0, 18, 0),\n        \"preferred_channel\": \"slack\",\n        \"slack_style\": \"energetic\",\n        \"hard_boundary_after_hours\": True,\n    },\n    \"kenji_watanabe\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (8, 30, 17, 30),\n        \"preferred_channel\": \"slack\",\n        \"slack_style\": \"terse\",\n    },\n    \"siobhan_omalley\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (8, 0, 19, 0),\n        \"preferred_channel\": \"slack\",\n        \"slack_style\": \"narrative\",\n    },\n    \"tomas_rezende\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (9, 0, 18, 0),\n        \"preferred_channel\": \"email\",\n        \"email_style\": \"structured\",\n    },\n    \"lena_strom\": {\n        \"timezone\": \"America/Chicago\",\n        \"working_hours\": (7, 0, 18, 0),\n        \"preferred_channel\": \"email\",\n        \"email_style\": \"brief_directive\",\n    },\n}\n\n# Cross-timezone feasible window for all-hands meetings (CT)\nALL_HANDS_WINDOW_CT = (10, 0, 17, 0)\n\n\n# =============================================================================\n# T1 Verifiers: Pull Revenue & Pipeline Metrics\n# =============================================================================\n\nclass T1Verifier:\n    \"\"\"Verify: Agent correctly requested revenue data from Kenji.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.kenji_messages = [\n            a for a in actions\n            if a.recipient == \"kenji_watanabe\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_slack_message_sent(self) -> VerifierResult:\n        \"\"\"T1_PC1: A Slack DM was sent to kenji_watanabe.\"\"\"\n        passed = len(self.kenji_messages) > 0\n        return VerifierResult(\n            check_id=\"T1_PC1\",\n            name=\"slack_message_sent\",\n            passed=passed,\n            details=(\n                f\"Found {len(self.kenji_messages)} Slack message(s) to Kenji.\"\n                if passed else \"No Slack message sent to kenji_watanabe.\"\n            ),\n        )\n\n    def check_correct_channel(self) -> VerifierResult:\n        \"\"\"T1_PC2: Message was sent as DM, not public channel.\"\"\"\n        dm_messages = [m for m in self.kenji_messages if m.channel == \"dm\"]\n        channel_messages = [m for m in self.kenji_messages if m.channel != \"dm\"]\n        passed = len(dm_messages) > 0 and len(channel_messages) == 0\n        return VerifierResult(\n            check_id=\"T1_PC2\",\n            name=\"correct_channel\",\n            passed=passed,\n            details=(\n                \"Request sent as DM (correct).\"\n                if passed else\n                f\"Found {len(channel_messages)} message(s) in public channels. \"\n                \"Kenji prefers DMs for data requests.\"\n            ),\n        )\n\n    def check_data_points_specified(self) -> VerifierResult:\n        \"\"\"T1_PC3: Message includes all required data points.\"\"\"\n        required_keywords = {\n            \"net_new_arr\": [r\"net\\s*new\\s*arr\", r\"new\\s*arr\", r\"net\\s*arr\"],\n            \"pipeline_coverage_ratio\": [r\"pipeline\\s*coverage\", r\"coverage\\s*ratio\"],\n            \"win_rate_by_segment\": [r\"win\\s*rate\", r\"win/loss\"],\n            \"average_deal_cycle\": [r\"(deal|sales)\\s*cycle\", r\"cycle\\s*length\"],\n            \"top_10_deals\": [r\"top\\s*\\d+\\s*deals\", r\"largest\\s*deals\"],\n            \"deals_lost_to_acme\": [r\"(lost|loss).{0,20}acme\", r\"acme.{0,20}(lost|loss)\"],\n        }\n        combined_body = \" \".join(\n            (m.body or \"\").lower() for m in self.kenji_messages\n        )\n        found = {}\n        missing = []\n        for key, patterns in required_keywords.items():\n            matched = any(re.search(p, combined_body) for p in patterns)\n            found[key] = matched\n            if not matched:\n                missing.append(key)\n\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T1_PC3\",\n            name=\"data_points_specified\",\n            passed=passed,\n            details=(\n                \"All 6 required data points specified.\"\n                if passed else\n                f\"Missing data points: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_deadline_included(self) -> VerifierResult:\n        \"\"\"T1_PC4: Message includes a specific deadline.\"\"\"\n        combined_body = \" \".join(\n            (m.body or \"\").lower() for m in self.kenji_messages\n        )\n        # Look for date patterns, \"by [day]\", \"by EOD\", specific dates\n        deadline_patterns = [\n            r\"by\\s+(monday|tuesday|wednesday|thursday|friday|eod|end\\s*of\\s*day)\",\n            r\"by\\s+\\d{1,2}/\\d{1,2}\",\n            r\"deadline[:\\s]\",\n            r\"need\\s*(this\\s*)?by\",\n            r\"due\\s*(by\\s*)?\\d\",\n            r\"\\d{1,2}(st|nd|rd|th)\\b\",\n        ]\n        has_deadline = any(\n            re.search(p, combined_body) for p in deadline_patterns\n        )\n        return VerifierResult(\n            check_id=\"T1_PC4\",\n            name=\"deadline_included\",\n            passed=has_deadline,\n            details=(\n                \"Deadline found in message.\"\n                if has_deadline else\n                \"No specific deadline found. Avoid 'ASAP' - use a date/time.\"\n            ),\n            severity=\"warning\" if not has_deadline else \"info\",\n        )\n\n    def check_response_acknowledged(self) -> VerifierResult:\n        \"\"\"T1_PC5: Agent acknowledged Kenji's response.\"\"\"\n        # Check if there's any action AFTER receiving Kenji's data\n        # (e.g., a follow-up message, emoji reaction, or using the data)\n        kenji_interactions = [\n            a for a in self.actions\n            if a.recipient == \"kenji_watanabe\" or\n            a.metadata.get(\"in_response_to\") == \"kenji_watanabe\"\n        ]\n        # Simplistic: if there are >1 interactions with Kenji, assume acknowledgment\n        passed = len(kenji_interactions) > 1\n        return VerifierResult(\n            check_id=\"T1_PC5\",\n            name=\"response_acknowledged\",\n            passed=passed,\n            details=(\n                \"Agent acknowledged Kenji's response.\"\n                if passed else\n                \"No acknowledgment of Kenji's response detected.\"\n            ),\n            severity=\"warning\",\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_slack_message_sent(),\n            self.check_correct_channel(),\n            self.check_data_points_specified(),\n            self.check_deadline_included(),\n            self.check_response_acknowledged(),\n        ]\n\n\n# =============================================================================\n# T2 Verifiers: Collect Customer Health Scores\n# =============================================================================\n\nclass T2Verifier:\n    \"\"\"Verify: Agent correctly requested CS data from Priya.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.priya_messages = [\n            a for a in actions\n            if a.recipient == \"priya_narayanan\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_slack_message_sent(self) -> VerifierResult:\n        \"\"\"T2_PC1: Slack DM sent to priya_narayanan.\"\"\"\n        passed = len(self.priya_messages) > 0\n        return VerifierResult(\n            check_id=\"T2_PC1\",\n            name=\"slack_message_sent\",\n            passed=passed,\n            details=(\n                f\"Found {len(self.priya_messages)} message(s) to Priya.\"\n                if passed else \"No Slack message s
