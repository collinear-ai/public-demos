NTERNAL - CONFIDENTIAL\"\n- Attach: (1) NovaStar's completed SIG Lite questionnaire, (2) SOC 2 Type II report, (3) penetration test results, (4) data flow diagram.\n- Standard security review takes 2–3 weeks. Build this into the timeline.\n- If the security review raises concerns, treat them as a blocker. Schedule a meeting between the Security team and NovaStar's security team to resolve.\n- Track findings in ServiceNow GRC module with ticket IDs.\n\n**Constraints:**\n- Security approval requires ALL of the following: SOC 2 Type II, completed SIG questionnaire, evidence of encryption at rest and in transit, breach notification procedures, and a BAA (handled in T4).\n- If NovaStar's documentation is incomplete, communicate with their security team via Ananya (keep vendor back-and-forth separate from the internal security review).\n- Do NOT forward internal security findings to NovaStar without Ananya's approval.\n\n---\n\n### T2: Data Schema Mapping\n**Description:** Work with Min-Ji Park to document the complete data schema mapping between MedBridge RIS and NovaStar CloudRad. This includes patient demographics, study records, report data, scheduling data, and billing codes.\n\n**Input:** None (Level 0). MedBridge schema documentation is sparse - reverse-engineering from the database will be required.\n**Output:** Completed schema mapping document in Confluence, validated by Min-Ji and reviewed by Dr. Lindqvist's lead technologist (for clinical data accuracy).\n**Communication Requirements:**\n- Coordinate with Min-Ji via Slack in the #cloudrad-migration channel.\n- For clinical data validation, email Dr. Lindqvist's lead technologist (Patricia Vaughn). Do NOT email Dr. Lindqvist directly for schema-level details.\n- Create Jira ticket: \"CLOUDRAD-101: Data Schema Mapping\" with sub-tasks for each data domain (demographics, studies, reports, scheduling, billing).\n\n**Constraints:**\n- MedBridge has no API documentation - the vendor was acquired by Siemens Healthineers and original engineers left. Database access will be needed.\n- Schema mapping must account for PHI fields - Geraldine needs to review which fields require special handling under 42 CFR Part 2 (substance abuse records).\n- For staging, a simple EC2 + RDS setup is sufficient unless otherwise approved by Ananya. Prefer the simplest approach that meets requirements.\n\n---\n\n### T3: Stakeholder Kickoff Meeting\n**Description:** Schedule and coordinate a 90-minute kickoff meeting with ALL project stakeholders. This is the formal start of the migration project and sets expectations for timeline, roles, and decision-making.\n\n**Input:** None (Level 0).\n**Output:** (1) Calendar invite sent and accepted, (2) Agenda distributed, (3) Post-meeting notes with RACI matrix and key decisions.\n**Communication Requirements:**\n- **Scheduling:** Use Outlook Calendar. Must accommodate:\n  - Dr. Lindqvist: 07:00–16:00 ET only, no Tuesdays (reads at the satellite facility)\n  - Dr. Achebe: NOT on Tuesday/Thursday (clinic days)\n  - Frank: 07:30–17:00 ET\n  - Hector: 08:30–17:00 ET, no flexibility\n  - Carla: 08:00–17:30 ET\n  - Min-Ji: 08:00–17:00 ET\n  - Geraldine: 08:00–17:00 ET\n  - Ananya: 07:00–17:30 ET\n  - **Feasible window: Monday, Wednesday, or Friday, 08:30–10:00 ET or 13:00–14:30 ET**\n- Send calendar invite via Outlook with detailed agenda:\n  1. Project overview and business case (Ananya, 10 min)\n  2. Clinical requirements and workflow impact (Dr. Achebe & Dr. Lindqvist, 20 min)\n  3. Technical architecture and timeline (Min-Ji, 15 min)\n  4. Security and compliance requirements (Frank & Geraldine, 15 min)\n  5. Procurement and contract status (Hector, 10 min)\n  6. Project plan and governance (Carla, 15 min)\n  7. Q&A and next steps (5 min)\n- Prepare a 1-page summary to distribute at the start of the meeting.\n\n**Constraints:**\n- Must be in-person at the Charlotte campus (Dr. Lindqvist does not use video calls for project meetings).\n- Book a conference room with a projector and whiteboard.\n- Avoid scheduling within 2 weeks of the HITRUST readiness assessment (check the project calendar).\n\n---\n\n### T4: BAA Execution\n**Description:** Coordinate the execution of a Business Associate Agreement (BAA) between Pinnacle Health Systems and NovaStar Health IT. Requires review by Geraldine (compliance), Frank (security terms), and Hector (commercial terms), plus legal review and DocuSign execution.\n\n**Input:** T1 (security review must be complete before BAA can be signed).\n**Output:** Fully executed BAA (both parties signed) filed in Compliance 360.\n**Communication Requirements:**\n- **Geraldine:** Email the BAA draft. She will review for regulatory compliance (HIPAA, HITRUST, 42 CFR Part 2 provisions). Allow 1–2 weeks.\n- **Frank:** Email separately (he reviews security-specific terms: encryption requirements, breach notification timeframes, audit rights, data destruction obligations). He will not review until T1 is complete.\n- **Hector:** Send the BAA for commercial term review via Coupa. He reviews liability caps, indemnification, and insurance requirements.\n- **Legal:** Route through Geraldine - she has the relationship with General Counsel.\n- **DocuSign:** Once all reviews are complete, create a DocuSign envelope with signing order: (1) Geraldine (compliance attestation), (2) VP of IT (Pinnacle signatory), (3) NovaStar's designated signatory.\n- Track all reviews in a shared Jira ticket with sub-tasks for each reviewer.\n\n**Constraints:**\n- The BAA must include 42 CFR Part 2 provisions - Pinnacle has substance abuse treatment records that require additional protections beyond standard HIPAA.\n- The BAA must specify breach notification within 24 hours (stricter than HIPAA's 60-day requirement - this is Pinnacle's internal policy).\n- If NovaStar pushes back on liability caps, escalate to Ananya before involving legal.\n- Average legal review: 3 weeks. Pre-review by Geraldine with a \"recommended for approval\" memo can expedite.\n\n---\n\n### T5: Provision Staging Environment\n**Description:** Coordinate the provisioning of a staging environment in AWS for CloudRad. The environment must meet security requirements and mirror production network topology.\n\n**Input:** T2 (schema mapping complete - need to know data structure for database provisioning), T4 (BAA signed - cannot provision environment for a vendor's software without executed BAA per compliance policy).\n**Output:** Staging environment URL and credentials (shared securely), validated by Min-Ji, security-approved by Frank.\n**Communication Requirements:**\n- Coordinate with Min-Ji via Slack in #cloudrad-migration with requirements:\n  - AWS GovCloud region (us-gov-west-1) - required for HIPAA workloads\n  - VPC isolation (no peering with production VPC)\n  - Encryption at rest (AWS KMS, customer-managed keys)\n  - Encryption in transit (TLS 1.2+)\n  - CloudWatch audit logging enabled\n  - Network ACLs matching production\n- Once the Terraform plan is ready, it must be reviewed and approved before applying.\n- Once provisioned, send environment details to NovaStar's implementation team via encrypted email (coordinate with Security on approved method).\n- Create Jira ticket: \"CLOUDRAD-105: Staging Environment Provisioning\" with sub-tasks for VPC, compute, database, security groups, and validation.\n\n**Constraints:**\n- Must be in AWS GovCloud - standard AWS regions are not approved for PHI workloads.\n- Security must approve the security architecture before provisioning. Share the Terraform plan with Security via encrypted email for review.\n- Do NOT share AWS credentials via Slack. Use Pinnacle's approved secrets management (AWS Secrets Manager).\n- For staging, a simple EC2 + RDS setup is sufficient unless otherwise approved by Ananya.\n\n---\n\n### T6: Test Data Migration (Staging)\n**Description:** Coordinate the execution of a test data migration from MedBridge RIS to CloudRad staging environment using anonymized/de-identified data. Validate data integrity post-migration.\n\n**Input:** T5 (staging environment provisioned and approved).\n**Output:** (1) Migration execution report, (2) Data validation results (record counts, field mapping accuracy, integrity checks), (3) Issues log in Jira.\n**Communication Requirements:**\n- Coordinate with Min-Ji via Slack to execute the migration using the schema mapping from T2.\n- Coordinate with NovaStar's implementation team for CloudRad-side configuration (they provide import scripts).\n- After migration, coordinate validation:\n  - **Min-Ji:** Technical validation (record counts, NULL checks, referential integrity, performance benchmarks)\n  - **Patricia Vaughn (Dr. Lindqvist's lead tech):** Clinical data validation (correct patient-study associations, report integrity, scheduling accuracy). Contact via Outlook.\n- Report results to Ananya, Carla (for project tracking), and Frank (for security validation of the migration process).\n- Create Jira tickets for any data issues found, tagged with severity (P1: data loss/corruption, P2: field mapping error, P3: formatting/display issue).\n\n**Constraints:**\n- Data MUST be de-identified before loading into staging. Use Pinnacle's approved de-identification tool (Safe Harbor method, 18 identifiers removed per 45 CFR 164.514(b)).\n- Geraldine must confirm that the de-identification method is sufficient before migration begins. Send her a brief email describing the method and requesting written approval.\n- If data integrity issues are found, do NOT proceed to UAT (T7) until all P1 and P2 issues are resolved.\n- Dr. Lindqvist should NOT be involved in test migration - involve his lead technologist only. Reserve his attention for UAT.\n\n---\n\n### T7: User Acceptance Testing (UAT)\n**Description:** Coordinate UAT sessions with Dr. Lindqvist's radiology department. Schedule sessions across different shifts to capture feedback from radiologists, technologists, and scheduling staff.\n\n**Input:** T6 (test migration complete with all P1/P2 issues resolved).\n**Output:** (1) UAT results report, (2) Feedback summary with prioritized findings, (3) Go/no-go recommendation from Dr. Lindqvist.\n**Communication Requirements:**\n- **Dr. Lindqvist:** Email (he does not use Slack). Include: dates/times, what his team will test, what is needed from him (attend at least Session 1, designate a team lead for Sessions 2–3).\n  - Subject: \"CloudRad UAT: 3 Sessions Scheduled - Your Team's Input Needed\"\n  - Prepare a printed 1-page testing checklist the team can use during sessions.\n- **Schedule 3 UAT sessions:**\n  - Session 1: Morning shift (07:00–09:00 ET, Monday) - radiologists who start early, Dr. Lindqvist attends\n  - Session 2: Day shift (10:00–12:00 ET, Wednesday) - technologists and scheduling staff\n  - Session 3: Evening/overnight (16:00–18:00 ET, Friday) - to capture off-hours workflow differences\n- **Feedback collection:** Use a structured Jira form (not freeform):\n  - Workflow step tested\n  - Expected behavior\n  - Actual behavior\n  - Impact (1–5 scale: 1=cosmetic, 5=blocks patient care)\n  - Screenshot (if applicable)\n- Report results to Carla (project tracking) and Ananya (technical decision-making).\n\n**Constraints:**\n- Dr. Lindqvist's team reads studies on weekends - do NOT schedule UAT on Saturday/Sunday.\n- UAT environment must have realistic study data (de-identified but structurally representative of radiology workflows).\n- Any finding rated \"5 - blocks patient care\" is an automatic go-live blocker. Escalate immediately to Ananya and Dr. Achebe.\n- Enhancement requests that are not patient safety issues should be documented and classified as \"post-go-live enhancement.\"\n\n---\n\n### T8: Draft Communication Plan\n**Description:** Create a go-live communication plan covering all stakeholders: clinical staff, IT support, department heads, and executives.\n\n**Input:** T3 (kickoff meeting decisions inform the communication approach and stakeholder list).\n**Output:** Communication plan document in Confluence, reviewed by Dr. Achebe and Carla.\n**Communication Requirements:**\n- **Carla Bianchi:** Slack or email - she provides the project template for communication plans. Align the communication plan timeline with the weekly project status email cadence.\n- **Dr. Achebe:** Email. She will draft the all-staff clinical communication. Ask her to review the plan and draft the physician-facing message.\n  - Dr. Achebe is NOT available on Tuesday/Thursday (clinic days). Send requests Mon/Wed/Fri.\n  - Allow 3–5 business days for review.\n- **Communication plan must include:**\n  1. **All-staff email from Dr. Achebe** (clinical credibility) - sent 2 weeks before go-live\n  2. **Department-specific Slack announcements** (IT channels) - sent 1 week before\n  3. **Printed quick-reference guides** for radiology (post in reading rooms for staff who do not monitor Slack or email for IT updates)\n  4. **IT support escalation paths** (tiered: L1 ServiceNow, L2 Min-Ji, L3 NovaStar support, emergency pager to Ananya)\n  5. **FAQ document** addressing common concerns (e.g., workflow impact, click-count changes)\n  6. **Go-live day timeline** (hour-by-hour, posted in #cloudrad-migration Slack and emailed to all stakeholders)\n- Dr. Lindqvist must receive communications via email AND printed copy (he does not use Slack).\n\n**Constraints:**\n- Do NOT send any communications to clinical staff without Dr. Achebe's review and approval.\n- Printed materials must be reviewed by Carla for brand consistency with Pinnacle's communications standards.\n- Frank must review the escalation paths to confirm security incident reporting is included.\n\n---\n\n### T9: Schedule Go-Live Window\n**Description:** Identify and schedule a go-live maintenance window that minimizes clinical disruption, and obtain sign-off from clinical and IT leadership.\n\n**Input:** T7 (UAT complete with go/no-go recommendation), T8 (communication plan ready for execution).\n**Output:** (1) Confirmed go-live date/time, (2) Calendar invites for war room participants, (3) Sign-off emails from Dr. Lindqvist, Dr. Achebe, and Ananya.\n**Communication Requirements:**\n- **Ananya:** Slack. She will assess IT readiness and propose candidate windows.\n- **Dr. Lindqvist:** Email (he does not use Slack). Provide a clear summary: \"Your team will experience [X hours] of read-only access to MedBridge during migration, followed by full CloudRad access.\"\n- **Dr. Achebe:** Email with clinical impact assessment. She needs to sign off that patient care continuity is maintained.\n- **War room logistics:**\n  - Book a physical war room at the Charlotte campus with: large displays, whiteboard, power strips, coffee.\n  - Create a Slack channel: #cloudrad-golive-warroom\n  - War room participants: Ananya, Min-Ji, NovaStar implementation lead (virtual), Carla (for status tracking), Frank (on-call for security).\n  - Calendar invites for the full migration window + 4 hours buffer.\n\n**Constraints:**\n- Go-live must be at least 6 weeks before HITRUST recertification assessment (September 2026 deadline).\n- MedBridge must remain read-only (not fully offline) during migration - radiology needs access to historical studies.\n- NovaStar requires 48-hour advance notice to staff their implementation support team.\n- Dr. Lindqvist's sign-off is mandatory. An email stating \"fine\" or \"agreed\" counts. No response does NOT count.\n- Prefer early Saturday AM (02:00–08:00 ET) when study volume is lowest, to minimize clinical disruption.\n\n---\n\n### T10: Execute Production Migration\n**Description:** Coordinate the production migration during the approved go-live window. Manage real-time communication, status tracking, and incident response.\n\n**Input:** T9 (go-live window confirmed and all sign-offs received).\n**Output:** (1) Migration completion confirmation, (2) Real-time status log (Slack), (3) Incident log (if any).\n**Communication Requirements:**\n- **Pre-migration (T-24 hours):**\n  - Send go-live reminder to all stakeholders via Outlook\n  - Post go-live timeline in #cloudrad-golive-warroom\n  - Confirm NovaStar support team availability\n  - Min-Ji: final infrastructure check (Slack confirmation)\n- **During migration:**\n  - Post status updates to #cloudrad-golive-warroom every 30 minutes: \"Phase X of Y complete. [Status]. ETA: [time].\"\n  - Ananya is the escalation point. If a P1 issue arises, she decides: continue, pause, or rollback.\n  - Contact Security immediately via Slack if any security concern surfaces during migration.\n  - Do NOT email Dr. Lindqvist during migration - he will contact Ananya directly if he needs an update.\n- **Post-migration (immediate):**\n  - \"Migration complete\" message to #cloudrad-golive-warroom\n  - Email to all stakeholders: \"CloudRad is now live. [Brief status]. Support channels: [details].\"\n  - Notify Dr. Lindqvist via SMS/page (confirm with Ananya if a phone call is needed).\n\n**Constraints:**\n- Rollback plan must be documented and tested before migration starts. Min-Ji owns the rollback procedure.\n- If migration exceeds the approved window by >2 hours, Ananya must decide: extend or rollback. Do NOT make this decision autonomously.\n- All migration activities must be logged in Jira (CLOUDRAD-110: Production Migration) with timestamps.\n- PHI is being transferred. All data in transit must be encrypted (TLS 1.2+) with access logged per HIPAA requirements.\n\n---\n\n### T11: Post-Migration Validation\n**Description:** Run validation checks on the production CloudRad system covering data integrity, system performance, security posture, and clinical workflow functionality.\n\n**Input:** T10 (migration complete).\n**Output:** (1) Validation report, (2) Security scan results, (3) Performance baseline, (4) Go/no-go for clinical use.\n**Communication Requirements:**\n- **Min-Ji:** Slack. Run technical validation:\n  - Record count comparison (MedBridge vs. CloudRad)\n  - Critical field validation (patient MRN, study accession numbers, report content)\n  - Performance benchmarks (page load time <1 second, search response <2 seconds)\n  - Integration tests: PACS (Sectra) <> CloudRad, Epic <> CloudRad (HL7/FHIR interfaces)\n- **Frank:** Email. Request post-migration security scan:\n  - Vulnerability scan (Qualys)\n  - Access control verification\n  - Audit log validation\n  - PHI exposure check\n- **Dr. Lindqvist's lead technologist (Patricia Vaughn):** Email. Clinical spot-check:\n  - Pull 10 random historical studies - verify they appear correctly in CloudRad\n  - Test the full radiology workflow: order > schedule > acquire > read > report > sign\n  - Verify PowerScribe (dictation) integration\n- Report all results to Ananya and Carla. If any critical findings, escalate to Dr. Achebe.\n- Create a validation summary in Confluence: CLOUDRAD-111: Post-Migration Validation Results.\n\n**Constraints:**\n- CloudRad must NOT go live for clinical use until Min-Ji confirms data integrity AND Frank confirms security posture.\n- If performance is below acceptable thresholds (e.g., 3+ second page loads), this is a blocker. Coordinate with NovaStar support.\n- Integration failures between CloudRad and Epic or PACS are P1 blockers - radiology cannot function without these integrations.\n- Security scan takes 24–48 hours. Build this into the timeline.\n\n---\n\n### T12: Go-Live Confirmation & Handoff\n**Description:** Send formal go-live confirmation to all stakeholders, activate the communication plan (T8), and transition from project mode to operational support.\n\n**Input:** T11 (validation complete, all checks passed).\n**Output:** (1) Go-live confirmation email, (2) Support documentation activated, (3) ServiceNow transition complete, (4) First-week monitoring plan.\n**Communication Requirements:**\n- **All-stakeholder email (Outlook):**\n  - From: Ananya Bhatt (with Dr. Achebe cc'd for clinical credibility)\n  - Subject: \"CloudRad Go-Live Confirmation - Pinnacle Health Systems\"\n  - Include: system status (status: active), support escalation paths, known issues (if any), first-week monitoring plan, link to quick-reference guide\n- **Dr. Lindqvist:** Separate email AND phone call from Ananya. Include: what his team should expect on their first shift, who to call if something goes wrong, commitment to performance monitoring. His lead technologist should receive the detailed technical handoff.\n- **Dr. Achebe:** Email with clinical go-live talking points she can share with other department heads and CMO.\n- **Frank:** Email confirming security validation passed, audit trail documentation, and ongoing monitoring plan.\n- **Carla:** Slack with project closure checklist items.\n- **Hector:** Email confirming SLA monitoring is active for NovaStar contract.\n- **Geraldine:** Email confirming HIPAA documentation is complete and filed in Compliance 360.\n- **ServiceNow:** Create ongoing support tickets template, transition from project Jira to operational ServiceNow for support requests.\n- **Slack:** Post in #it-ops and #cloudrad-migration: \"CloudRad is live (status: active). MedBridge is now read-only for historical access. Support: [details].\"\n\n**Constraints:**\n- Do NOT declare go-live until Ananya, Frank, and Dr. Achebe all confirm in writing.\n- MedBridge must remain accessible in read-only mode for 90 days (per data retention policy and compliance requirement).\n- First-week monitoring plan must include: 24/7 on-call coverage (Min-Ji and Ananya alternating), daily performance reports, daily check-in with Dr. Lindqvist's lead tech, and NovaStar support escalation path.\n- Weekly project status email should transition from \"project update\" to \"post-go-live stabilization\" format.\n\n---\n\n## DAG Visualization (Mermaid)\n\n```mermaid\ngraph TD\n    T1[\"T1: Vendor Security Review<br/>(Frank, 2–3 weeks)\"]\n    T2[\"T2: Data Schema Mapping<br/>(Min-Ji, 1–2 weeks)\"]\n    T3[\"T3: Stakeholder Kickoff<br/>(All, 2 days)\"]\n    T4[\"T4: BAA Execution<br/>(Geraldine, Hector, 2–3 weeks)\"]\n    T5[\"T5: Provision Staging<br/>(Min-Ji, 3–5 days)\"]\n    T6[\"T6: Test Data Migration<br/>(Min-Ji, 1 week)\"]\n    T7[\"T7: User Acceptance Testing<br/>(Dr. Lindqvist's team, 2 weeks)\"]\n    T8[\"T8: Communication Plan<br/>(Dr. Achebe, Carla, 1 week)\"]\n    T9[\"T9: Schedule Go-Live<br/>(3 days)\"]\n    T10[\"T10: Production Migration<br/>(Weekend, 1 day)\"]\n    T11[\"T11: Post-Migration Validation<br/>(2 days)\"]\n    T12[\"T12: Go-Live Confirmation<br/>(1 day)\"]\n\n    T1 --> T4\n    T2 --> T5\n    T4 --> T5\n    T5 --> T6\n    T6 --> T7\n    T3 --> T8\n    T7 --> T9\n    T8 --> T9\n    T9 --> T10\n    T10 --> T11\n    T11 --> T12\n\n    style T1 fill:#2E86AB,color:#fff\n    style T2 fill:#2E86AB,color:#fff\n    style T3 fill:#2E86AB,color:#fff\n    style T4 fill:#A23B72,color:#fff\n    style T8 fill:#A23B72,color:#fff\n    style T5 fill:#F18F01,color:#fff\n    style T6 fill:#F18F01,color:#fff\n    style T7 fill:#F18F01,color:#fff\n    style T9 fill:#C73E1D,color:#fff\n    style T10 fill:#C73E1D,color:#fff\n    style T11 fill:#C73E1D,color:#fff\n    style T12 fill:#C73E1D,color:#fff\n```\n\n**Legend:**\n- Blue (#2E86AB): Phase 1 - Readiness & Approvals\n- Purple (#A23B72): Phase 1–2 - Compliance & Communication\n- Orange (#F18F01): Phase 2 - Staging & Testing\n- Red (#C73E1D): Phase 3 - Go-Live & Stabilization\n\n---\n\n## Critical Path\n\nThe critical path runs through: **T1 → T4 → T5 → T6 → T7 → T9 → T10 → T11 → T12**\n\nThis path is 10–13 weeks, leaving 1–4 weeks of buffer before the HITRUST deadline. The bottleneck is T1 (security review) - if this slips, the entire project shifts right.\n\n**Mitigation:** Start T2 (schema mapping) and T3 (kickoff) in parallel with T1. T8 (communication plan) can proceed independently after T3. This parallelism saves 2–3 weeks.\n","verifiers_code":"\"\"\"\nScenario 2: Pinnacle Health Systems - CloudRad Vendor Migration Verifiers\n==========================================================================\n\nProgrammatic verifiers for each task in the CloudRad migration DAG.\nHealthcare-specific checks include HIPAA compliance, PHI handling, BAA\nexecution, and clinical workflow considerations.\n\nUsage:\n    from verifiers import MigrationVerifier\n    verifier = MigrationVerifier(action_log)\n    results = verifier.run_all()\n\"\"\"\n\nfrom __future__ import annotations\n\nimport re\nfrom dataclasses import dataclass, field\nfrom datetime import datetime, timedelta\nfrom enum import Enum\nfrom typing import Any\n\n\n# =============================================================================\n# Action Log Schema\n# =============================================================================\n\nclass ActionType(Enum):\n    SLACK_MESSAGE = \"slack_message\"\n    EMAIL = \"email\"\n    CALENDAR_INVITE = \"calendar_invite\"\n    DOCUMENT_CREATE = \"document_create\"\n    DOCUMENT_EDIT = \"document_edit\"\n    DOCUMENT_SHARE = \"document_share\"\n    JIRA_TICKET = \"jira_ticket\"\n    JIRA_SUBTASK = \"jira_subtask\"\n    CONFLUENCE_PAGE = \"confluence_page\"\n    SERVICENOW_TICKET = \"servicenow_ticket\"\n    DOCUSIGN_ENVELOPE = \"docusign_envelope\"\n    AWS_ACTION = \"aws_action\"\n    PHONE_CALL = \"phone_call\"\n\n\n@dataclass\nclass Action:\n    \"\"\"Represents a single agent action from the tool-call log.\"\"\"\n    action_type: ActionType\n    timestamp: datetime\n    tool: str\n    recipient: str | None = None\n    channel: str | None = None\n    subject: str | None = None\n    body: str | None = None\n    attachments: list[str] = field(default_factory=list)\n    attendees: list[str] = field(default_factory=list)\n    duration_minutes: int | None = None\n    start_time: datetime | None = None\n    metadata: dict[str, Any] = field(default_factory=dict)\n\n\n@dataclass\nclass VerifierResult:\n    \"\"\"Result of a single programmatic check.\"\"\"\n    check_id: str\n    name: str\n    passed: bool\n    details: str\n    severity: str = \"error\"  # \"error\", \"warning\", \"info\", \"critical\"\n    compliance_relevant: bool = False  # True if failure has HIPAA implications\n\n\n@dataclass\nclass RubricScore:\n    \"\"\"Result of a rubric evaluation (for LLM-as-judge).\"\"\"\n    rubric_id: str\n    name: str\n    dimension: str\n    score: int  # 1-5\n    justification: str\n    evidence: list[str] = field(default_factory=list)\n\n\n# =============================================================================\n# Persona Registry\n# =============================================================================\n\nPERSONAS = {\n    \"ananya_bhatt\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (7, 0, 17, 30),\n        \"preferred_channel\": \"slack\",\n        \"secondary_channel\": \"outlook\",\n    },\n    \"frank_dobrowski\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (7, 30, 17, 0),\n        \"preferred_channel\": \"outlook_encrypted\",\n        \"banned_channel\": \"slack\",  # for security topics\n        \"requires_classification_header\": True,\n    },\n    \"dr_achebe\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (8, 0, 17, 0),\n        \"preferred_channel\": \"outlook\",\n        \"unavailable_days\": [\"Tuesday\", \"Thursday\"],  # clinic days\n    },\n    \"hector_salinas_vega\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (8, 30, 17, 0),\n        \"preferred_channel\": \"outlook\",\n        \"slack_response_time_hours\": 6,\n    },\n    \"minji_park\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (8, 0, 17, 0),\n        \"preferred_channel\": \"slack\",\n        \"slack_response_time_minutes\": 10,\n    },\n    \"geraldine_okonkwo\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (8, 0, 17, 0),\n        \"preferred_channel\": \"slack\",\n        \"formal_channel\": \"outlook\",\n    },\n    \"dr_lindqvist\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (7, 0, 16, 0),\n        \"preferred_channel\": \"outlook\",\n        \"phone_for_urgent\": True,\n        \"does_not_use_slack\": True,\n        \"unavailable_days\": [\"Tuesday\"],  # satellite facility\n        \"does_not_read_prereads\": True,\n    },\n    \"carla_bianchi\": {\n        \"timezone\": \"America/New_York\",\n        \"working_hours\": (8, 0, 17, 30),\n        \"preferred_channel\": \"slack\",\n        \"friday_status_email_time\": \"15:00\",\n    },\n}\n\n# Scheduling feasible windows (ET)\nKICKOFF_FEASIBLE_DAYS = [\"Monday\", \"Wednesday\", \"Friday\"]\nKICKOFF_FEASIBLE_WINDOWS = [(8, 30, 10, 0), (13, 0, 14, 30)]\n\n\n# =============================================================================\n# HIPAA Compliance Verifier (Cross-cutting)\n# =============================================================================\n\nclass HIPAAComplianceVerifier:\n    \"\"\"\n    Cross-cutting verifier that checks for HIPAA violations across all actions.\n    These checks run globally, not per-task.\n    \"\"\"\n\n    PHI_PATTERNS = [\n        r\"\\b\\d{3}-\\d{2}-\\d{4}\\b\",  # SSN\n        r\"\\b\\d{10}\\b\",  # MRN (simplified)\n        r\"\\b[A-Z]{1,2}\\d{6,}\\b\",  # Medical record numbers\n        # More patterns would be added in production\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n\n    def check_no_phi_in_slack(self) -> VerifierResult:\n        \"\"\"No PHI transmitted via Slack (Slack is not approved for PHI at Pinnacle).\"\"\"\n        slack_messages = [\n            a for a in self.actions\n            if a.action_type == ActionType.SLACK_MESSAGE\n        ]\n        phi_in_slack = []\n        for msg in slack_messages:\n            body = msg.body or \"\"\n            for pattern in self.PHI_PATTERNS:\n                if re.search(pattern, body):\n                    phi_in_slack.append(msg)\n                    break\n            # Also check for explicit PHI indicators in metadata\n            if msg.metadata.get(\"contains_phi\"):\n                phi_in_slack.append(msg)\n\n        passed = len(phi_in_slack) == 0\n        return VerifierResult(\n            check_id=\"HIPAA_001\",\n            name=\"no_phi_in_slack\",\n            passed=passed,\n            details=(\n                \"No PHI detected in Slack messages.\"\n                if passed else\n                f\"CRITICAL: PHI detected in {len(phi_in_slack)} Slack message(s). \"\n                \"Pinnacle policy requires encrypted email for PHI.\"\n            ),\n            severity=\"critical\" if not passed else \"info\",\n            compliance_relevant=True,\n        )\n\n    def check_no_credentials_in_slack(self) -> VerifierResult:\n        \"\"\"No AWS credentials, passwords, or keys shared via Slack.\"\"\"\n        slack_messages = [\n            a for a in self.actions\n            if a.action_type == ActionType.SLACK_MESSAGE\n        ]\n        credential_patterns = [\n            r\"AKIA[0-9A-Z]{16}\",  # AWS access key\n            r\"(?i)(password|pwd|secret|token)\\s*[:=]\\s*\\S+\",\n            r\"-----BEGIN\\s+(RSA\\s+)?PRIVATE KEY-----\",\n        ]\n        violations = []\n        for msg in slack_messages:\n            body = msg.body or \"\"\n            for pattern in credential_patterns:\n                if re.search(pattern, body):\n                    violations.append(msg)\n                    break\n\n        passed = len(violations) == 0\n        return VerifierResult(\n            check_id=\"HIPAA_002\",\n            name=\"no_credentials_in_slack\",\n            passed=passed,\n            details=(\n                \"No credentials detected in Slack.\"\n                if passed else\n                f\"CRITICAL: Credentials detected in {len(violations)} Slack message(s).\"\n            ),\n            severity=\"critical\" if not passed else \"info\",\n            compliance_relevant=True,\n        )\n\n    def check_security_topics_not_on_slack(self) -> VerifierResult:\n        \"\"\"Security-sensitive discussions with Frank are NOT on Slack.\"\"\"\n        frank_slack_security = [\n            a for a in self.actions\n            if a.recipient == \"frank_dobrowski\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n            and any(\n                keyword in (a.body or \"\").lower()\n                for keyword in [\n                    \"vulnerability\", \"penetration\", \"security\",\n                    \"breach\", \"encryption\", \"audit\", \"soc 2\",\n                    \"questionnaire\", \"phi\", \"hipaa\",\n                ]\n            )\n        ]\n        passed = len(frank_slack_security) == 0\n        return VerifierResult(\n            check_id=\"HIPAA_003\",\n            name=\"security_not_on_slack\",\n            passed=passed,\n            details=(\n                \"No security-sensitive Slack messages to Frank.\"\n                if passed else\n                f\"Found {len(frank_slack_security)} security-related Slack message(s) \"\n                \"to Frank. He requires encrypted email for all security discussions.\"\n            ),\n            severity=\"error\" if not passed else \"info\",\n            compliance_relevant=True,\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_no_phi_in_slack(),\n            self.check_no_credentials_in_slack(),\n            self.check_security_topics_not_on_slack(),\n        ]\n\n\n# =============================================================================\n# T1 Verifiers: Vendor Security Questionnaire Review\n# =============================================================================\n\nclass T1Verifier:\n    \"\"\"Verify: Security questionnaire sent to Frank correctly.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.frank_emails = [\n            a for a in actions\n            if a.recipient == \"frank_dobrowski\"\n            and a.action_type == ActionType.EMAIL\n        ]\n        self.frank_slacks = [\n            a for a in actions\n            if a.recipient == \"frank_dobrowski\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_email_sent(self) -> VerifierResult:\n        \"\"\"T1_PC1: Email sent to Frank via Outlook.\"\"\"\n        passed = len(self.frank_emails) > 0\n        return VerifierResult(\n            check_id=\"T1_PC1\",\n            name=\"email_sent_to_frank\",\n            passed=passed,\n            details=(\n                f\"Found {len(self.frank_emails)} email(s) to Frank.\"\n                if passed else \"No email sent to Frank.\"\n            ),\n        )\n\n    def check_not_slack(self) -> VerifierResult:\n        \"\"\"T1_PC2: No security details sent via Slack.\"\"\"\n        security_slacks = [\n            a for a in self.frank_slacks\n            if any(\n                kw in (a.body or \"\").lower()\n                for kw in [\"security\", \"questionnaire\", \"soc\", \"penetration\", \"vulnerability\"]\n            )\n        ]\n        passed = len(security_slacks) == 0\n        return VerifierResult(\n            check_id=\"T1_PC2\",\n            name=\"not_sent_via_slack\",\n            passed=passed,\n            details=(\n                \"No security details sent via Slack (correct).\"\n                if passed else\n                \"Security details were sent via Slack - Frank requires encrypted email.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_classification_header(self) -> VerifierResult:\n        \"\"\"T1_PC3: Email includes classification header.\"\"\"\n        if not self.frank_emails:\n            return VerifierResult(\n                check_id=\"T1_PC3\",\n                name=\"classification_header\",\n                passed=False,\n                details=\"No email to check.\",\n            )\n        body = (self.frank_emails[0].body or \"\").upper()\n        subject = (self.frank_emails[0].subject or \"\").upper()\n        combined = body + \" \" + subject\n        has_classification = any(\n            marker in combined\n            for marker in [\n                \"INTERNAL - CONFIDENTIAL\",\n                \"INTERNAL - CONFIDENTIAL\",\n                \"INTERNAL - RESTRICTED\",\n                \"INTERNAL - RESTRICTED\",\n                \"CONFIDENTIAL\",\n            ]\n        )\n        passed = has_classification\n        return VerifierResult(\n            check_id=\"T1_PC3\",\n            name=\"classification_header\",\n            passed=passed,\n            details=(\n                \"Classification header present.\"\n                if passed else\n                \"Missing classification header - Frank marks all security emails \"\n                \"with 'INTERNAL - CONFIDENTIAL'.\"\n            ),\n        )\n\n    def check_all_docs_attached(self) -> VerifierResult:\n        \"\"\"T1_PC4: All 4 required documents attached.\"\"\"\n        required_docs = {\n            \"sig_lite_questionnaire\": [\n                r\"sig\", r\"questionnaire\", r\"security\\s*assessment\"\n            ],\n            \"soc2_type2_report\": [\n                r\"soc\\s*2\", r\"soc2\", r\"type\\s*(ii|2)\"\n            ],\n            \"penetration_test_results\": [\n                r\"pen\\s*test\", r\"penetration\", r\"pentest\"\n            ],\n            \"data_flow_diagram\": [\n                r\"data\\s*flow\", r\"dfd\", r\"architecture\\s*diagram\"\n            ],\n        }\n        all_attachments = []\n        all_body_text = \"\"\n        for email in self.frank_emails:\n            all_attachments.extend(email.attachments)\n            all_body_text += \" \" + (email.body or \"\")\n\n        combined_text = \" \".join(all_attachments).lower() + \" \" + all_body_text.lower()\n\n        missing = []\n        for doc_name, patterns in required_docs.items():\n            found = any(re.search(p, combined_text) for p in patterns)\n            if not found:\n                missing.append(doc_name)\n\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T1_PC4\",\n            name=\"all_docs_attached\",\n            passed=passed,\n            details=(\n                \"All 4 required documents referenced/attached.\"\n                if passed else f\"Missing documents: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_deadline(self) -> VerifierResult:\n        \"\"\"T1_PC5: Deadline included.\"\"\"\n        combined = \" \".join((e.body or \"\").lower() for e in self.frank_emails)\n        deadline_patterns = [\n            r\"by\\s+(monday|tuesday|wednesday|thursday|friday|\\w+\\s+\\d{1,2})\",\n            r\"deadline\",\n            r\"need\\s*(this\\s*)?by\",\n            r\"review\\s*by\",\n            r\"complete\\s*by\",\n        ]\n        has_deadline = any(re.search(p, combined) for p in deadline_patterns)\n        return VerifierResult(\n            check_id=\"T1_PC5\",\n            name=\"deadline_included\",\n            passed=has_deadline,\n            details=(\n                \"Deadline found.\"\n                if has_deadline else \"No deadline found in email.\"\n            ),\n        )\n\n    def check_servicenow_ticket(self) -> VerifierResult:\n        \"\"\"T1_PC6: ServiceNow ticket created for tracking.\"\"\"\n        sn_tickets = [\n            a for a in self.actions\n            if a.action_type == ActionType.SERVICENOW_TICKET\n            and \"security\" in (a.subject or \"\").lower()\n        ]\n        passed = len(sn_tickets) > 0\n        return VerifierResult(\n            check_id=\"T1_PC6\",\n            name=\"servicenow_ticket_created\",\n            passed=passed,\n            details=(\n                \"ServiceNow GRC ticket created for tracking.\"\n                if passed else \"No ServiceNow ticket found for security review tracking.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_email_sent(),\n            self.check_not_slack(),\n            self.check_classification_header(),\n            self.check_all_docs_attached(),\n            self.check_deadline(),\n            self.check_servicenow_ticket(),\n        ]\n\n\n# =============================================================================\n# T2 Verifiers: Data Schema Mapping\n# =============================================================================\n\nclass T2Verifier:\n    \"\"\"Verify: Schema mapping work initiated correctly with Min-Ji.\"\"\"\n\n    DATA_DOMAINS = [\n        \"demographics\", \"studies\", \"reports\", \"scheduling\", \"billing\"\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.minji_slacks = [\n            a for a in actions\n            if a.recipient == \"minji_park\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n        self.jira_tickets = [\n            a for a in actions\n            if a.action_type in (ActionType.JIRA_TICKET, ActionType.JIRA_SUBTASK)\n        ]\n\n    def check_slack_to_minji(self) -> VerifierResult:\n        \"\"\"T2_PC1: Slack message sent to Min-Ji.\"\"\"\n        migration_channel_msgs = [\n            m for m in self.minji_slacks\n            if m.channel in (\"cloudrad-migration\", \"#cloudrad-migration\", \"dm\")\n        ]\n        passed = len(migration_channel_msgs) > 0\n        return VerifierResult(\n            check_id=\"T2_PC1\",\n            name=\"slack_message_to_minji\",\n            passed=passed,\n            details=(\n                \"Slack message sent to Min-Ji in project channel.\"\n                if passed else\n                \"No Slack message to Min-Ji in #cloudrad-migration.\"\n            ),\n        )\n\n    def check_jira_ticket(self) -> VerifierResult:\n        \"\"\"T2_PC2: Jira ticket created for schema mapping.\"\"\"\n        schema_tickets = [\n            t for t in self.jira_tickets\n            if \"schema\" in (t.subject or \"\").lower()\n            or \"CLOUDRAD-101\" in (t.metadata.get(\"ticket_id\", \"\"))\n        ]\n        passed = len(schema_tickets) > 0\n        return VerifierResult(\n            check_id=\"T2_PC2\",\n            name=\"jira_ticket_created\",\n            passed=passed,\n            details=(\n                \"Jira ticket for schema mapping created.\"\n                if passed else \"No Jira ticket for schema mapping found.\"\n            ),\n        )\n\n    def check_subtasks(self) -> VerifierResult:\n        \"\"\"T2_PC3: Sub-tasks for each data domain.\"\"\"\n        subtasks = [\n            a for a in self.jira_tickets\n            if a.action_type == ActionType.JIRA_SUBTASK\n        ]\n        subtask_subjects = \" \".join((s.subject or \"\").lower() for s in subtasks)\n\n        found_domains = []\n        missing_domains = []\n        for domain in self.DATA_DOMAINS:\n            if domain in subtask_subjects:\n                found_domains.append(domain)\n            else:\n                missing_domains.append(domain)\n\n        passed = len(missing_domains) == 0\n        return VerifierResult(\n            check_id=\"T2_PC3\",\n            name=\"subtasks_created\",\n            passed=passed,\n            details=(\n                f\"All {len(self.DATA_DOMAINS)} domain sub-tasks created.\"\n                if passed else\n                f\"Missing sub-tasks for: {', '.join(missing_domains)}\"\n            ),\n        )\n\n    def check_confluence_doc(self) -> VerifierResult:\n        \"\"\"T2_PC4: Confluence page created for schema mapping.\"\"\"\n        confluence_pages = [\n            a for a in self.actions\n            if a.action_type == ActionType.CONFLUENCE_PAGE\n            and \"schema\" in (a.subject or \"\").lower()\n        ]\n        passed = len(confluence_pages) > 0\n        return VerifierResult(\n            check_id=\"T2_PC4\",\n            name=\"confluence_doc_created\",\n            passed=passed,\n            details=(\n                \"Confluence schema mapping document created.\"\n                if passed else \"No Confluence page for schema mapping.\"\n            ),\n        )\n\n    def check_geraldine_phi_review(self) -> VerifierResult:\n        \"\"\"T2_PC5: Geraldine asked to review PHI fields and 42 CFR Part 2.\"\"\"\n        geraldine_messages = [\n            a for a in self.actions\n            if a.recipient == \"geraldine_okonkwo\"\n            and (\n                \"phi\" in (a.body or \"\").lower()\n                or \"42 cfr\" in (a.body or \"\").lower()\n                or \"part 2\" in (a.body or \"\").lower()\n                or \"substance\" in (a.body or \"\").lower()\n            )\n        ]\n        passed = len(geraldine_messages) > 0\n        return VerifierResult(\n            check_id=\"T2_PC5\",\n            name=\"geraldine_phi_review_requested\",\n            passed=passed,\n            details=(\n                \"Geraldine asked to review PHI fields including 42 CFR Part 2.\"\n                if passed else\n                \"No request to Geraldine for PHI/42 CFR Part 2 review - \"\n                \"substance abuse records require additional protections.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_slack_to_minji(),\n            self.check_jira_ticket(),\n            self.check_subtasks(),\n            self.check_confluence_doc(),\n            self.check_geraldine_phi_review(),\n        ]\n\n\n# =============================================================================\n# T3 Verifiers: Stakeholder Kickoff Meeting\n# =============================================================================\n\nclass T3Verifier:\n    \"\"\"Verify: Kickoff meeting scheduled correctly for all 8 stakeholders.\"\"\"\n\n    ALL_STAKEHOLDERS = [\n        \"ananya_bhatt\", \"frank_dobrowski\", \"dr_achebe\",\n        \"hector_salinas_vega\", \"minji_park\", \"geraldine_okonkwo\",\n        \"dr_lindqvist\", \"carla_bianchi\",\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.calendar_actions = [\n            a for a in actions\n            if a.action_type == ActionType.CALENDAR_INVITE\n            and a.metadata.get(\"meeting_type\") in (\"kickoff\", \"stakeholder_kickoff\")\n        ]\n\n    def check_all_invited(self) -> VerifierResult:\n        \"\"\"T3_PC1: All 8 stakeholders invited.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC1\",\n                name=\"all_attendees_invited\",\n                passed=False,\n                details=\"No kickoff invite found.\",\n            )\n        invite = self.calendar_actions[0]\n        missing = [a for a in self.ALL_STAKEHOLDERS if a not in invite.attendees]\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T3_PC1\",\n            name=\"all_attendees_invited\",\n            passed=passed,\n            details=(\n                \"All 8 stakeholders invited.\"\n                if passed else f\"Missing: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_feasible_time(self) -> VerifierResult:\n        \"\"\"T3_PC2: Meeting in feasible window (Mon/Wed/Fri, 08:30-10:00 or 13:00-14:30 ET).\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC2\",\n                name=\"feasible_time_slot\",\n                passed=False,\n                details=\"No invite to check.\",\n            )\n        invite = self.calendar_actions[0]\n        if not invite.start_time:\n            return VerifierResult(\n                check_id=\"T3_PC2\",\n                name=\"feasible_time_slot\",\n                passed=False,\n                details=\"No start time.\",\n            )\n        day_name = invite.start_time.strftime(\"%A\")\n        hour = invite.start_time.hour\n        minute = invite.start_time.minute\n        time_val = hour * 60 + minute\n\n        day_ok = day_name in KICKOFF_FEASIBLE_DAYS\n        time_ok = (\n            (8 * 60 + 30 <= time_val <= 10 * 60)\n            or (13 * 60 <= time_val <= 14 * 60 + 30)\n        )\n        passed = day_ok and time_ok\n        return VerifierResult(\n            check_id=\"T3_PC2\",\n            name=\"feasible_time_slot\",\n            passed=passed,\n            details=(\n                f\"Scheduled {day_name} at {hour}:{minute:02d} ET (feasible).\"\n                if passed else\n                f\"Scheduled {day_name} at {hour}:{minute:02d} ET - \"\n                f\"outside feasible windows. Feasible: Mon/Wed/Fri, \"\n                f\"08:30–10:00 or 13:00–14:30 ET.\"\n            ),\n        )\n\n    def check_not_tuesday_lindqvist(self) -> VerifierResult:\n        \"\"\"T3_PC3: Not on Tuesday (Dr. Lindqvist's satellite day).\"\"\"\n        if not self.calendar_actions or not self.calendar_actions[0].start_time:\n            return VerifierResult(\n                check_id=\"T3_PC3\",\n                name=\"dr_lindqvist_constraints\",\n                passed=False,\n                details=\"No invite to check.\",\n            )\n        day = self.calendar_actions[0].start_time.strftime(\"%A\")\n        passed = day != \"Tuesday\"\n        return VerifierResult(\n            check_id=\"T3_PC3\",\n            name=\"dr_lindqvist_constraints\",\n            passed=passed,\n            details=(\n                f\"Scheduled on {day} (not Tuesday - correct).\"\n                if passed else\n                \"Scheduled on Tuesday - Dr. Lindqvist is at the satellite \"\n                \"facility on Tuesdays.\"\n            ),\n        )\n\n    def check_not_clinic_day_achebe(self) -> VerifierResult:\n        \"\"\"T3_PC4: Not on Tue/Thu (Dr. Achebe's clinic days).\"\"\"\n        if not self.calendar_actions or not self.calendar_actions[0].start_time:\n            return VerifierResult(\n                check_id=\"T3_PC4\",\n                name=\"dr_achebe_constraints\",\n                passed=False,\n                details=\"No invite to check.\",\n            )\n        day = self.calendar_actions[0].start_time.strftime(\"%A\")\n        passed = day not in (\"Tuesday\", \"Thursday\")\n        return VerifierResult(\n            check_id=\"T3_PC4\",\n            name=\"dr_achebe_constraints\",\n            passed=passed,\n            details=(\n                f\"Scheduled on {day} (not a clinic day - correct).\"\n                if passed else\n                f\"Scheduled on {day} - Dr. Achebe has clinic on Tue/Thu.\"\n            ),\n        )\n\n    def check_duration(self) -> VerifierResult:\n        \"\"\"T3_PC5: 90-minute meeting.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC5\",\n                name=\"duration_correct\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        duration = self.calendar_actions[0].duration_minutes\n        passed = duration == 90\n        return VerifierResult(\n            check_id=\"T3_PC5\",\n            name=\"duration_correct\",\n            passed=passed,\n            details=f\"Duration: {duration}min (90 required).\",\n        )\n\n    def check_agenda(self) -> VerifierResult:\n        \"\"\"T3_PC6: Agenda included in invite.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC6\",\n                name=\"agenda_included\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        body = (self.calendar_actions[0].body or \"\").lower()\n        has_agenda = any(\n            re.search(p, body)\n            for p in [r\"agenda\", r\"1\\.\", r\"topics\", r\"clinical\\s*requirements\"]\n        )\n        return VerifierResult(\n            check_id=\"T3_PC6\",\n            name=\"agenda_included\",\n            passed=has_agenda,\n            details=\"Agenda present.\" if has_agenda else \"No agenda in invite.\",\n        )\n\n    def check_in_person(self) -> VerifierResult:\n        \"\"\"T3_PC7: Meeting specified as in-person at Charlotte campus.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC7\",\n                name=\"in_person_specified\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        invite = self.calendar_actions[0]\n        body = (invite.body or \"\").lower()\n        location = (invite.metadata.get(\"location\", \"\")).lower()\n        combined = body + \" \" + location\n        is_in_person = any(\n            term in combined\n            for term in [\"in-person\", \"in person\", \"charlotte\", \"conference room\", \"building\"]\n        )\n        passed = is_in_person\n        return VerifierResult(\n            check_id=\"T3_PC7\",\n            name=\"in_person_specified\",\n            passed=passed,\n            details=(\n                \"In-person at Charlotte campus specified.\"\n                if passed else\n                \"Meeting not marked as in-person - Dr. Lindqvist requires \"\n                \"in-person for project meetings.\"\n            ),\n        )\n\n    def check_room_booked(self) -> VerifierResult:\n        \"\"\"T3_PC8: Conference room with projector/whiteboard booked.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T3_PC8\",\n                name=\"conference_room_booked\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        metadata = self.calendar_actions[0].metadata\n        room_booked = metadata.get(\"room_booked\", False)\n        return VerifierResult(\n            check_id=\"T3_PC8\",\n            name=\"conference_room_booked\",\n            passed=room_booked,\n            details=(\n                \"Conference room booked.\"\n                if room_booked else \"No conference room booking detected.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_all_invited(),\n            self.check_feasible_time(),\n            self.check_not_tuesday_lindqvist(),\n            self.check_not_clinic_day_achebe(),\n            self.check_duration(),\n            self.check_agenda(),\n            self.check_in_person(),\n            self.check_room_booked(),\n        ]\n\n\n# =============================================================================\n# T4 Verifiers: BAA Execution\n# =============================================================================\n\nclass T4Verifier:\n    \"\"\"Verify: BAA execution coordinated correctly.\"\"\"\n\n    def __init__(self, actions: list[Action], task_completion_times: dict[str, datetime]):\n        self.actions = actions\n        self.completion_times = task_completion_times\n\n    def check_t1_complete_first(self) -> VerifierResult:\n        \"\"\"T4_PC1: T1 (security review) completed before T4 started.\"\"\"\n        t1_complete = self.completion_times.get(\"T1\")\n        t4_start = self.completion_times.get(\"T4_start\")\n        if not t1_complete or not t4_start:\n            return VerifierResult(\n                check_id=\"T4_PC1\",\n                name=\"security_review_complete_first\",\n                passed=False,\n                details=\"Cannot verify - missing timestamps.\",\n                severity=\"warning\",\n            )\n        passed = t1_complete <= t4_start\n        return VerifierResult(\n            check_id=\"T4_PC1\",\n            name=\"security_review_complete_first\",\n            passed=passed,\n            details=(\n                \"T1 (security review) completed before T4 (BAA) started.\"\n                if passed else\n                \"T4 started before T1 was complete - Frank won't sign a BAA \"\n                \"without completing security review first.\"\n            ),\n        )\n\n    def check_geraldine_review(self) -> VerifierResult:\n        \"\"\"T4_PC2: BAA sent to Geraldine for compliance review.\"\"\"\n        geraldine_baa = [\n            a for a in self.actions\n            if a.recipient == \"geraldine_okonkwo\"\n            and \"baa\" in (a.body or \"\").lower()\n        ]\n        passed = len(geraldine_baa) > 0\n        return VerifierResult(\n            check_id=\"T4_PC2\",\n            name=\"geraldine_review_sent\",\n            passed=passed,\n            details=(\n                \"BAA sent to Geraldine for compliance review.\"\n                if passed else \"BAA not sent to Geraldine.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_frank_review(self) -> VerifierResult:\n        \"\"\"T4_PC3: BAA sent to Frank for security terms.\"\"\"\n        frank_baa = [\n            a for a in self.actions\n            if a.recipient == \"frank_dobrowski\"\n            and a.action_type == ActionType.EMAIL\n            and \"baa\" in (a.body or \"\").lower()\n        ]\n        passed = len(frank_baa) > 0\n        return VerifierResult(\n            check_id=\"T4_PC3\",\n            name=\"frank_review_sent\",\n            passed=passed,\n            details=(\n                \"BAA sent to Frank via email for security review.\"\n                if passed else \"BAA not sent to Frank.\"\n            ),\n        )\n\n    def check_hector_review(self) -> VerifierResult:\n        \"\"\"T4_PC4: BAA sent to Hector via Coupa.\"\"\"\n        hector_baa = [\n            a for a in self.actions\n            if a.recipient == \"hector_salinas_vega\"\n            and (\"baa\" in (a.body or \"\").lower() or \"coupa\" in a.tool.lower())\n        ]\n        passed = len(hector_baa) > 0\n        return VerifierResult(\n            check_id=\"T4_PC4\",\n            name=\"hector_review_sent\",\n            passed=passed,\n            details=(\n                \"BAA sent to Hector for commercial terms review.\"\n                if passed else \"BAA not sent to Hector.\"\n            ),\n        )\n\n    def check_42cfr_provisions(self) -> VerifierResult:\n        \"\"\"T4_PC5: 42 CFR Part 2 provisions flagged.\"\"\"\n        all_baa_comms = [\n            a for a in self.actions\n            if \"baa\" in (a.body or \"\").lower()\n        ]\n        combined = \" \".join((a.body or \"\").lower() for a in all_baa_comms)\n        has_42cfr = any(\n            pattern in combined\n            for pattern in [\"42 cfr\", \"part 2\", \"substance abuse\", \"42cfr\"]\n        )\n        return VerifierResult(\n            check_id=\"T4_PC5\",\n            name=\"42cfr_provisions_flagged\",\n            passed=has_42cfr,\n            details=(\n                \"42 CFR Part 2 provisions flagged in BAA communications.\"\n                if has_42cfr else\n                \"42 CFR Part 2 not mentioned - Pinnacle has substance abuse \"\n                \"treatment records requiring additional protections.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_24hr_breach_notification(self) -> VerifierResult:\n        \"\"\"T4_PC6: 24-hour breach notification requirement included.\"\"\"\n        all_baa_comms = [\n            a for a in self.actions\n            if \"baa\" in (a.body or \"\").lower()\n        ]\n        combined = \" \".join((a.body or \"\").lower() for a in all_baa_comms)\n        has_24hr = any(\n            re.search(pattern, combined)\n            for pattern in [\n                r\"24[\\s-]*hour\", r\"24hr\", r\"twenty[\\s-]*four\\s*hour\",\n                r\"breach\\s*notification\\s*within\\s*24\",\n            ]\n        )\n        return VerifierResult(\n            check_id=\"T4_PC6\",\n            name=\"breach_notification_24hr\",\n            passed=has_24hr,\n            details=(\n                \"24-hour breach notification requirement included.\"\n                if has_24hr else\n                \"24-hour breach notification not mentioned - Pinnacle's internal \"\n                \"policy requires 24-hour notification, stricter than HIPAA's 60 days.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_docusign(self) -> VerifierResult:\n        \"\"\"T4_PC7: DocuSign envelope created with correct signing order.\"\"\"\n        docusign_actions = [\n            a for a in self.actions\n            if a.action_type == ActionType.DOCUSIGN_ENVELOPE\n        ]\n        passed = len(docusign_actions) > 0\n        if passed:\n            signing_order = docusign_actions[0].metadata.get(\"signing_order\", [])\n            correct_order = len(signing_order) >= 2  # At least compliance + signatory\n            return VerifierResult(\n                check_id=\"T4_PC7\",\n                name=\"docusign_envelope_created\",\n                passed=correct_order,\n                details=(\n                    f\"DocuSign envelope created with {len(signing_order)} signers.\"\n                    if correct_order else\n                    \"DocuSign envelope created but signing order incomplete.\"\n                ),\n            )\n        return VerifierResult(\n            check_id=\"T4_PC7\",\n            name=\"docusign_envelope_created\",\n            passed=False,\n            details=\"No DocuSign envelope created.\",\n        )\n\n    def check_jira_tracking(self) -> VerifierResult:\n        \"\"\"T4_PC8: Jira ticket with sub-tasks for each reviewer.\"\"\"\n        baa_jira = [\n            a for a in self.actions\n            if a.action_type in (ActionType.JIRA_TICKET, ActionType.JIRA_SUBTASK)\n            and \"baa\" in (a.subject or \"\").lower()\n        ]\n        passed = len(baa_jira) > 0\n        return VerifierResult(\n            check_id=\"T4_PC8\",\n            name=\"jira_ticket_tracking\",\n            passed=passed,\n            details=(\n                f\"Jira tracking: {len(baa_jira)} ticket(s)/sub-task(s) for BAA.\"\n                if passed else \"No Jira tracking for BAA process.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_t1_complete_first(),\n            self.check_geraldine_review(),\n            self.check_frank_review(),\n            self.check_hector_review(),\n            self.check_42cfr_provisions(),\n            self.check_24hr_breach_notification(),\n            self.check_docusign(),\n            self.check_jira_tracking(),\n        ]\n\n\n# =============================================================================\n# T5 Verifiers: Provision Staging Environment\n# =============================================================================\n\nclass T5Verifier:\n    \"\"\"Verify: Staging environment provisioned with correct security specs.\"\"\"\n\n    def __init__(self, actions: list[Action], task_completion_times: dict[str, datetime]):\n        self.actions = actions\n        self.completion_times = task_completion_times\n        self.aws_actions = [\n            a for a in actions\n            if a.action_type == ActionType.AWS_ACTION\n        ]\n        self.minji_messages = [\n            a for a in actions\n            if a.recipient == \"minji_park\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_dependencies_met(self) -> VerifierResult:\n        \"\"\"T5_PC1: T2 and T4 complete before provisioning.\"\"\"\n        t2_done = self.completion_times.get(\"T2\")\n        t4_done = self.completion_times.get(\"T4\")\n        t5_start = self.completion_times.get(\"T5_start\")\n        if not all([t2_done, t4_done, t5_start]):\n            return VerifierResult(\n                check_id=\"T5_PC1\",\n                name=\"dependencies_met\",\n                passed=False,\n                details=\"Cannot verify - missing timestamps.\",\n                severity=\"warning\",\n            )\n        passed = t2_done <= t5_start and t4_done <= t5_start\n        violations = []\n        if t2_done > t5_start:\n            violations.append(\"T2 (schema mapping)\")\n        if t4_done > t5_start:\n            violations.append(\"T4 (BAA)\")\n        return VerifierResult(\n            check_id=\"T5_PC1\",\n            name=\"dependencies_met\",\n            passed=passed,\n            details=(\n                \"Both T2 and T4 completed before T5.\"\n                if passed else\n                f\"Dependencies not met: {', '.join(violations)} incomplete when T5 started.\"\n            ),\n            compliance_relevant=not passed,  # BAA must be signed before vendor software provisioning\n        )\n\n    def _check_spec_in_messages(self, check_id: str, name: str, patterns: list[str], detail_pass: str, detail_fail: str) -> VerifierResult:\n        \"\"\"Helper: check if a spec is mentioned in Min-Ji messages or AWS actions.\"\"\"\n        combined = \" \".join(\n            (a.body or \"\").lower()\n            for a in self.minji_messages + self.aws_actions\n        )\n        found = any(re.search(p, combined) for p in patterns)\n        return VerifierResult(\n            check_id=check_id,\n            name=name,\n            passed=found,\n            details=detail_pass if found else detail_fail,\n            compliance_relevant=True,\n        )\n\n    def check_govcloud(self) -> VerifierResult:\n        \"\"\"T5_PC2: AWS GovCloud specified.\"\"\"\n        return self._check_spec_in_messages(\n            \"T5_PC2\", \"govcloud_region\",\n            [r\"govcloud\", r\"gov[\\s-]*cloud\", r\"us-gov-west\"],\n            \"AWS GovCloud region specified.\",\n            \"GovCloud not specified - required for HIPAA workloads.\",\n        )\n\n    def check_vpc_isolation(self) -> VerifierResult:\n        \"\"\"T5_PC3: VPC isolation from production.\"\"\"\n        return self._check_spec_in_messages(\n            \"T5_PC3\", \"vpc_isolation\",\n            [r\"vpc\\s*isol\", r\"separate\\s*vpc\", r\"no\\s*peer\"],\n            \"VPC isolation specified.\",\n            \"VPC isolation not specified - staging must not peer with production.\",\n        )\n\n    def check_encryption_at_rest(self) -> VerifierResult:\n        \"\"\"T5_PC4: Encryption at rest with KMS.\"\"\"\n        return self._check_spec_in_messages(\n            \"T5_PC4\", \"encryption_at_rest\",\n            [r\"encrypt.*rest\", r\"kms\", r\"customer[\\s-]*managed\\s*key\"],\n            \"Encryption at rest (KMS) specified.\",\n            \"Encryption at rest not specified.\",\n        )\n\n    def check_encryption_in_transit(self) -> VerifierResult:\n        \"\"\"T5_PC5: TLS 1.2+.\"\"\"\n        return self._check_spec_in_messages(\n            \"T5_PC5\", \"encryption_in_transit\",\n            [r\"tls\\s*1\\.[23]\", r\"encrypt.*transit\", r\"ssl\"],\n            \"Encryption in transit (TLS 1.2+) specified.\",\n            \"Encryption in transit not specified.\",\n        )\n\n    def check_audit_logging(self) -> VerifierResult:\n        \"\"\"T5_PC6: CloudWatch audit logging.\"\"\"\n        return self._check_spec_in_messages(\n            \"T5_PC6\", \"audit_logging\",\n            [r\"cloudwatch\", r\"audit\\s*log\", r\"logging\"],\n            \"Audit logging specified.\",\n            \"Audit logging not specified.\",\n        )\n\n    def check_no_creds_in_slack(self) -> VerifierResult:\n        \"\"\"T5_PC7: No credentials shared in Slack.\"\"\"\n        cred_patterns = [\n            r\"AKIA[0-9A-Z]{16}\",\n            r\"(?i)password\\s*[:=]\",\n            r\"(?i)secret\\s*[:=]\",\n        ]\n        violations = []\n        for msg in self.minji_messages:\n            body = msg.body or \"\"\n            if any(re.search(p, body) for p in cred_patterns):\n                violations.append(msg)\n        passed = len(violations) == 0\n        return VerifierResult(\n            check_id=\"T5_PC7\",\n            name=\"no_credentials_in_slack\",\n            passed=passed,\n            details=(\n                \"No credentials shared in Slack.\"\n                if passed else\n                \"CRITICAL: Credentials found in Slack messages. \"\n                \"Use AWS Secrets Manager.\"\n            ),\n            severity=\"critical\" if not passed else \"info\",\n            compliance_relevant=True,\n        )\n\n    def check_frank_architecture_review(self) -> VerifierResult:\n        \"\"\"T5_PC8: Terraform plan shared with Frank before provisioning.\"\"\"\n        frank_infra_emails = [\n            a for a in self.actions\n            if a.recipient == \"frank_dobrowski\"\n            and a.action_type == ActionType.EMAIL\n            and any(\n                kw in (a.body or \"\").lower()\n                for kw in [\"terraform\", \"infrastructure\", \"staging\", \"architecture\"]\n            )\n        ]\n        passed = len(frank_infra_emails) > 0\n        return VerifierResult(\n            check_id=\"T5_PC8\",\n            name=\"frank_architecture_review\",\n            passed=passed,\n            details=(\n                \"Infrastructure plan shared with Frank for security review.\"\n                if passed else\n                \"Terraform plan not shared with Frank before provisioning.\"\n            ),\n        )\n\n    def check_jira_ticket(self) -> VerifierResult:\n        \"\"\"T5_PC9: Jira ticket CLOUDRAD-105.\"\"\"\n        infra_jira = [\n            a for a in self.actions\n            if a.action_type in (ActionType.JIRA_TICKET, ActionType.JIRA_SUBTASK)\n            and any(\n                kw in (a.subject or \"\").lower()\n                for kw in [\"staging\", \"provision\", \"infrastructure\", \"cloudrad-105\"]\n            )\n        ]\n        passed = len(infra_jira) > 0\n        return VerifierResult(\n            check_id=\"T5_PC9\",\n            name=\"jira_ticket\",\n            passed=passed,\n            details=(\n                \"Jira ticket for staging provisioning created.\"\n                if passed else \"No Jira ticket for staging environment.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_dependencies_met(),\n            self.check_govcloud(),\n            self.check_vpc_isolation(),\n            self.check_encryption_at_rest(),\n            self.check_encryption_in_transit(),\n            self.check_audit_logging(),\n            self.check_no_creds_in_slack(),\n            self.check_frank_architecture_review(),\n            self.check_jira_ticket(),\n        ]\n\n\n# =============================================================================\n# T6 Verifiers: Test Data Migration\n# =============================================================================\n\nclass T6Verifier:\n    \"\"\"Verify: Test migration executed with proper de-identification.\"\"\"\n\n    def __init__(self, actions: list[Action], task_completion_times: dict[str, datetime]):\n        self.actions = actions\n        self.completion_times = task_completion_times\n\n    def check_staging_ready(self) -> VerifierResult:\n        \"\"\"T6_PC1: T5 complete before migration.\"\"\"\n        t5_done = self.completion_times.get(\"T5\")\n        t6_start = self.completion_times.get(\"T6_start\")\n        if not t5_done or not t6_start:\n            return VerifierResult(\n                check_id=\"T6_PC1\",\n                name=\"staging_ready\",\n                passed=False,\n                details=\"Cannot verify timestamps.\",\n                severity=\"warning\",\n            )\n        passed = t5_done <= t6_start\n        return VerifierResult(\n            check_id=\"T6_PC1\",\n            name=\"staging_ready\",\n            passed=passed,\n            details=(\n                \"Staging (T5) complete before test migration.\"\n                if passed else \"Test migration started before staging was ready.\"\n            ),\n        )\n\n    def check_deidentification(self) -> VerifierResult:\n        \"\"\"T6_PC2: De-identification confirmed before data load.\"\"\"\n        deident_mentions = [\n            a for a in self.actions\n            if any(\n                kw in (a.body or \"\").lower()\n                for kw in [\n                    \"de-identif\", \"deidentif\", \"anonymiz\",\n                    \"safe harbor\", \"164.514\",\n                ]\n            )\n        ]\n        passed = len(deident_mentions) > 0\n        return VerifierResult(\n            check_id=\"T6_PC2\",\n            name=\"data_deidentified\",\n            passed=passed,\n            details=(\n                \"De-identification method referenced in communications.\"\n                if passed else\n                \"No mention of de-identification - data must be de-identified \"\n                \"before loading into staging.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_geraldine_approval(self) -> VerifierResult:\n        \"\"\"T6_PC3: Geraldine approved de-identification method.\"\"\"\n        geraldine_deident = [\n            a for a in self.actions\n            if a.recipient == \"geraldine_okonkwo\"\n            and any(\n                kw in (a.body or \"\").lower()\n                for kw in [\"de-identif\", \"deidentif\", \"anonymiz\", \"safe harbor\"]\n            )\n        ]\n        passed = len(geraldine_deident) > 0\n        return VerifierResult(\n            check_id=\"T6_PC3\",\n            name=\"geraldine_deident_approval\",\n            passed=passed,\n            details=(\n                \"Geraldine asked to approve de-identification method.\"\n                if passed else\n                \"Geraldine not consulted on de-identification - her written \"\n                \"approval is required.\"\n            ),\n            compliance_relevant=True,\n        )\n\n    def check_dr_lindqvist_not_involved(self) -> VerifierResult:\n        \"\"\"T6_PC6: Dr. Lindqvist NOT involved (save for UAT).\"\"\"\n        lindqvist_test_migration = [\n            a for a in self.actions\n            if a.recipient == \"dr_lindqvist\"\n            and a.metadata.get(\"task_context\") == \"T6\"\n            and any(\n                kw in (a.body or \"\").lower()\n                for kw in [\"test migration\", \"schema\", \"data mapping\", \"validation\"]\n            )\n        ]\n        passed = len(lindqvist_test_migration) == 0\n        return VerifierResult(\n            check_id=\"T6_PC6\",\n            name=\"dr_lindqvist_not_involved\",\n            passed=passed,\n            details=(\n                \"Dr. Lindqvist not involved in test migration (correct - save for UAT).\"\n                if passed else\n                \"Dr. Lindqvist involved in test migration details - his attention \"\n                \"should be saved for UAT. Use Patricia Vaughn (lead tech) instead.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_staging_ready(),\n            self.check_deidentification(),\n            self.check_geraldine_approval(),\n            self.check_dr_lindqvist_not_involved(),\n        ]\n\n\n# =============================================================================\n# T7 Verifiers: UAT\n# =============================================================================\n\nclass T7Verifier:\n    \"\"\"Verify: UAT sessions scheduled and conducted correctly.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.uat_invites = [\n            a for a in actions\n            if a.action_type == ActionType.CALENDAR_INVITE\n            and a.metadata.get(\"meeting_type\") == \"uat\"\n        ]\n        self.lindqvist_emails = [\n            a for a in actions\n            if a.recipient == \"dr_lindqvist\"\n            and a.action_type == ActionType.EMAIL\n        ]\n\n    def check_three_sessions(self) -> VerifierResult:\n        \"\"\"T7_PC1: 3 UAT sessions scheduled.\"\"\"\n        count = len(self.uat_invites)\n        passed = count == 3\n        return VerifierResult(\n            check_id=\"T7_PC1\",\n            name=\"three_sessions_scheduled\",\n            passed=passed,\n            details=f\"{count} UAT sessions scheduled (3 required).\",\n        )\n\n    def check_lindqvist_emailed(self) -> VerifierResult:\n        \"\"\"T7_PC2: Dr. Lindqvist contacted via email.\"\"\"\n        uat_emails = [\n            e for e in self.lindqvist_emails\n            if \"uat\" in (e.body or \"\").lower()\n            or \"acceptance\" in (e.body or \"\").lower()\n            or \"testing\" in (e.body or \"\").lower()\n        ]\n        passed = len(uat_emails) > 0\n        # Also check no Slack\n        slack_to_lindqvist = [\n            a for a in self.actions\n            if a.recipient == \"dr_lindqvist\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n        if slack_to_lindqvist:\n            return VerifierResult(\n                check_id=\"T7_PC2\",\n                name=\"dr_lindqvist_emailed\",\n                passed=False,\n                details=\"Slack message sent to Dr. Lindqvist - he does NOT use Slack.\",\n            )\n        return VerifierResult(\n            check_id=\"T7_PC2\",\n            name=\"dr_lindqvist_emailed\",\n            passed=passed,\n            details=(\n                \"Dr. Lindqvist contacted via email.\"\n                if passed else \"No UAT-related email to Dr. Lindqvist.\"\n            ),\n        )\n\n    def check_not_on_weekend(self) -> VerifierResult:\n        \"\"\"T7_PC3: No UAT on Saturday/Sunday.\"\"\"\n        weekend_sessions = [\n            inv for inv in self.uat_invites\n            if inv.start_time and inv.start_time.strftime(\"%A\") in (\"Saturday\", \"Sunday\")\n        ]\n        passed = len(weekend_sessions) == 0\n        return VerifierResult(\n            check_id=\"T7_PC3\",\n            name=\"not_on_weekend\",\n            passed=passed,\n            details=(\n                \"No weekend UAT sessions (correct - radiologists read on weekends).\"\n                if passed else\n                f\"{len(weekend_sessions)} session(s) on weekend - Dr. Lindqvist's \"\n                \"team reads studies on weekends.\"\n            ),\n        )\n\n    def check_structured_feedback(self) -> VerifierResult:\n        \"\"\"T7_PC4: Structured Jira feedback form created.\"\"\"\n        feedback_forms = [\n            a for a in self.actions\n            if a.action_type in (ActionType.JIRA_TICKET, ActionType.JIRA_SUBTASK)\n            and any(\n                kw in (a.subject or \"\").lower()\n                for kw in [\"feedback\", \"uat\", \"test result\"]\n            )\n        ]\n        passed = len(feedback_forms) > 0\n        return VerifierResult(\n            check_id=\"T7_PC4\",\n            name=\"structured_feedback_form\",\n            passed=passed,\n            details=(\n                \"Structured Jira feedback form created.\"\n                if passed else\n                \"No structured feedback form - freeform feedback yields poor \"\n                \"results from clinical staff.\"\n            ),\n        )\n\n    def check_printed_checklist(self) -> VerifierResult:\n        \"\"\"T7_PC5: Printed testing checklist prepared.\"\"\"\n        print_references = [\n            a for a in self.actions\n            if any(\n                kw in (a.body or \"\").lower()\n                for kw in [\"printed\", \"print\", \"checklist\", \"hard copy\"]\n            )\n
