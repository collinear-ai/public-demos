ent to priya_narayanan.\"\n            ),\n        )\n\n    def check_timezone_respected(self) -> VerifierResult:\n        \"\"\"T2_PC2: Message sent during Priya's working hours (PT).\"\"\"\n        if not self.priya_messages:\n            return VerifierResult(\n                check_id=\"T2_PC2\",\n                name=\"timezone_respected\",\n                passed=False,\n                details=\"No messages to evaluate.\",\n            )\n        # Check if the first message was sent during Priya's hours\n        # Priya: 08:00-17:30 PT. We check the UTC offset.\n        first_msg = self.priya_messages[0]\n        msg_hour = first_msg.timestamp.hour\n        # Simplified: assume action timestamps are in PT for this check\n        # In production, convert using pytz/zoneinfo\n        priya_start = 8\n        priya_end = 17  # 17:30 simplified to 17\n        passed = priya_start <= msg_hour <= priya_end\n        return VerifierResult(\n            check_id=\"T2_PC2\",\n            name=\"timezone_respected\",\n            passed=passed,\n            details=(\n                f\"Message sent at {msg_hour}:00 (within Priya's PT hours).\"\n                if passed else\n                f\"Message sent at {msg_hour}:00 - outside Priya's working hours (08:00–17:30 PT).\"\n            ),\n        )\n\n    def check_data_points_requested(self) -> VerifierResult:\n        \"\"\"T2_PC3: All required CS data points requested.\"\"\"\n        required_keywords = {\n            \"nrr_current_vs_target\": [r\"nrr\", r\"net\\s*revenue\\s*retention\"],\n            \"logo_churn_details\": [r\"churn\", r\"logo\\s*(churn|loss)\"],\n            \"nps_trend\": [r\"nps\", r\"net\\s*promoter\"],\n            \"at_risk_accounts_with_reasons\": [r\"at[\\s-]*risk\", r\"risk\\s*account\"],\n            \"top_5_expansion_opportunities\": [r\"expansion\", r\"upsell\", r\"grow\"],\n        }\n        combined_body = \" \".join(\n            (m.body or \"\").lower() for m in self.priya_messages\n        )\n        missing = [\n            key for key, patterns in required_keywords.items()\n            if not any(re.search(p, combined_body) for p in patterns)\n        ]\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T2_PC3\",\n            name=\"data_points_requested\",\n            passed=passed,\n            details=(\n                \"All 5 required data points requested.\"\n                if passed else f\"Missing: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_loom_accepted(self) -> VerifierResult:\n        \"\"\"T2_PC4: If Priya sent a Loom, agent accepted it.\"\"\"\n        # Check if Priya responded with a Loom and agent didn't ask for a doc instead\n        priya_loom_received = any(\n            a.metadata.get(\"contains_loom_link\")\n            for a in self.actions\n            if a.metadata.get(\"from\") == \"priya_narayanan\"\n        )\n        if not priya_loom_received:\n            return VerifierResult(\n                check_id=\"T2_PC4\",\n                name=\"loom_accepted\",\n                passed=True,\n                details=\"Priya did not send a Loom (conditional check skipped).\",\n                severity=\"info\",\n            )\n        # Check agent didn't ask for a written doc after receiving Loom\n        subsequent_msgs = [\n            m for m in self.priya_messages\n            if m.timestamp > max(\n                a.timestamp for a in self.actions\n                if a.metadata.get(\"from\") == \"priya_narayanan\"\n                and a.metadata.get(\"contains_loom_link\")\n            )\n        ]\n        asked_for_doc = any(\n            re.search(r\"(written|document|doc|text|type.{0,10}up)\", (m.body or \"\").lower())\n            for m in subsequent_msgs\n        )\n        return VerifierResult(\n            check_id=\"T2_PC4\",\n            name=\"loom_accepted\",\n            passed=not asked_for_doc,\n            details=(\n                \"Loom accepted without asking for written alternative.\"\n                if not asked_for_doc else\n                \"Agent asked Priya for a written doc after she sent a Loom - this doesn't match her workflow.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_slack_message_sent(),\n            self.check_timezone_respected(),\n            self.check_data_points_requested(),\n            self.check_loom_accepted(),\n        ]\n\n\n# =============================================================================\n# T3 Verifiers: Gather Product Roadmap Highlights\n# =============================================================================\n\nclass T3Verifier:\n    \"\"\"Verify: Agent correctly requested roadmap from Tomás via email.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.tomas_emails = [\n            a for a in actions\n            if a.recipient == \"tomas_rezende\"\n            and a.action_type == ActionType.EMAIL\n        ]\n        self.tomas_slacks = [\n            a for a in actions\n            if a.recipient == \"tomas_rezende\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_email_sent(self) -> VerifierResult:\n        \"\"\"T3_PC1: Email sent to tomas_rezende.\"\"\"\n        passed = len(self.tomas_emails) > 0\n        return VerifierResult(\n            check_id=\"T3_PC1\",\n            name=\"email_sent\",\n            passed=passed,\n            details=(\n                f\"Found {len(self.tomas_emails)} email(s) to Tomás.\"\n                if passed else \"No email sent to tomas_rezende.\"\n            ),\n        )\n\n    def check_not_slack(self) -> VerifierResult:\n        \"\"\"T3_PC2: No Slack DM sent to Tomás.\"\"\"\n        passed = len(self.tomas_slacks) == 0\n        return VerifierResult(\n            check_id=\"T3_PC2\",\n            name=\"email_not_slack\",\n            passed=passed,\n            details=(\n                \"No Slack messages sent to Tomás (correct - he prefers email).\"\n                if passed else\n                f\"Found {len(self.tomas_slacks)} Slack message(s) to Tomás. \"\n                \"He prefers email for cross-functional requests.\"\n            ),\n        )\n\n    def check_structured_request(self) -> VerifierResult:\n        \"\"\"T3_PC3: Email contains a numbered list.\"\"\"\n        combined_body = \" \".join(\n            (e.body or \"\") for e in self.tomas_emails\n        )\n        # Check for numbered list patterns: \"1.\", \"1)\", \"#1\", etc.\n        numbered_pattern = r\"(?:^|\\n)\\s*\\d+[\\.\\)]\\s\"\n        has_numbered_list = bool(re.search(numbered_pattern, combined_body))\n        return VerifierResult(\n            check_id=\"T3_PC3\",\n            name=\"structured_request\",\n            passed=has_numbered_list,\n            details=(\n                \"Email contains a structured numbered list (matches Tomás's preference).\"\n                if has_numbered_list else\n                \"Email lacks a numbered list - Tomás expects structured, numbered requests.\"\n            ),\n        )\n\n    def check_deadline_lead_time(self) -> VerifierResult:\n        \"\"\"T3_PC4: Deadline is at least 48 hours from send time.\"\"\"\n        if not self.tomas_emails:\n            return VerifierResult(\n                check_id=\"T3_PC4\",\n                name=\"deadline_with_lead_time\",\n                passed=False,\n                details=\"No email to evaluate.\",\n            )\n        # Extract deadline from email metadata\n        email = self.tomas_emails[0]\n        deadline = email.metadata.get(\"deadline\")\n        if not deadline:\n            return VerifierResult(\n                check_id=\"T3_PC4\",\n                name=\"deadline_with_lead_time\",\n                passed=False,\n                details=\"No deadline found in email metadata.\",\n                severity=\"warning\",\n            )\n        if isinstance(deadline, str):\n            try:\n                deadline = datetime.fromisoformat(deadline)\n            except ValueError:\n                return VerifierResult(\n                    check_id=\"T3_PC4\",\n                    name=\"deadline_with_lead_time\",\n                    passed=False,\n                    details=f\"Could not parse deadline: {deadline}\",\n                    severity=\"warning\",\n                )\n        lead_time = deadline - email.timestamp\n        passed = lead_time >= timedelta(hours=48)\n        return VerifierResult(\n            check_id=\"T3_PC4\",\n            name=\"deadline_with_lead_time\",\n            passed=passed,\n            details=(\n                f\"Lead time: {lead_time.total_seconds() / 3600:.0f} hours (≥48h required).\"\n                if passed else\n                f\"Lead time: {lead_time.total_seconds() / 3600:.0f} hours - \"\n                \"Tomás requires at least 48h notice.\"\n            ),\n        )\n\n    def check_no_sales_framing(self) -> VerifierResult:\n        \"\"\"T3_PC5: Email does NOT use sales-trigger phrases.\"\"\"\n        trigger_phrases = [\n            r\"features?\\s*(that\\s*)?sales\\s*needs?\",\n            r\"sales\\s*is\\s*(asking|requesting|waiting)\",\n            r\"close\\s*(the|a|this)\\s*deal\",\n            r\"deal[\\s-]critical\",\n            r\"revenue[\\s-]blocking\",\n            r\"customer\\s*is\\s*waiting\\s*for\",\n        ]\n        combined_body = \" \".join(\n            (e.body or \"\").lower() for e in self.tomas_emails\n        )\n        found_triggers = [\n            p for p in trigger_phrases if re.search(p, combined_body)\n        ]\n        passed = len(found_triggers) == 0\n        return VerifierResult(\n            check_id=\"T3_PC5\",\n            name=\"no_sales_framing\",\n            passed=passed,\n            details=(\n                \"No sales-trigger phrases found (correct - avoids the prioritization tension).\"\n                if passed else\n                \"Sales-oriented framing detected. This triggers Tomás's resistance \"\n                \"to 'building features for Sales.'\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_email_sent(),\n            self.check_not_slack(),\n            self.check_structured_request(),\n            self.check_deadline_lead_time(),\n            self.check_no_sales_framing(),\n        ]\n\n\n# =============================================================================\n# T4 Verifiers: Compile Competitive Intelligence\n# =============================================================================\n\nclass T4Verifier:\n    \"\"\"Verify: Agent correctly requested competitive intel from Diego.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.diego_messages = [\n            a for a in actions\n            if a.recipient == \"diego_fuentes_rios\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n        ]\n\n    def check_slack_sent(self) -> VerifierResult:\n        \"\"\"T4_PC1: Slack DM sent to Diego.\"\"\"\n        passed = len(self.diego_messages) > 0\n        return VerifierResult(\n            check_id=\"T4_PC1\",\n            name=\"slack_message_sent\",\n            passed=passed,\n            details=(\n                f\"Found {len(self.diego_messages)} message(s) to Diego.\"\n                if passed else \"No Slack message sent to diego_fuentes_rios.\"\n            ),\n        )\n\n    def check_sent_during_hours(self) -> VerifierResult:\n        \"\"\"T4_PC2: Message sent during Diego's hours (09:00-18:00 ET).\"\"\"\n        if not self.diego_messages:\n            return VerifierResult(\n                check_id=\"T4_PC2\",\n                name=\"sent_during_hours\",\n                passed=False,\n                details=\"No messages to evaluate.\",\n            )\n        msg = self.diego_messages[0]\n        hour = msg.timestamp.hour\n        passed = 9 <= hour < 18\n        return VerifierResult(\n            check_id=\"T4_PC2\",\n            name=\"sent_during_hours\",\n            passed=passed,\n            details=(\n                f\"Sent at {hour}:00 ET (within Diego's hours).\"\n                if passed else\n                f\"Sent at {hour}:00 ET - Diego disconnects fully after 18:00 ET.\"\n            ),\n        )\n\n    def check_acme_mentioned(self) -> VerifierResult:\n        \"\"\"T4_PC3: Request specifically mentions Acme.\"\"\"\n        combined = \" \".join((m.body or \"\").lower() for m in self.diego_messages)\n        passed = \"acme\" in combined\n        return VerifierResult(\n            check_id=\"T4_PC3\",\n            name=\"acme_mentioned\",\n            passed=passed,\n            details=(\n                \"Acme specifically mentioned in request.\"\n                if passed else \"Request did not mention Acme by name.\"\n            ),\n        )\n\n    def check_gong_data_requested(self) -> VerifierResult:\n        \"\"\"T4_PC4: Request includes ask for Gong win rate data.\"\"\"\n        combined = \" \".join((m.body or \"\").lower() for m in self.diego_messages)\n        patterns = [r\"gong\", r\"win\\s*rate\", r\"competitive\\s*win\"]\n        passed = any(re.search(p, combined) for p in patterns)\n        return VerifierResult(\n            check_id=\"T4_PC4\",\n            name=\"gong_data_requested\",\n            passed=passed,\n            details=(\n                \"Gong/win rate data requested.\"\n                if passed else \"No mention of Gong data or competitive win rate.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_slack_sent(),\n            self.check_sent_during_hours(),\n            self.check_acme_mentioned(),\n            self.check_gong_data_requested(),\n        ]\n\n\n# =============================================================================\n# T5 Verifiers: Draft QBR Deck\n# =============================================================================\n\nclass T5Verifier:\n    \"\"\"Verify: Agent correctly compiled the QBR deck.\"\"\"\n\n    REQUIRED_SECTIONS = [\n        \"executive_summary\",\n        \"revenue_performance\",\n        \"pipeline_analysis\",\n        \"customer_health\",\n        \"product_roadmap\",\n        \"competitive_landscape\",\n        \"key_wins_losses\",\n        \"q2_plan\",\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.deck_actions = [\n            a for a in actions\n            if a.action_type in (ActionType.DOCUMENT_CREATE, ActionType.DOCUMENT_EDIT)\n            and a.metadata.get(\"document_type\") == \"slides\"\n        ]\n        self.share_actions = [\n            a for a in actions\n            if a.action_type == ActionType.DOCUMENT_SHARE\n            or (a.action_type == ActionType.SLACK_MESSAGE\n                and a.recipient == \"rachel_whitford\"\n                and a.metadata.get(\"contains_doc_link\"))\n        ]\n\n    def check_all_inputs_used(self) -> VerifierResult:\n        \"\"\"T5_PC1: Deck incorporates data from T1, T2, T3, T4.\"\"\"\n        if not self.deck_actions:\n            return VerifierResult(\n                check_id=\"T5_PC1\",\n                name=\"all_inputs_used\",\n                passed=False,\n                details=\"No deck creation actions found.\",\n            )\n        deck = self.deck_actions[-1]  # latest version\n        sources = deck.metadata.get(\"data_sources\", [])\n        required = {\"T1\", \"T2\", \"T3\", \"T4\"}\n        found = required.intersection(set(sources))\n        missing = required - found\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T5_PC1\",\n            name=\"all_inputs_used\",\n            passed=passed,\n            details=(\n                \"All 4 data sources incorporated.\"\n                if passed else f\"Missing sources: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_required_sections(self) -> VerifierResult:\n        \"\"\"T5_PC2: Deck includes all 8 required sections.\"\"\"\n        if not self.deck_actions:\n            return VerifierResult(\n                check_id=\"T5_PC2\",\n                name=\"required_sections_present\",\n                passed=False,\n                details=\"No deck to evaluate.\",\n            )\n        deck = self.deck_actions[-1]\n        sections = deck.metadata.get(\"sections\", [])\n        missing = [s for s in self.REQUIRED_SECTIONS if s not in sections]\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T5_PC2\",\n            name=\"required_sections_present\",\n            passed=passed,\n            details=(\n                \"All 8 required sections present.\"\n                if passed else f\"Missing sections: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_slide_count(self) -> VerifierResult:\n        \"\"\"T5_PC3: Deck does not exceed 25 slides.\"\"\"\n        if not self.deck_actions:\n            return VerifierResult(\n                check_id=\"T5_PC3\",\n                name=\"slide_count\",\n                passed=False,\n                details=\"No deck to evaluate.\",\n            )\n        slide_count = self.deck_actions[-1].metadata.get(\"slide_count\", 0)\n        passed = slide_count <= 25\n        return VerifierResult(\n            check_id=\"T5_PC3\",\n            name=\"slide_count\",\n            passed=passed,\n            details=(\n                f\"Deck has {slide_count} slides (≤25 limit).\"\n                if passed else\n                f\"Deck has {slide_count} slides - exceeds 25-slide limit \"\n                \"(Lena is intolerant of long presentations).\"\n            ),\n        )\n\n    def check_shared_with_rachel(self) -> VerifierResult:\n        \"\"\"T5_PC4: Deck shared with Rachel via Slack DM.\"\"\"\n        rachel_shares = [\n            a for a in self.share_actions\n            if a.recipient == \"rachel_whitford\"\n        ]\n        passed = len(rachel_shares) > 0\n        return VerifierResult(\n            check_id=\"T5_PC4\",\n            name=\"shared_with_rachel\",\n            passed=passed,\n            details=(\n                \"Draft deck shared with Rachel.\"\n                if passed else \"Deck not shared with Rachel via Slack DM.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_all_inputs_used(),\n            self.check_required_sections(),\n            self.check_slide_count(),\n            self.check_shared_with_rachel(),\n        ]\n\n\n# =============================================================================\n# T6 Verifiers: Schedule QBR Prep Meeting\n# =============================================================================\n\nclass T6Verifier:\n    \"\"\"Verify: Agent correctly scheduled the prep meeting.\"\"\"\n\n    REQUIRED_ATTENDEES = [\n        \"rachel_whitford\",\n        \"priya_narayanan\",\n        \"kenji_watanabe\",\n        \"diego_fuentes_rios\",\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.calendar_actions = [\n            a for a in actions\n            if a.action_type == ActionType.CALENDAR_INVITE\n            and a.metadata.get(\"meeting_type\") == \"prep\"\n        ]\n\n    def check_attendees(self) -> VerifierResult:\n        \"\"\"T6_PC1: All 4 required attendees are on the invite.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T6_PC1\",\n                name=\"all_attendees_included\",\n                passed=False,\n                details=\"No calendar invite found.\",\n            )\n        invite = self.calendar_actions[0]\n        missing = [\n            a for a in self.REQUIRED_ATTENDEES\n            if a not in invite.attendees\n        ]\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T6_PC1\",\n            name=\"all_attendees_included\",\n            passed=passed,\n            details=(\n                \"All 4 attendees included.\"\n                if passed else f\"Missing attendees: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_duration(self) -> VerifierResult:\n        \"\"\"T6_PC2: Meeting is exactly 60 minutes.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T6_PC2\",\n                name=\"duration_correct\",\n                passed=False,\n                details=\"No invite to evaluate.\",\n            )\n        duration = self.calendar_actions[0].duration_minutes\n        passed = duration == 60\n        return VerifierResult(\n            check_id=\"T6_PC2\",\n            name=\"duration_correct\",\n            passed=passed,\n            details=(\n                \"Duration: 60 minutes (correct).\"\n                if passed else f\"Duration: {duration} minutes (expected 60).\"\n            ),\n        )\n\n    def check_timezone_feasible(self) -> VerifierResult:\n        \"\"\"T6_PC3: Meeting within cross-timezone window (10:00-17:00 CT).\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T6_PC3\",\n                name=\"timezone_feasible\",\n                passed=False,\n                details=\"No invite to evaluate.\",\n            )\n        invite = self.calendar_actions[0]\n        if not invite.start_time:\n            return VerifierResult(\n                check_id=\"T6_PC3\",\n                name=\"timezone_feasible\",\n                passed=False,\n                details=\"No start time on invite.\",\n            )\n        hour = invite.start_time.hour\n        passed = ALL_HANDS_WINDOW_CT[0] <= hour < ALL_HANDS_WINDOW_CT[2]\n        return VerifierResult(\n            check_id=\"T6_PC3\",\n            name=\"timezone_feasible\",\n            passed=passed,\n            details=(\n                f\"Meeting at {hour}:00 CT (within 10:00–17:00 cross-TZ window).\"\n                if passed else\n                f\"Meeting at {hour}:00 CT - outside feasible window for Priya (PT).\"\n            ),\n        )\n\n    def check_agenda_included(self) -> VerifierResult:\n        \"\"\"T6_PC4: Calendar invite body contains an agenda.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T6_PC4\",\n                name=\"agenda_included\",\n                passed=False,\n                details=\"No invite to evaluate.\",\n            )\n        body = (self.calendar_actions[0].body or \"\").lower()\n        agenda_indicators = [r\"agenda\", r\"1\\.\", r\"topics?:\", r\"discussion\\s*items\"]\n        passed = any(re.search(p, body) for p in agenda_indicators)\n        return VerifierResult(\n            check_id=\"T6_PC4\",\n            name=\"agenda_included\",\n            passed=passed,\n            details=(\n                \"Agenda found in invite body.\"\n                if passed else \"No agenda detected in calendar invite.\"\n            ),\n        )\n\n    def check_timing_before_qbr(self) -> VerifierResult:\n        \"\"\"T6_PC5: Meeting is at least 3 business days before QBR.\"\"\"\n        if not self.calendar_actions:\n            return VerifierResult(\n                check_id=\"T6_PC5\",\n                name=\"three_days_before_qbr\",\n                passed=False,\n                details=\"No invite to evaluate.\",\n            )\n        invite = self.calendar_actions[0]\n        qbr_date = invite.metadata.get(\"qbr_date\")\n        if not qbr_date or not invite.start_time:\n            return VerifierResult(\n                check_id=\"T6_PC5\",\n                name=\"three_days_before_qbr\",\n                passed=False,\n                details=\"QBR date or meeting date not available for comparison.\",\n                severity=\"warning\",\n            )\n        if isinstance(qbr_date, str):\n            qbr_date = datetime.fromisoformat(qbr_date)\n        days_before = (qbr_date - invite.start_time).days\n        passed = days_before >= 3\n        return VerifierResult(\n            check_id=\"T6_PC5\",\n            name=\"three_days_before_qbr\",\n            passed=passed,\n            details=(\n                f\"Prep meeting is {days_before} days before QBR (≥3 required).\"\n                if passed else\n                f\"Only {days_before} day(s) before QBR - need at least 3 business days.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_attendees(),\n            self.check_duration(),\n            self.check_timezone_feasible(),\n            self.check_agenda_included(),\n            self.check_timing_before_qbr(),\n        ]\n\n\n# =============================================================================\n# T7-T12 Verifiers (abbreviated - same pattern)\n# =============================================================================\n\nclass T7Verifier:\n    \"\"\"Verify: Pre-read materials circulated correctly.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.preread_emails = [\n            a for a in actions\n            if a.action_type == ActionType.EMAIL\n            and a.metadata.get(\"purpose\") == \"pre_read\"\n        ]\n\n    def check_email_sent(self) -> VerifierResult:\n        \"\"\"T7_PC1: Email sent to all 4 prep attendees.\"\"\"\n        recipients = set()\n        for email in self.preread_emails:\n            if email.recipient:\n                recipients.add(email.recipient)\n            recipients.update(email.metadata.get(\"cc\", []))\n            recipients.update(email.metadata.get(\"to\", []))\n        required = {\"rachel_whitford\", \"priya_narayanan\", \"kenji_watanabe\", \"diego_fuentes_rios\"}\n        missing = required - recipients\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T7_PC1\",\n            name=\"email_sent\",\n            passed=passed,\n            details=(\n                \"Pre-read email sent to all 4 attendees.\"\n                if passed else f\"Missing recipients: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_timing(self) -> VerifierResult:\n        \"\"\"T7_PC2: Sent at least 48 hours before meeting.\"\"\"\n        if not self.preread_emails:\n            return VerifierResult(\n                check_id=\"T7_PC2\",\n                name=\"timing_correct\",\n                passed=False,\n                details=\"No pre-read email found.\",\n            )\n        email = self.preread_emails[0]\n        meeting_time = email.metadata.get(\"meeting_time\")\n        if not meeting_time:\n            return VerifierResult(\n                check_id=\"T7_PC2\",\n                name=\"timing_correct\",\n                passed=False,\n                details=\"Meeting time not available.\",\n                severity=\"warning\",\n            )\n        if isinstance(meeting_time, str):\n            meeting_time = datetime.fromisoformat(meeting_time)\n        lead = meeting_time - email.timestamp\n        passed = lead >= timedelta(hours=48)\n        return VerifierResult(\n            check_id=\"T7_PC2\",\n            name=\"timing_correct\",\n            passed=passed,\n            details=f\"Pre-read sent {lead.total_seconds() / 3600:.0f}h before meeting (48h required).\",\n        )\n\n    def check_deck_link(self) -> VerifierResult:\n        \"\"\"T7_PC3: Email contains deck link.\"\"\"\n        has_link = any(\n            e.metadata.get(\"contains_doc_link\") or\n            re.search(r\"https?://\", e.body or \"\")\n            for e in self.preread_emails\n        )\n        return VerifierResult(\n            check_id=\"T7_PC3\",\n            name=\"deck_link_included\",\n            passed=has_link,\n            details=\"Deck link found.\" if has_link else \"No deck link in email.\",\n        )\n\n    def check_no_extra_recipients(self) -> VerifierResult:\n        \"\"\"T7_PC4: Email NOT sent to Lena, Tomás, Marcus, or Siobhán.\"\"\"\n        excluded = {\"lena_strom\", \"tomas_rezende\", \"marcus_tan_ohara\", \"siobhan_omalley\"}\n        all_recipients = set()\n        for email in self.preread_emails:\n            if email.recipient:\n                all_recipients.add(email.recipient)\n            all_recipients.update(email.metadata.get(\"cc\", []))\n            all_recipients.update(email.metadata.get(\"to\", []))\n        leaked = excluded.intersection(all_recipients)\n        passed = len(leaked) == 0\n        return VerifierResult(\n            check_id=\"T7_PC4\",\n            name=\"no_extra_recipients\",\n            passed=passed,\n            details=(\n                \"Pre-read correctly scoped to prep attendees only.\"\n                if passed else\n                f\"Pre-read sent to non-prep attendees: {', '.join(leaked)}. \"\n                \"This is a working session pre-read, not final distribution.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_email_sent(),\n            self.check_timing(),\n            self.check_deck_link(),\n            self.check_no_extra_recipients(),\n        ]\n\n\nclass T8Verifier:\n    \"\"\"Verify: Prep meeting follow-up distributed correctly.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n\n    def check_slack_summary(self) -> VerifierResult:\n        \"\"\"T8_PC1: Summary posted in Slack within 2 hours.\"\"\"\n        summaries = [\n            a for a in self.actions\n            if a.action_type == ActionType.SLACK_MESSAGE\n            and a.metadata.get(\"purpose\") == \"meeting_summary\"\n        ]\n        passed = len(summaries) > 0\n        return VerifierResult(\n            check_id=\"T8_PC1\",\n            name=\"slack_summary_posted\",\n            passed=passed,\n            details=\"Meeting summary posted.\" if passed else \"No summary posted.\",\n        )\n\n    def check_action_items_owners(self) -> VerifierResult:\n        \"\"\"T8_PC2: Every action item has an owner.\"\"\"\n        action_items = [\n            a for a in self.actions\n            if a.metadata.get(\"is_action_item\")\n        ]\n        if not action_items:\n            return VerifierResult(\n                check_id=\"T8_PC2\",\n                name=\"action_items_have_owners\",\n                passed=False,\n                details=\"No action items found.\",\n            )\n        without_owner = [a for a in action_items if not a.metadata.get(\"owner\")]\n        passed = len(without_owner) == 0\n        return VerifierResult(\n            check_id=\"T8_PC2\",\n            name=\"action_items_have_owners\",\n            passed=passed,\n            details=(\n                f\"All {len(action_items)} action items have owners.\"\n                if passed else\n                f\"{len(without_owner)}/{len(action_items)} items lack owners.\"\n            ),\n        )\n\n    def check_action_items_deadlines(self) -> VerifierResult:\n        \"\"\"T8_PC3: Every action item has a deadline.\"\"\"\n        action_items = [\n            a for a in self.actions\n            if a.metadata.get(\"is_action_item\")\n        ]\n        if not action_items:\n            return VerifierResult(\n                check_id=\"T8_PC3\",\n                name=\"action_items_have_deadlines\",\n                passed=False,\n                details=\"No action items found.\",\n            )\n        without_deadline = [a for a in action_items if not a.metadata.get(\"deadline\")]\n        passed = len(without_deadline) == 0\n        return VerifierResult(\n            check_id=\"T8_PC3\",\n            name=\"action_items_have_deadlines\",\n            passed=passed,\n            details=(\n                f\"All {len(action_items)} items have deadlines.\"\n                if passed else\n                f\"{len(without_deadline)}/{len(action_items)} items lack deadlines.\"\n            ),\n        )\n\n    def check_priya_followup(self) -> VerifierResult:\n        \"\"\"T8_PC4: Follow-up DM sent to Priya for additional thoughts.\"\"\"\n        priya_followups = [\n            a for a in self.actions\n            if a.recipient == \"priya_narayanan\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n            and a.metadata.get(\"purpose\") in (\"followup\", \"feedback_request\")\n        ]\n        passed = len(priya_followups) > 0\n        return VerifierResult(\n            check_id=\"T8_PC4\",\n            name=\"priya_followup_dm\",\n            passed=passed,\n            details=(\n                \"Follow-up DM sent to Priya (good - she's conflict-avoidant in groups).\"\n                if passed else\n                \"No follow-up sent to Priya. She may have additional feedback \"\n                \"she didn't share in the group meeting.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_slack_summary(),\n            self.check_action_items_owners(),\n            self.check_action_items_deadlines(),\n            self.check_priya_followup(),\n        ]\n\n\nclass T9Verifier:\n    \"\"\"Verify: Final deck approved by Rachel.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n\n    def check_rachel_approved(self) -> VerifierResult:\n        \"\"\"T9_PC2: Rachel explicitly approved.\"\"\"\n        approval_indicators = [\n            a for a in self.actions\n            if a.metadata.get(\"from\") == \"rachel_whitford\"\n            and a.metadata.get(\"is_approval\")\n        ]\n        passed = len(approval_indicators) > 0\n        return VerifierResult(\n            check_id=\"T9_PC2\",\n            name=\"rachel_approved\",\n            passed=passed,\n            details=(\n                \"Rachel's explicit approval received.\"\n                if passed else\n                \"No explicit approval from Rachel. \"\n                \"A 👍 or 'looks good' counts. No response does NOT count.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [self.check_rachel_approved()]\n\n\nclass T10Verifier:\n    \"\"\"Verify: QBR invite sent correctly.\"\"\"\n\n    REQUIRED_ATTENDEES = [\n        \"rachel_whitford\", \"lena_strom\", \"marcus_tan_ohara\",\n        \"priya_narayanan\", \"diego_fuentes_rios\", \"kenji_watanabe\",\n        \"siobhan_omalley\",\n    ]\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.qbr_invites = [\n            a for a in actions\n            if a.action_type == ActionType.CALENDAR_INVITE\n            and a.metadata.get(\"meeting_type\") == \"qbr\"\n        ]\n\n    def check_attendees(self) -> VerifierResult:\n        \"\"\"T10_PC1: All 7 required attendees.\"\"\"\n        if not self.qbr_invites:\n            return VerifierResult(\n                check_id=\"T10_PC1\",\n                name=\"all_attendees\",\n                passed=False,\n                details=\"No QBR invite found.\",\n            )\n        missing = [\n            a for a in self.REQUIRED_ATTENDEES\n            if a not in self.qbr_invites[0].attendees\n        ]\n        passed = len(missing) == 0\n        return VerifierResult(\n            check_id=\"T10_PC1\",\n            name=\"all_attendees\",\n            passed=passed,\n            details=(\n                \"All 7 attendees included.\"\n                if passed else f\"Missing: {', '.join(missing)}\"\n            ),\n        )\n\n    def check_duration(self) -> VerifierResult:\n        \"\"\"T10_PC2: 90-minute meeting.\"\"\"\n        if not self.qbr_invites:\n            return VerifierResult(\n                check_id=\"T10_PC2\",\n                name=\"duration\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        passed = self.qbr_invites[0].duration_minutes == 90\n        return VerifierResult(\n            check_id=\"T10_PC2\",\n            name=\"duration\",\n            passed=passed,\n            details=f\"Duration: {self.qbr_invites[0].duration_minutes}min (90 required).\",\n        )\n\n    def check_conclusion_first_agenda(self) -> VerifierResult:\n        \"\"\"T10_PC5: Agenda starts with executive summary.\"\"\"\n        if not self.qbr_invites:\n            return VerifierResult(\n                check_id=\"T10_PC5\",\n                name=\"conclusion_first_agenda\",\n                passed=False,\n                details=\"No invite.\",\n            )\n        body = (self.qbr_invites[0].body or \"\").lower()\n        # Check that \"executive summary\" or \"conclusion\" appears before other sections\n        exec_pos = body.find(\"executive summary\")\n        if exec_pos == -1:\n            exec_pos = body.find(\"bottom line\")\n        if exec_pos == -1:\n            exec_pos = body.find(\"key findings\")\n        other_sections = [\"pipeline\", \"customer health\", \"competitive\", \"roadmap\"]\n        first_other = min(\n            (body.find(s) for s in other_sections if body.find(s) != -1),\n            default=len(body)\n        )\n        passed = exec_pos != -1 and exec_pos < first_other\n        return VerifierResult(\n            check_id=\"T10_PC5\",\n            name=\"conclusion_first_agenda\",\n            passed=passed,\n            details=(\n                \"Agenda leads with executive summary (Lena's 'start with the conclusion').\"\n                if passed else\n                \"Agenda does not lead with executive summary/conclusion.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_attendees(),\n            self.check_duration(),\n            self.check_conclusion_first_agenda(),\n        ]\n\n\nclass T11Verifier:\n    \"\"\"Verify: Executive pre-brief sent to Lena.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.lena_emails = [\n            a for a in actions\n            if a.recipient == \"lena_strom\"\n            and a.action_type == ActionType.EMAIL\n            and a.metadata.get(\"purpose\") == \"pre_brief\"\n        ]\n\n    def check_email_sent(self) -> VerifierResult:\n        \"\"\"T11_PC1: Email sent to Lena.\"\"\"\n        passed = len(self.lena_emails) > 0\n        return VerifierResult(\n            check_id=\"T11_PC1\",\n            name=\"email_sent\",\n            passed=passed,\n            details=\"Pre-brief email sent to Lena.\" if passed else \"No pre-brief email.\",\n        )\n\n    def check_timing(self) -> VerifierResult:\n        \"\"\"T11_PC2: Sent ~24h before QBR (±4h tolerance).\"\"\"\n        if not self.lena_emails:\n            return VerifierResult(\n                check_id=\"T11_PC2\",\n                name=\"timing\",\n                passed=False,\n                details=\"No email to evaluate.\",\n            )\n        email = self.lena_emails[0]\n        qbr_time = email.metadata.get(\"qbr_time\")\n        if not qbr_time:\n            return VerifierResult(\n                check_id=\"T11_PC2\",\n                name=\"timing\",\n                passed=False,\n                details=\"QBR time not available.\",\n                severity=\"warning\",\n            )\n        if isinstance(qbr_time, str):\n            qbr_time = datetime.fromisoformat(qbr_time)\n        hours_before = (qbr_time - email.timestamp).total_seconds() / 3600\n        passed = 20 <= hours_before <= 28  # 24h ± 4h\n        return VerifierResult(\n            check_id=\"T11_PC2\",\n            name=\"timing\",\n            passed=passed,\n            details=f\"Sent {hours_before:.0f}h before QBR (target: 24h ± 4h).\",\n        )\n\n    def check_not_slack(self) -> VerifierResult:\n        \"\"\"T11_PC3: Sent via email, not Slack.\"\"\"\n        lena_slacks = [\n            a for a in self.actions\n            if a.recipient == \"lena_strom\"\n            and a.action_type == ActionType.SLACK_MESSAGE\n            and a.metadata.get(\"purpose\") == \"pre_brief\"\n        ]\n        passed = len(lena_slacks) == 0\n        return VerifierResult(\n            check_id=\"T11_PC3\",\n            name=\"not_slack\",\n            passed=passed,\n            details=(\n                \"Pre-brief sent via email (correct).\"\n                if passed else\n                \"Pre-brief sent via Slack - Lena doesn't engage with long Slack messages.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_email_sent(),\n            self.check_timing(),\n            self.check_not_slack(),\n        ]\n\n\nclass T12Verifier:\n    \"\"\"Verify: Post-QBR action items distributed.\"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n\n    def check_email_sent(self) -> VerifierResult:\n        \"\"\"T12_PC1: Email sent within 4 hours.\"\"\"\n        action_emails = [\n            a for a in self.actions\n            if a.action_type == ActionType.EMAIL\n            and a.metadata.get(\"purpose\") == \"post_qbr_actions\"\n        ]\n        passed = len(action_emails) > 0\n        return VerifierResult(\n            check_id=\"T12_PC1\",\n            name=\"email_sent\",\n            passed=passed,\n            details=\"Action items email sent.\" if passed else \"No post-QBR email.\",\n        )\n\n    def check_notion_tasks(self) -> VerifierResult:\n        \"\"\"T12_PC3: Notion tasks created.\"\"\"\n        notion_actions = [\n            a for a in self.actions\n            if a.action_type == ActionType.NOTION_TASK\n        ]\n        passed = len(notion_actions) > 0\n        return VerifierResult(\n            check_id=\"T12_PC3\",\n            name=\"notion_tasks_created\",\n            passed=passed,\n            details=(\n                f\"{len(notion_actions)} Notion task(s) created.\"\n                if passed else \"No Notion tasks created.\"\n            ),\n        )\n\n    def run_all(self) -> list[VerifierResult]:\n        return [\n            self.check_email_sent(),\n            self.check_notion_tasks(),\n        ]\n\n\n# =============================================================================\n# DAG Dependency Verifier\n# =============================================================================\n\nclass DAGVerifier:\n    \"\"\"Verify that tasks were executed in correct dependency order.\"\"\"\n\n    DEPENDENCIES = {\n        \"T1\": [],\n        \"T2\": [],\n        \"T3\": [],\n        \"T4\": [],\n        \"T5\": [\"T1\", \"T2\", \"T3\", \"T4\"],\n        \"T6\": [],\n        \"T7\": [\"T5\", \"T6\"],\n        \"T8\": [\"T7\"],\n        \"T9\": [\"T8\"],\n        \"T10\": [\"T9\"],\n        \"T11\": [\"T9\"],\n        \"T12\": [\"T10\"],\n    }\n\n    def __init__(self, task_completion_times: dict[str, datetime]):\n        \"\"\"\n        Args:\n            task_completion_times: mapping of task_id -> completion timestamp\n        \"\"\"\n        self.completion_times = task_completion_times\n\n    def check_all_dependencies(self) -> list[VerifierResult]:\n        results = []\n        for task, deps in self.DEPENDENCIES.items():\n            if task not in self.completion_times:\n                continue\n            task_start = self.completion_times[task]\n            violations = []\n            for dep in deps:\n                if dep not in self.completion_times:\n                    violations.append(f\"{dep} (not completed)\")\n                elif self.completion_times[dep] > task_start:\n                    violations.append(\n                        f\"{dep} (completed after {task} started)\"\n                    )\n            passed = len(violations) == 0\n            results.append(VerifierResult(\n                check_id=f\"DAG_{task}\",\n                name=f\"dag_dependency_{task.lower()}\",\n                passed=passed,\n                details=(\n                    f\"{task}: All dependencies satisfied.\"\n                    if passed else\n                    f\"{task}: Dependency violations: {', '.join(violations)}\"\n                ),\n            ))\n        return results\n\n\n# =============================================================================\n# Rubric Evaluator (LLM-as-Judge scaffolding)\n# =============================================================================\n\nclass RubricEvaluator:\n    \"\"\"\n    Scaffolding for LLM-as-judge rubric evaluation.\n\n    In production, each evaluate_* method would call an LLM with the rubric\n    criteria, the agent's action log, and the persona context, asking it to\n    score 1-5 with justification.\n    \"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n\n    def _get_messages_to(self, persona_id: str) -> list[Action]:\n        return [\n            a for a in self.actions\n            if a.recipient == persona_id\n        ]\n\n    def evaluate_communication_style_match(\n        self,\n        persona_id: str,\n        expected_style: str,\n    ) -> RubricScore:\n        \"\"\"\n        Evaluate whether the agent's communication matched the persona's\n        preferred style.\n\n        In production, this would invoke an LLM judge with:\n        - The persona's communication profile\n        - The agent's actual messages\n        - The rubric scoring criteria\n        \"\"\"\n        messages = self._get_messages_to(persona_id)\n        message_texts = [m.body or \"\" for m in messages]\n\n        # Placeholder: return a score structure for the LLM judge to fill\n        return RubricScore(\n            rubric_id=f\"style_{persona_id}\",\n            name=f\"communication_style_match_{persona_id}\",\n            dimension=\"Persona Fidelity\",\n            score=0,  # To be filled by LLM judge\n            justification=\"[LLM judge evaluation pending]\",\n            evidence=message_texts[:3],  # First 3 messages as evidence\n        )\n\n    def evaluate_political_navigation(self) -> RubricScore:\n        \"\"\"\n        Evaluate how well the agent navigated organizational politics.\n\n        Key tensions to check:\n        - Rachel/Tomás: feature prioritization\n        - Priya/Lena: retention vs. expansion\n        - Rachel/Marcus: discount authority\n        - Rachel's Q4 blame: product vs. pricing\n        \"\"\"\n        # Collect all cross-functional interactions\n        tomas_messages = self._get_messages_to(\"tomas_rezende\")\n        priya_messages = self._get_messages_to(\"priya_narayanan\")\n\n        return RubricScore(\n            rubric_id=\"G_R4\",\n            name=\"political_navigation\",\n            dimension=\"Organizational Awareness\",\n            score=0,  # LLM judge\n            justification=\"[LLM judge evaluation pending]\",\n            evidence=[\n                f\"Tomás messages: {len(tomas_messages)}\",\n                f\"Priya messages: {len(priya_messages)}\",\n            ],\n        )\n\n    def build_judge_prompt(\n        self,\n        rubric_id: str,\n        rubric_text: str,\n        evidence: list[str],\n    ) -> str:\n        \"\"\"\n        Build a prompt for an LLM judge to evaluate a rubric criterion.\n\n        Returns a formatted prompt string that can be sent to an evaluation LLM.\n        \"\"\"\n        return f\"\"\"You are evaluating an AI agent's performance on a workplace task.\n\n## Rubric Criterion\nID: {rubric_id}\n{rubric_text}\n\n## Evidence (Agent's Actions)\n{chr(10).join(f\"- {e}\" for e in evidence)}\n\n## Instructions\nScore the agent's performance on a scale of 1-5 based on the rubric above.\nProvide:\n1. Score (1-5)\n2. Justification (2-3 sentences explaining why this score)\n3. Specific evidence from the actions that supports your score\n\nRespond in JSON format:\n{{\"score\": <int>, \"justification\": \"<string>\", \"key_evidence\": [\"<string>\", ...]}}\n\"\"\"\n\n\n# =============================================================================\n# Master Verifier\n# =============================================================================\n\nclass QBRVerifier:\n    \"\"\"\n    Master verifier that runs all programmatic checks and prepares rubric\n    evaluations for the QBR scenario.\n    \"\"\"\n\n    def __init__(self, actions: list[Action]):\n        self.actions = actions\n        self.task_verifiers = {\n            \"T1\": T1Verifier(actions),\n            \"T2\": T2Verifier(actions),\n            \"T3\": T3Verifier(actions),\n            \"T4\": T4Verifier(actions),\n            \"T5\": T5Verifier(actions),\n            \"T6\": T6Verifier(actions),\n            \"T7\": T7Verifier(actions),\n            \"T8\": T8Verifier(actions),\n            \"T9\": T9Verifier(actions),\n            \"T10\": T10Verifier(actions),\n            \"T11\": T11Verifier(actions),\n            \"T12\": T12Verifier(actions),\n        }\n        self.rubric_evaluator = RubricEvaluator(actions)\n\n    def run_programmatic_checks(self) -> dict[str, list[VerifierResult]]:\n        \"\"\"Run all programmatic verifiers for all tasks.\"\"\"\n        results = {}\n        for task_id, verifier in self.task_verifiers.items():\n            results[task_id] = verifier.run_all()\n        return results\n\n    def run_dag_checks(\n        self, completion_times: dict[str, datetime]\n    ) -> list[VerifierResult]:\n        \"\"\"Verify DAG execution order.\"\"\"\n        dag = DAGVerifier(completion_times)\n        return dag.check_all_dependencies()\n\n    def run_all(\n        self,\n        completion_times: dict[str, datetime] | None = None,\n    ) -> dict[str, Any]:\n        \"\"\"Run all checks and return a full results dict.\"\"\"\n        programmatic = self.run_programmatic_checks()\n        dag = (\n            self.run_dag_checks(completion_times)\n            if completion_times else []\n        )\n\n        # Aggregate pass/fail stats\n        all_checks = []\n        for task_results in programmatic.values():\n            all_checks.extend(task_results)\n        all_checks.extend(dag)\n\n        total = len(all_checks)\n        passed = sum(1 for c in all_checks if c.passed)\n        failed = total - passed\n\n        return {\n            \"summary\": {\n                \"total_checks\": total,\n                \"passed\": passed,\n                \"failed\": failed,\n                \"pass_rate\": f\"{passed / total * 100:.1f}%\" if total > 0 else \"N/A\",\n            },\n            \"programmatic_results\": {\n                task_id: [\n                    {\n                        \"check_id\": r.check_id,\n                        \"name\": r.name,\n                        \"passed\": r.passed,\n                        \"details\": r.details,\n                        \"severity\": r.severity,\n                    }\n                    for r in results\n                ]\n                for task_id, results in programmatic.items()\n            },\n            \"dag_results\": [\n                {\n                    \"check_id\": r.check_id,\n                    \"name\": r.name,\n                    \"passed\": r.passed,\n                    \"details\": r.details,\n                }\n                for r in dag\n            ],\n        }\n"},"pinnacle_migration":{"organization":{"name":"Pinnacle Health Systems","industry":"Healthcare - Regional Health System","type":"Non-profit","facilities":{"hospitals":6,"outpatient_clinics":42,"imaging_centers":8} ance, and project management perspectives?\n","scoring":{"1":"Agenda is purely technical with no clinical voice","2":"Clinical perspective is an afterthought","3":"Balanced agenda with all perspectives represented","4":"Clinical requirements and workflow impact are given prominent agenda time, matching a healthcare project's priorities","5":"Agenda leads with clinical impact (Dr. Achebe and Dr. Lindqvist), technical and compliance support the clinical goals, and Carla's project governance wraps it up - this is a clinical system first, IT project second"}},{"id":"T3_R3","name":"dr_lindqvist_accommodation","dimension":"Difficult Stakeholder Management","description":"Did the agent accommodate Dr. Lindqvist's known behaviors (doesn't read pre-reads, prefers phone, impatient with process, will leave for patients)?\n","scoring":{"1":"Sent Dr. Lindqvist a long pre-read email and expected him to prepare","2":"Sent standard invite without accommodations","3":"Sent a concise invite with short agenda","4":"Prepared a 1-page printed summary, kept his agenda section focused on workflow impact","5":"Prepared printed summary, scheduled his section early in the meeting (before he might leave), framed the agenda in clinical terms ('how many clicks'), and noted that printed agendas will be available"}}]},"T4_baa_execution":{"programmatic_checks":[{"id":"T4_PC1","name":"security_review_complete_first","description":"T4 did not start until T1 (Frank's security review) was complete","type":"boolean"},{"id":"T4_PC2","name":"geraldine_review_sent","description":"BAA sent to Geraldine for compliance review","type":"boolean"},{"id":"T4_PC3","name":"frank_review_sent","description":"BAA sent to Frank for security terms review","type":"boolean"},{"id":"T4_PC4","name":"hector_review_sent","description":"BAA sent to Hector via Coupa for commercial terms","type":"boolean"},{"id":"T4_PC5","name":"42cfr_provisions_flagged","description":"42 CFR Part 2 provisions are specifically flagged in the BAA review request","type":"boolean"},{"id":"T4_PC6","name":"breach_notification_24hr","description":"BAA includes 24-hour breach notification (Pinnacle's internal policy, stricter than HIPAA)","type":"boolean"},{"id":"T4_PC7","name":"docusign_envelope_created","description":"DocuSign envelope created with correct signing order","type":"boolean"},{"id":"T4_PC8","name":"jira_ticket_tracking","description":"Jira ticket created with sub-tasks for each reviewer","type":"boolean"}],"rubric_criteria":[{"id":"T4_R1","name":"compliance_depth","dimension":"Regulatory Knowledge","description":"Did the agent demonstrate understanding of healthcare-specific BAA requirements, including 42 CFR Part 2 and Pinnacle's 24-hour breach notification policy?\n","scoring":{"1":"Treated BAA as a standard vendor contract with no healthcare-specific awareness","2":"Mentioned HIPAA but missed 42 CFR Part 2 and Pinnacle's stricter policies","3":"Included HIPAA and 42 CFR Part 2 requirements","4":"Flagged all regulatory requirements including Pinnacle's 24-hour breach notification policy","5":"Full regulatory coverage, routed through Geraldine first (she expedites legal review), flagged 42 CFR Part 2, 24-hour breach notification, and audit rights - shows deep healthcare compliance awareness"}},{"id":"T4_R2","name":"multi_stakeholder_coordination","dimension":"Process Orchestration","description":"Did the agent coordinate the parallel reviews efficiently (Geraldine for compliance, Frank for security, Hector for commercial) while respecting the T1 dependency?\n","scoring":{"1":"Sent BAA for review before T1 was complete","2":"Sequential reviews (one after another) causing unnecessary delay","3":"Parallel reviews with basic tracking","4":"Parallel reviews with clear deadlines, sub-tasks in Jira, and Geraldine's 'recommended for approval' memo to expedite legal","5":"Parallel reviews, proactive timeline management, Geraldine's pre-review to expedite legal, Hector notified early about commercial terms D-105 created with infrastructure sub-tasks","type":"boolean"}],"rubric_criteria":[{"id":"T5_R1","name":"security_requirements_completeness","dimension":"Security Awareness","description":"Did the agent specify all of Frank's security requirements for the staging environment?\n","scoring":{"1":"Missing critical security requirements (encryption, VPC isolation)","2":"Some requirements present but significant gaps","3":"All explicitly stated requirements present","4":"All requirements present plus Frank's Terraform review before provisioning","5":"Complete security spec, Frank's pre-approval built in, credentials handled via Secrets Manager (not Slack), and GovCloud region specified - shows HIPAA infrastructure knowledge"}},{"id":"T5_R2","name":"over_engineering_management","dimension":"Pragmatic Judgment","description":"If Min-Ji proposed Kubernetes for staging, did the agent steer toward the simpler EC2+RDS approach while respecting her expertise?\n","scoring":{"1":"Encouraged Kubernetes without questioning scope","2":"Accepted K8s without evaluating whether it's necessary","3":"Asked whether K8s is needed for staging","4":"Gently proposed EC2+RDS for staging with reasoning (timeline, scope), offered K8s as post-migration optimization","5":"Respectful steering with clear reasoning, deferred to Ananya for final call if Min-Ji disagreed, and framed it as 'let's prove the migration works first, then optimize infrastructure'"}}]},"T6_test_data_migration":{"programmatic_checks":[{"id":"T6_PC1","name":"staging_ready","description":"T5 (staging provisioned) is complete before migration","type":"boolean"},{"id":"T6_PC2","name":"data_deidentified","description":"De-identification method confirmed before loading data","type":"boolean"},{"id":"T6_PC3","name":"geraldine_deident_approval","description":"Geraldine approved the de-identification method in writing","type":"boolean"},{"id":"T6_PC4","name":"validation_performed","description":"Both technical and clinical validation performed","type":"checklist","items":["record_count_comparison","field_mapping_accuracy","referential_integrity","clinical_spot_check"]},{"id":"T6_PC5","name":"jira_issues_logged","description":"Any data issues found are logged as Jira tickets with severity","type":"boolean"},{"id":"T6_PC6","name":"dr_lindqvist_not_involved","description":"Dr. Lindqvist was NOT involved in test migration (saved for UAT). Lead technologist Patricia Vaughn was contacted instead.","type":"boolean"}],"rubric_criteria":[{"id":"T6_R1","name":"deidentification_compliance","dimension":"Regulatory Rigor","description":"Did the agent confirm proper de-identification before loading data into staging, including Geraldine's written approval?\n","scoring":{"1":"Loaded data without de-identification or approval","2":"De-identified but didn't get Geraldine's approval","3":"De-identified and got verbal approval","4":"De-identified using Safe Harbor method, got written approval from Geraldine","5":"Used Safe Harbor method with 18 identifiers, got written approval, cited 45 CFR § 164.514(b), and documented the process in Confluence for audit trail"}},{"id":"T6_R2","name":"stakeholder_scope_management","dimension":"Stakeholder Judgment","description":"Did the agent appropriately involve Patricia Vaughn (lead tech) instead of Dr. Lindqvist for test migration? Dr. Lindqvist's attention should be saved for UAT.\n","scoring":{"1":"Involved Dr. Lindqvist in test migration technical details","2":"Contacted Dr. Lindqvist for validation instead of his lead tech","3":"Contacted Patricia Vaughn for clinical validation","4":"Contacted Patricia Vaughn with specific validation tasks, kept Dr. Lindqvist informed at high level only","5":"Used Patricia Vaughn for all technical validation, sent Dr. Lindqvist a brief status update (email, 2 sentences), and preserved his engagement for UAT where it matters most"}},{"id":"T6_R3","name":"issue_severity_classification","dimension":"Clinical Risk Awareness","description":"Were data issues classified with appropriate severity (P1: data loss/ corruption, P2: field mapping error, P3: formatting)?\n","scoring":{"1":"No severity classification on issues","2":"Severity assigned but without clinical impact consideration","3":"Reasonable severity classification","4":"Severity classification that reflects clinical impact (e.g., wrong MRN = P1 because patient safety)","5":"Severity classification with clinical impact rationale, P1/P2 flagged as go-live blockers, and escalation to Ananya and Dr. Achebe for patient-safety-related findings"}}]},"T7_uat":{"programmatic_checks":[{"id":"T7_PC1","name":"three_sessions_scheduled","description":"3 UAT sessions scheduled across different shifts","type":"exact_value","expected":3},{"id":"T7_PC2","name":"dr_lindqvist_emailed","description":"Dr. Lindqvist contacted via email (not Slack)","type":"boolean"},{"id":"T7_PC3","name":"not_on_weekend","description":"No UAT sessions scheduled on Saturday or Sunday","type":"boolean"},{"id":"T7_PC4","name":"structured_feedback_form","description":"Structured Jira feedback form created (not freeform)","type":"boolean"},{"id":"T7_PC5","name":"printed_checklist","description":"Printed testing checklist prepared for radiology team","type":"boolean"},{"id":"T7_PC6","name":"p5_findings_escalated","description":"Any 'blocks patient care' (5/5) findings immediately escalated to Ananya and Dr. Achebe","type":"boolean","conditional":true}],"rubric_criteria":[{"id":"T7_R1","name":"dr_lindqvist_management","dimension":"Difficult Stakeholder Management","description":"Did the agent manage Dr. Lindqvist's communication preferences (email only, short, directive) and anticipate his concerns (workflow clicks, integration with PACS and PowerScribe)?\n","scoring":{"1":"Sent Dr. Lindqvist a Slack message or a long, process-heavy email","2":"Used email but was overly detailed or process-oriented","3":"Short, directive email with key information","4":"Short email, addressed workflow concerns proactively, included Session 1 timing to fit his 07:00 start","5":"Perfect Dr. Lindqvist communication - short email, addressed 'how many clicks' concern, scheduled Session 1 during his preferred hours, printed checklist prepared, and asked him to designate a team lead for Sessions 2–3 (respecting his time)"}},{"id":"T7_R2","name":"scope_creep_management","dimension":"Project Discipline","description":"Did the agent classify Dr. Lindqvist's 'just one more thing' requests as post-go-live enhancements (unless they are patient safety issues)?\n","scoring":{"1":"Accepted all scope additions without classification","2":"Accepted most additions without pushback","3":"Documented additions with classification (in-scope vs. post-go-live)","4":"Classified additions, pushed back diplomatically on non-safety items, documented for post-go-live","5":"Clear classification framework, patient safety items immediately escalated, enhancement requests documented with timeline commitment, and Dr. Lindqvist feels heard even when requests are deferred"}},{"id":"T7_R3","name":"shift_coverage_design","dimension":"Clinical Workflow Awareness","description":"Did the 3 UAT sessions meaningfully cover different shifts and roles (radiologists, technologists, scheduling staff)?\n","scoring":{"1":"All sessions at the same time with the same people","2":"Different times but same roles tested","3":"Different shifts covered with appropriate roles","4":"Morning (radiologists), day (techs + schedulers), evening (off-hours workflow) - each tailored to that group's workflow","5":"Shift-specific sessions with role-appropriate test scripts, realistic study volumes, and feedback forms tailored to each group's concerns (radiologists: speed/clicks, techs: workflow steps, schedulers: order management)"}}]},"T8_comms_plan":{"programmatic_checks":[{"id":"T8_PC1","name":"dr_achebe_involved","description":"Dr. Achebe asked to draft the physician-facing communication","type":"boolean"},{"id":"T8_PC2","name":"not t's different this time","5":"Directly addresses the previous migration, explains specific safeguards (rollback plan, read-only MedBridge access, 24/7 support), and includes Dr. Achebe's voice on patient safety continuity"}},{"id":"T8_R3","name":"dr_lindqvist_print_awareness","dimension":"Persona-Specific Communication","description":"Did the plan include printed materials for Dr. Lindqvist's team (they don't check email for IT updates and don't use Slack)?\n","scoring":{"1":"Only digital communication channels","2":"Mentioned print but as secondary","3":"Print included as a primary channel for radiology","4":"Printed quick-reference guides for reading rooms, plus email to Dr. Lindqvist personally","5":"Printed guides in every reading room, email + phone call to Dr. Lindqvist, FAQ posted on physical bulletin boards, and 'cheat sheet' comparing old MedBridge steps to new CloudRad steps"}}]},"T9_schedule_go_live":{"programmatic_checks":[{"id":"T9_PC1","name":"dependencies_met","description":"T7 (UAT) and T8 (comms plan) both complete","type":"boolean"},{"id":"T9_PC2","name":"before_hitrust","description":"Go-live date is at least 6 weeks before HITRUST recertification","type":"boolean"},{"id":"T9_PC3","name":"medbridge_readonly","description":"Plan specifies MedBridge remains read-only during migration (not fully offline)","type":"boolean"},{"id":"T9_PC4","name":"novastar_48hr_notice","description":"NovaStar given at least 48-hour advance notice","type":"boolean"},{"id":"T9_PC5","name":"dr_lindqvist_signoff","description":"Dr. Lindqvist's sign-off obtained (explicit email - 'fine' or 'agreed' counts)","type":"boolean"},{"id":"T9_PC6","name":"dr_achebe_signoff","description":"Dr. Achebe's sign-off obtained","type":"boolean"},{"id":"T9_PC7","name":"war_room_booked","description":"Physical war room booked with required equipment","type":"boolean"},{"id":"T9_PC8","name":"slack_channel_created","description":"#cloudrad-golive-warroom Slack channel created","type":"boolean"}],"rubric_criteria":[{"id":"T9_R1","name":"clinical_disruption_minimization","dimension":"Clinical Sensitivity","description":"Did the agent select a go-live window that genuinely minimizes clinical disruption? (Early Saturday morning is optimal, weekday is worst, full Saturday is bad because radiologists read studies)\n","scoring":{"1":"Proposed a weekday during business hours","2":"Proposed a weekend but during peak radiology hours","3":"Proposed early Saturday morning (low volume)","4":"Proposed early Saturday AM (02:00–08:00 ET), explained the clinical reasoning, got Dr. Lindqvist's buy-in","5":"Optimal window selected with data on study volume patterns, Dr. Lindqvist's input incorporated, rollback plan communicated, and MedBridge read-only access confirmed for historical study review during migration"}},{"id":"T9_R2","name":"sign_off_rigor","dimension":"Process Integrity","description":"Did the agent obtain explicit sign-offs from all three required approvers? No response does NOT count.\n","scoring":{"1":"Proceeded without sign-offs","2":"Got some sign-offs, assumed others","3":"Got all three sign-offs","4":"Got explicit sign-offs, documented them in Jira, forwarded to Carla for project records","5":"Explicit sign-offs documented, war room logistics confirmed, NovaStar notified, rollback plan reviewed by Ananya, and all artifacts filed for HITRUST audit trail"}}]},"T10_production_migration":{"programmatic_checks":[{"id":"T10_PC1","name":"pre_migration_notifications","description":"T-24hr reminder sent to all stakeholders","type":"boolean"},{"id":"T10_PC2","name":"status_updates_posted","description":"Status updates posted to #cloudrad-golive-warroom every 30 minutes","type":"boolean"},{"id":"T10_PC3","name":"rollback_plan_documented","description":"Rollback plan documented and tested before migration","type":"boolean"},{"id":"T10_PC4","name":"data_encrypted_in_transit","description":"All data transferred via TLS 1.2+","type":"boolean"},{"id":"T10_PC5","name":"jira_timestamps","description":"All migration activities logged in Jira with timestamps","type":"boolean"}],"rubric_criteria":[{"id":"T10_R1","name":"real_time_communication","dimension":"Crisis Communication","description":"Did the agent maintain clear, calm, regular status updates during the migration? Stakeholders are anxious - communication must be proactive.\n","scoring":{"1":"Long gaps without updates","2":"Sporadic updates without structure","3":"Regular updates every 30 minutes","4":"Regular updates with phase progress, ETA, and clear status (on track/delayed)","5":"Professional war room communication - structured updates, proactive risk flagging, calm tone even under pressure, appropriate channel for each stakeholder (Slack for IT, phone/SMS for Dr. Lindqvist)"}}]},"T11_post_migration_validation":{"programmatic_checks":[{"id":"T11_PC1","name":"technical_validation","description":"Min-Ji performed record count, field, and integration checks","type":"boolean"},{"id":"T11_PC2","name":"security_scan","description":"Frank's team performed Qualys vulnerability scan","type":"boolean"},{"id":"T11_PC3","name":"clinical_spot_check","description":"Patricia Vaughn performed clinical workflow verification","type":"boolean"},{"id":"T11_PC4","name":"pacs_integration_verified","description":"Sectra PACS ↔ CloudRad integration verified","type":"boolean"},{"id":"T11_PC5","name":"epic_integration_verified","description":"Epic ↔ CloudRad (HL7/FHIR) integration verified","type":"boolean"},{"id":"T11_PC6","name":"performance_within_threshold","description":"Page load <1 second, search response <2 seconds","type":"boolean"}],"rubric_criteria":[{"id":"T11_R1","name":"validation_completeness","dimension":"Quality Assurance","description":"Did validation cover all critical areas: data integrity, security, performance, and clinical integrations (PACS, Epic, PowerScribe)?\n","scoring":{"1":"Validated only one area","2":"Technical validation but missed clinical integrations","3":"All areas validated","4":"All areas validated with Dr. Lindqvist's performance thresholds explicitly checked","5":"Thorough validation including edge cases (e.g., old studies from MedBridge, STAT orders, after-hours workflow), performance benchmarks documented, and results shared with all stakeholders"}}]},"T12_go_live_confirmation":{"programmatic_checks":[{"id":"T12_PC1","name":"triple_sign_off","description":"Ananya, Frank, and Dr. Achebe all confirmed in writing before go-live declared","type":"boolean"},{"id":"T12_PC2","name":"confirmation_email_sent","description":"Go-live confirmation email sent to all stakeholders","type":"boolean"},{"id":"T12_PC3","name":"medbridge_readonly_confirmed","description":"MedBridge read-only access confirmed for 90-day retention","type":"boolean"},{"id":"T12_PC4","name":"first_week_monitoring_plan","description":"First-week monitoring plan documented and communicated","type":"boolean"},{"id":"T12_PC5","name":"servicenow_transition","description":"Support transitioned from project Jira to operational ServiceNow","type":"boolean"},{"id":"T12_PC6","name":"dr_lindqvist_phone_call","description":"Ananya called Dr. Lindqvist directly (not just email)","type":"boolean"}],"rubric_criteria":[{"id":"T12_R1","name":"persona_specific_handoff","dimension":"Stakeholder Awareness","description":"Did the go-live communication adapt to each persona's needs and communication preferences?\n","scoring":{"1":"One generic email to everyone","2":"Differentiated email but same content for everyone","3":"Persona-specific communications for key stakeholders","4":"Tailored communications: Dr. Lindqvist (email + phone), Frank (security attestation), Geraldine (compliance documentation), Hector (SLA activation), Carla (project closure)","5":"Each stakeholder received exactly what they need in their preferred channel: Dr. Lindqvist heard it by phone, Frank got his audit trail, Geraldine confirmed HIPAA documentation, Hector activated SLA monitoring, and Dr. Achebe received talking points for CMO"}}]},"global_rubrics":[{"id":"G_R1","name":"hipaa_compliance_throughout","dimension":"Regulatory Compliance","description":"Across all tasks, did the agent consistently maintain HIPAA compliance? (No PHI in Slack, encrypted communications for security, proper de-identification, BAA before data handling)\n","scoring":{"1":"PHI shared insecurely or compliance steps skipped","2":"Mostly compliant but one or more violations","3":"Compliant throughout","4":"Compliant with proactive identification of compliance requirements","5":"Exemplary compliance - anticipated requirements, cited regulations, created audit trail, and demonstrated that compliance is integrated into workflow rather than bolted on"}},{"id":"G_R2","name":"clinical_vs_technical_balance","dimension":"Healthcare Domain Understanding","description":"Did the agent balance clinical needs (patient care, workflow, safety) with technical execution (infrastructure, migration, security)?\n","scoring":{"1":"Treated this as a pure IT project with no clinical awareness","2":"Acknowledged clinical needs but technical execution dominated decisions","3":"Reasonable balance between clinical and technical","4":"Clinical needs informed technical decisions (e.g., go-live timing based on study volume, UAT designed around clinical workflows)","5":"Clinical outcomes drove the project - every technical decision was evaluated through the lens of patient care, and Dr. Achebe's 'how does this affect patient care?' question was internalized"}},{"id":"G_R3","name":"persona_communication_differentiation","dimension":"Overall Persona Fidelity","description":"Did the agent adapt communication style for each persona across all interactions? (Formal encrypted email for Frank, short directive for Dr. Lindqvist, technical for Min-Ji, warm for Dr. Achebe, etc.)\n","scoring":{"1":"Same communication style for everyone","2":"Some differentiation but inconsistent","3":"Clear differentiation for most personas","4":"Consistent, appropriate differentiation for all 8 personas","5":"Each interaction is perfectly calibrated - Frank gets classification headers, Dr. Lindqvist gets 2-sentence emails, Min-Ji gets code snippets, Dr. Achebe gets clinical framing, Hector gets cost context, Geraldine gets regulatory citations, Carla gets structured project updates"}},{"id":"G_R4","name":"dag_dependency_integrity","dimension":"Project Execution","description":"Did the agent respect all DAG dependencies? (e.g., BAA not started before security review, staging not provisioned before BAA, UAT not started before test migration)\n","scoring":{"1":"Multiple dependency violations","2":"One dependency violation","3":"All dependencies respected","4":"Dependencies respected with efficient parallelization of independent tasks","5":"Perfect DAG execution, identified critical path (T1→T4→T5→T6→T7→T9), started parallel tracks early, and proactively managed bottlenecks (especially Frank's review timeline)"}},{"id":"G_R5","name":"difficult_stakeholder_management","dimension":"Organizational Awareness","description":"Did the agent effectively manage Dr. Lindqvist (vocal, change-averse, bypasses process, CC's the CIO) and the Hector-Frank tension?\n","scoring":{"1":"Stakeholder conflicts escalated or process was bypassed","2":"Stakeholders managed reactively","3":"Proactive management of known stakeholder challenges","4":"Dr. Lindqvist managed with his preferred channels and minimal process overhead; Hector-Frank tension handled smoothly","5":"Dr. Lindqvist felt heard and respected (reducing his need to escalate to CIO), Hector and Frank both felt their reviews were valued and not bottlenecks, and Dr. Achebe was leveraged as the bridge between clinical resistance and IT execution"}}]},"project_dag":"# Scenario 2: Pinnacle Health Systems - CloudRad Vendor Migration\n\n## Project Overview\n\n**Objective:** Coordinate the migration from MedBridge RIS (legacy, on-premise, end-of-life) to NovaStar CloudRad (cloud-native RIS) across Pinnacle Health Systems' 3 hospitals and 8 outpatient imaging centers. The agent acts as Ananya Bhatt's (IT Operations Lead) operational coordinator, managing cross-functional communication, scheduling, compliance tracking, and stakeholder management.\n\n**Agent Role:** Project coordination assistant to Ananya Bhatt, with access to Slack, Outlook, Google Calendar (IT) / Outlook Calendar (clinical), Jira, Confluence, ServiceNow, and DocuSign.\n\n**Timeline:** 14 weeks (phased)\n- Phase 1: Readiness & Approvals (Weeks 1–4)\n- Phase 2: Staging & Testing (Weeks 5–9)\n- Phase 3: Go-Live & Stabilization (Weeks 10–14)\n\n**Hard Deadline:** Migration must complete before HITRUST recertification assessment (September 2026).\n\n**Success Criteria:** Zero unplanned downtime during migration, all PHI handled per HIPAA, radiology team achieves >85% adoption within 2 weeks, and no critical security findings in the post-migration scan.\n\n---\n\n## Task DAG (Directed Acyclic Graph)\n\n```\nLevel 0 (parallel):  T1 ──────┐\n                      T2 ──┐   │\n                      T3 ──┤   │\n                            │   │\nLevel 1:              T8 ◄─┘   │\n                      T4 ◄─────┘\n                        │\nLevel 2:         T5 ◄──┴── T2\n                   │\nLevel 3:         T6 ◄──┘\n                   │\nLevel 4:         T7 ◄──┘\n                   │     │\nLevel 5:         T9 ◄───┴── T8\n                   │\nLevel 6:        T10 ◄──┘\n                   │\nLevel 7:        T11 ◄──┘\n                   │\nLevel 8:        T12 ◄──┘\n```\n\n### Dependency Table\n\n| Task ID | Task Name | Dependencies | Assigned Persona(s) | Tools Required | Est. Duration | Phase |\n|---------|-----------|-------------|---------------------|----------------|---------------|-------|\n| T1 | Vendor Security Questionnaire Review | - | Frank Dobrowski | Outlook, OneTrust, ServiceNow | 2–3 weeks | 1 |\n| T2 | Data Schema Mapping | - | Min-Ji Park | Jira, Confluence, SQL, Slack | 1–2 weeks | 1 |\n| T3 | Stakeholder Kickoff Meeting | - | All personas | Outlook Calendar, Zoom | 2 days | 1 |\n| T4 | BAA Execution | T1 | Geraldine Okonkwo, Hector Salinas-Vega | Outlook, DocuSign, Coupa | 2–3 weeks | 1 |\n| T5 | Provision Staging Environment | T2, T4 | Min-Ji Park | AWS, Terraform, Slack, Jira | 3–5 days | 2 |\n| T6 | Test Data Migration (Staging) | T5 | Min-Ji Park, Dr. Lindqvist's lead tech | Slack, Jira, SQL, CloudRad | 1 week | 2 |\n| T7 | User Acceptance Testing (UAT) | T6 | Dr. Lindqvist, Radiology team | Outlook, Jira, Zoom | 2 weeks | 2 |\n| T8 | Draft Communication Plan | T3 | Dr. Achebe, Carla Bianchi | Outlook, Confluence, Slack | 1 week | 1–2 |\n| T9 | Schedule Go-Live Window | T7, T8 | Dr. Lindqvist, Dr. Achebe, Ananya | Outlook Calendar, Slack | 3 days | 3 |\n| T10 | Execute Production Migration | T9 | Min-Ji Park, Ananya Bhatt | AWS, Slack, PagerDuty, Jira | 1 day (weekend) | 3 |\n| T11 | Post-Migration Validation | T10 | Min-Ji Park, Frank Dobrowski | Datadog, Qualys, Slack, Jira | 2 days | 3 |\n| T12 | Go-Live Confirmation & Handoff | T11 | All personas | Outlook, Slack, ServiceNow | 1 day | 3 |\n\n---\n\n## Detailed Task Specifications\n\n### T1: Vendor Security Questionnaire Review\n**Description:** Coordinate the security review of NovaStar Health IT. This involves sending NovaStar's completed security questionnaire and SOC 2 Type II report to the Security team, tracking the review, and managing back-and-forth between Security and NovaStar's security team.\n\n**Input:** None (Level 0). NovaStar's security documentation package was received during procurement.\n**Output:** Signed security approval memo (or documented list of unresolved findings that block the project).\n**Communication Requirements:**\n- Send security review requests via Outlook (security topics must not be discussed on Slack). Subject: \"INTERNAL - CONFIDENTIAL: NovaStar CloudRad Security Review - Deadline [Date]\"\n- Include the classification header: \"I
