          duration: "8 years"
          note: "Two deployments. Led a 12-person cybersecurity team at Fort Gordon."
        - role: Senior Security Analyst
          company: Bank of America (Charlotte, NC)
          duration: "5 years"
          note: "Led the insider threat detection program."
        - role: CISO
          company: MedFirst Health Plan (regional health plan, 200K members)
          duration: "4 years"
          note: "Built the security program from the ground up. Zero breaches during tenure."
        - role: CISO
          company: Pinnacle Health Systems
          duration: "3 years (current)"
          note: "Recruited after a phishing incident exposed 12,000 patient records. Overhauled the security program."
    communication_style:
      email:
        tone: formal, deliberate, classification-marked
        formatting: "Every email has 'INTERNAL - CONFIDENTIAL' or 'INTERNAL - RESTRICTED' header. Structured with clear sections. Uses regulatory citations."
