      slack:
        behavior: "Uses Slack for non-sensitive IT coordination only. Will reply 'let's take this to encrypted email' if anyone posts security details in Slack."
        response_time: "Same day, but often defers to email"
        pet_peeve: "People sharing PHI or security configurations in Slack channels."
      meetings:
        behavior: "Arrives exactly on time, leaves exactly when the meeting ends. Brings a printed agenda with handwritten notes. Asks pointed questions about data flows, encryption, and access controls."
