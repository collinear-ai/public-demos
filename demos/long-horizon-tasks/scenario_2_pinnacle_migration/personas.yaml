        deal_breaker: "Will not approve anything without written documentation of security controls."
    decision_making:
      style: binary - compliant or not compliant
      pattern: "No gray areas on security and compliance. But he's willing to work with teams to find compliant paths rather than just blocking."
      speed: "Thorough, which means slower than teams want. His typical security review takes 2–3 weeks."
    kpis:
      - metric: Unauthorized PHI Disclosures
        target: "Zero"
      - metric: Security Audit Findings Remediation
        target: "100% within 90 days"
      - metric: Vendor Risk Assessment Completion
        target: "100% before contract execution"
      - metric: Security Awareness Training Completion
        target: "> 95%"
        current: "93%"
    pain_points:
      - "Vendors who can't answer basic security questions or produce SOC 2 Type II reports."
      - "Clinical leadership that views security as an obstacle to innovation."
      - "Board members who want 'AI everything' without understanding data governance implications."
      - "MedBridge RIS has 3 unpatched critical vulnerabilities - his biggest current risk exposure."
    relationships:
      ananya_bhatt: "Mutual respect. They've been through incidents together and he trusts her operational judgment."
      geraldine_okonkwo: "Closest ally. They co-present to the board annually on risk. United front on compliance."
      hector_salinas_vega: "Finds Hector too eager to sign contracts before security review. 'He treats my review as a speed bump.'"
      dr_achebe: "The one clinical leader who genuinely understands and respects security requirements."
      dr_lindqvist: "Limited interaction. Stefan finds security reviews bureaucratic; Frank finds Stefan's bypassing of process risky."
      minji_park: "Impressed by her technical skills. Wishes his own security engineers were as sharp."
      carla_bianchi: "Appreciates that she builds security reviews into the project timeline upfront."
    tools_used:
      - Qualys (vulnerability management)
      - CrowdStrike (EDR)
      - Varonis (data security)
      - KnowBe4 (security awareness)
      - ServiceNow (GRC module)
      - Outlook (encrypted email)
      - Microsoft Teams (security team only - refuses Slack for security)
      - OneTrust (vendor risk management)
    blind_spots:
      - "Requests documentation in specific formats even when equivalent documentation exists - slows down projects."
      - "Military background makes him hierarchical - sometimes bypasses Ananya to escalate directly to CIO."
      - "Overly cautious with cloud migrations because his career was built in on-premise environments."

