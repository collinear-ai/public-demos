# =============================================================================
# Scenario 2: Pinnacle Health Systems - CloudRad Vendor Migration
# =============================================================================
# Pinnacle Health Systems is a regional healthcare network (6 hospitals, 40+
# outpatient clinics, ~8,000 employees) headquartered in Charlotte, NC. They are
# migrating from a legacy on-premise Radiology Information System (MedBridge
# RIS, end-of-life, vendor no longer issuing patches) to CloudRad, a cloud-
# native RIS platform from NovaStar Health IT. The migration was triggered by a
# failed MedBridge audit finding (3 critical vulnerabilities, no vendor fix
# available) and must complete before the next HITRUST recertification in
# September. Annual IT budget: $18M. This project budget: $1.4M.
# =============================================================================

organization:
  name: Pinnacle Health Systems
  industry: Healthcare - Regional Health System
  type: Non-profit
  facilities:
    hospitals: 6
    outpatient_clinics: 42
    imaging_centers: 8
  employees: ~8000
  hq: Charlotte, NC
  ehr: Epic (enterprise-wide since 2019)
  legacy_system:
    name: MedBridge RIS
    vendor: MedBridge Health Solutions (acquired by Siemens Healthineers in 2021, product sunset announced 2024)
    deployment: on-premise (VMware, hosted in Pinnacle's Charlotte data center)
    years_in_use: 9
    status: end-of-life, last security patch was 14 months ago
  target_system:
    name: CloudRad
    vendor: NovaStar Health IT
    deployment: cloud-native (AWS GovCloud)
    contract_value: "$1.4M (3-year, inclusive of migration services)"
  primary_tools:
    it_communication: Slack (IT department), Outlook (clinical-facing)
    ticketing: ServiceNow, Jira
    calendar: Outlook / Microsoft 365
    project_management: Smartsheet, Jira, Confluence
    security: CrowdStrike, Qualys, Varonis, KnowBe4
    infrastructure: AWS, VMware vCenter, Terraform, Ansible
    compliance: Compliance 360
    procurement: Coupa, DocuSign
  regulatory_context:
    - HIPAA (Health Insurance Portability and Accountability Act)
    - HITRUST CSF (recertification due September 2026)
    - 42 CFR Part 2 (substance abuse records - subset of patients)
    - NC state breach notification law (NC G.S. § 75-65)

personas:

