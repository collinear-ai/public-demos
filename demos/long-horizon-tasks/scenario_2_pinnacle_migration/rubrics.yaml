      type: boolean

  rubric_criteria:
    - id: T11_R1
      name: validation_completeness
      dimension: Quality Assurance
      description: >
        Did validation cover all critical areas: data integrity, security,
        performance, and clinical integrations (PACS, Epic, PowerScribe)?
      scoring:
        1: "Validated only one area"
        2: "Technical validation but missed clinical integrations"
        3: "All areas validated"
        4: "All areas validated with Dr. Lindqvist's performance thresholds explicitly checked"
        5: "Thorough validation including edge cases (e.g., old studies from MedBridge, STAT orders, after-hours workflow), performance benchmarks documented, and results shared with all stakeholders"

T12_go_live_confirmation:
  programmatic_checks:
