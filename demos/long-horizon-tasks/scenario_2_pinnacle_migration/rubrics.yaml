      type: boolean

    - id: T10_PC5
      name: jira_timestamps
      description: "All migration activities logged in Jira with timestamps"
      type: boolean

  rubric_criteria:
    - id: T10_R1
      name: real_time_communication
      dimension: Crisis Communication
      description: >
        Did the agent maintain clear, calm, regular status updates during the
        migration? Stakeholders are anxious - communication must be proactive.
      scoring:
        1: "Long gaps without updates"
        2: "Sporadic updates without structure"
        3: "Regular updates every 30 minutes"
        4: "Regular updates with phase progress, ETA, and clear status (on track/delayed)"
        5: "Professional war room communication - structured updates, proactive risk flagging, calm tone even under pressure, appropriate channel for each stakeholder (Slack for IT, phone/SMS for Dr. Lindqvist)"

T11_post_migration_validation:
  programmatic_checks:
