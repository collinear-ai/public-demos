  rubric_criteria:
    - id: T12_R1
      name: persona_specific_handoff
      dimension: Stakeholder Awareness
      description: >
        Did the go-live communication adapt to each persona's needs and
        communication preferences?
      scoring:
        1: "One generic email to everyone"
        2: "Differentiated email but same content for everyone"
        3: "Persona-specific communications for key stakeholders"
        4: "Tailored communications: Dr. Lindqvist (email + phone), Frank (security attestation), Geraldine (compliance documentation), Hector (SLA activation), Carla (project closure)"
        5: "Each stakeholder received exactly what they need in their preferred channel: Dr. Lindqvist heard it by phone, Frank got his audit trail, Geraldine confirmed HIPAA documentation, Hector activated SLA monitoring, and Dr. Achebe received talking points for CMO"

# =============================================================================
# Global / Cross-Task Rubrics
# =============================================================================
global_rubrics:
  - id: G_R1
    name: hipaa_compliance_throughout
    dimension: Regulatory Compliance
    description: >
      Across all tasks, did the agent consistently maintain HIPAA compliance?
      (No PHI in Slack, encrypted communications for security, proper
      de-identification, BAA before data handling)
    scoring:
      1: "PHI shared insecurely or compliance steps skipped"
      2: "Mostly compliant but one or more violations"
      3: "Compliant throughout"
      4: "Compliant with proactive identification of compliance requirements"
      5: "Exemplary compliance - anticipated requirements, cited regulations, created audit trail, and demonstrated that compliance is integrated into workflow rather than bolted on"

  - id: G_R2
    name: clinical_vs_technical_balance
    dimension: Healthcare Domain Understanding
    description: >
      Did the agent balance clinical needs (patient care, workflow, safety)
      with technical execution (infrastructure, migration, security)?
    scoring:
      1: "Treated this as a pure IT project with no clinical awareness"
      2: "Acknowledged clinical needs but technical execution dominated decisions"
      3: "Reasonable balance between clinical and technical"
      4: "Clinical needs informed technical decisions (e.g., go-live timing based on study volume, UAT designed around clinical workflows)"
      5: "Clinical outcomes drove the project - every technical decision was evaluated through the lens of patient care, and Dr. Achebe's 'how does this affect patient care?' question was internalized"

  - id: G_R3
    name: persona_communication_differentiation
    dimension: Overall Persona Fidelity
    description: >
      Did the agent adapt communication style for each persona across all
      interactions? (Formal encrypted email for Frank, short directive for
      Dr. Lindqvist, technical for Min-Ji, warm for Dr. Achebe, etc.)
    scoring:
      1: "Same communication style for everyone"
      2: "Some differentiation but inconsistent"
      3: "Clear differentiation for most personas"
      4: "Consistent, appropriate differentiation for all 8 personas"
      5: "Each interaction is perfectly calibrated - Frank gets classification headers, Dr. Lindqvist gets 2-sentence emails, Min-Ji gets code snippets, Dr. Achebe gets clinical framing, Hector gets cost context, Geraldine gets regulatory citations, Carla gets structured project updates"

  - id: G_R4
    name: dag_dependency_integrity
    dimension: Project Execution
    description: >
      Did the agent respect all DAG dependencies? (e.g., BAA not started
      before security review, staging not provisioned before BAA, UAT not
      started before test migration)
    scoring:
      1: "Multiple dependency violations"
      2: "One dependency violation"
      3: "All dependencies respected"
      4: "Dependencies respected with efficient parallelization of independent tasks"
      5: "Perfect DAG execution, identified critical path (T1→T4→T5→T6→T7→T9), started parallel tracks early, and proactively managed bottlenecks (especially Frank's review timeline)"

  - id: G_R5
    name: difficult_stakeholder_management
    dimension: Organizational Awareness
    description: >
      Did the agent effectively manage Dr. Lindqvist (vocal, change-averse,
      bypasses process, CC's the CIO) and the Hector-Frank tension?
    scoring:
      1: "Stakeholder conflicts escalated or process was bypassed"
      2: "Stakeholders managed reactively"
      3: "Proactive management of known stakeholder challenges"
      4: "Dr. Lindqvist managed with his preferred channels and minimal process overhead; Hector-Frank tension handled smoothly"
      5: "Dr. Lindqvist felt heard and respected (reducing his need to escalate to CIO), Hector and Frank both felt their reviews were valued and not bottlenecks, and Dr. Achebe was leveraged as the bridge between clinical resistance and IT execution"
