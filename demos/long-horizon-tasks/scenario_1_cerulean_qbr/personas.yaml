      after_hours: "does not check Slack unless directly tagged by CEO or CRO"
    background:
      education:
        - degree: BS Accounting
          institution: University of Texas at Austin
        - certification: CPA (Texas, inactive since 2019)
      career:
        - role: Audit Associate → Senior Associate
          company: Deloitte (Austin office)
          duration: "4 years"
        - role: FP&A Analyst → Senior Manager, FP&A
          company: Dell Technologies
          duration: "6 years"
          note: "Led the financial model for Dell's SMB SaaS pivot."
        - role: CFO
          company: BrightLoop (MarTech startup, acquired by Braze for $40M)
          duration: "3 years"
          note: "Ran a lean finance team of 4. Managed the acquisition process."
        - role: CFO
          company: Cerulean Analytics
          duration: "18 months (current)"
          note: "Brought in post-Series C to 'professionalize the finance function.'"
    communication_style:
      email:
        tone: formal, precise
        formatting: "Proper salutation ('Good morning, Rachel'), structured paragraphs, sign-off ('Best, Marcus'). Attaches Excel files rather than linking Google Sheets."
        quirk: "Corrects rounded numbers: 'If it's $4.7M, don't say about $5M.'"
      slack:
        behavior: "More relaxed than email but still structured. Posts in #finance and #leadership only."
        response_time: "1–2 hours"
        pet_peeve: "When people share financial data in Slack channels instead of secure documents."
      meetings:
        behavior: "Mutes when not speaking, camera off for internal meetings, always on for board/external."
        note_taking: "Legal pad with handwritten notes that he photographs and uploads to a private Drive folder."
        verbal_tic: "'What happens if we do nothing?' - his default challenge to any spend request."
    decision_making:
      style: conservative, data-exhaustive
      pattern: "Needs to understand downside scenarios before approving spend. Will request a sensitivity analysis for any commitment above $25K."
      speed: "Slow. Deliberate. Wants 'one more quarter of data' even when ROI is clear."
    kpis:
      - metric: Burn Multiple
        target: "< 1.5x"
      - metric: CAC Payback Period
        target: "< 18 months"
      - metric: Gross Margin
        target: "> 78%"
      - metric: Runway (months)
        target: "> 24 months"
      - metric: Rule of 40 Score
        target: "> 35"
    pain_points:
      - "Sales team makes discount commitments without finance approval - discovered a 35% discount on a $180K deal after it closed."
      - "Engineering headcount growing 40% YoY while revenue is growing 32% - the ratios concern the board."
      - "Board wants monthly financial reporting but Cerulean's NetSuite instance is barely configured."
    relationships:
      rachel_whitford: "Cordial but strained. Blocked her $300K deal discount last quarter and she hasn't fully forgiven him."
      kenji_watanabe: "Respects Kenji's rigor - 'he speaks my language.' They meet biweekly to review pipeline data quality."
      lena_strom: "Good working relationship on financial modeling. She's the only revenue leader he fully trusts with numbers."
      tomas_rezende: "Concerned about engineering spend but respects Tomás's technical judgment."
      priya_narayanan: "Limited interaction. Wants CS to prove expansion revenue attribution more rigorously."
    tools_used:
      - NetSuite
      - Google Sheets (reluctantly)
      - Microsoft Excel (preferred)
      - Slack
      - Gmail
      - Mosaic (FP&A platform)
      - Carta (cap table)
    blind_spots:
      - "Overly focused on unit economics at the expense of growth investments that have longer payback."
      - "His Dell/Deloitte background makes him default to enterprise-scale processes that slow down a 280-person startup."
      - "Doesn't attend product demos - he has blind spots on what Cerulean actually does vs. what the P&L says."

