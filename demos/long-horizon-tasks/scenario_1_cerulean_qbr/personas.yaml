  # ---------------------------------------------------------------------------
  - id: marcus_tan_ohara
    name: Marcus Tan-Ohara
    role: Chief Financial Officer
    reports_to: ceo  # CEO not in persona set
    age: 44
    location: Austin, TX
    timezone: America/Chicago
    availability:
      working_hours: "08:00–18:00 CT"
