# =============================================================================
# Scenario 1: Cerulean Analytics - Q1 Quarterly Business Review
# =============================================================================
# Cerulean Analytics is a Series C SaaS company ($45M ARR, 280 employees, HQ
# Austin TX) selling a data-observability platform to mid-market and enterprise
# customers. The company recently closed a $60M Series C and is under board
# pressure to reach $70M ARR by year-end while keeping burn multiple below 1.5x.
# Competitor "Acme Observability" just raised $80M and is undercutting on price.
# =============================================================================

organization:
  name: Cerulean Analytics
  industry: B2B SaaS - Data Observability
  stage: Series C
  arr: "$45M"
  headcount: 280
  hq: Austin, TX
  fiscal_year_end: January 31
  primary_tools:
    crm: Salesforce
    communication: Slack, Gmail, Google Meet
    calendar: Google Calendar
    docs: Google Workspace, Notion
    revenue_intelligence: Gong, Clari
    engineering: GitHub, Linear, Datadog, PagerDuty
    design: Figma
    competitive_intel: Crayon
  key_competitor: Acme Observability

personas:

  # ---------------------------------------------------------------------------
  # 1. Rachel Whitford - VP of Sales
  # ---------------------------------------------------------------------------
  - id: rachel_whitford
    name: Rachel Whitford
    role: VP of Sales
    reports_to: lena_strom
    age: 38
    location: Austin, TX
    timezone: America/Chicago  # CT (UTC-6)
    availability:
      working_hours: "07:30–18:30 CT"
      slack_responsiveness: "within 15 minutes during working hours"
      after_hours: "checks Slack until 21:00 CT, does not respond to email"
    background:
      education:
        - degree: BA Economics
          institution: University of Virginia
        - degree: MBA
          institution: Rice University
      career:
        - role: Territory Sales Rep
          company: Merck
          duration: "2 years"
          note: "Pharma sales taught her to sell without a demo - pure narrative."
        - role: Commercial Account Executive → Senior AE
          company: Tableau
          duration: "5 years"
          note: "Presidents Club 3x. Left after Salesforce acquisition."
        - role: Regional Sales Director, Central US
          company: Looker
          duration: "3 years"
          note: "Built the Central region from $8M to $22M ARR."
        - role: VP of Sales
          company: Cerulean Analytics
          duration: "2 years (current)"
          note: "Inherited a team of 14 AEs, grew to 22. Missed Q4 target by 6%."
    communication_style:
      email:
        tone: direct, data-driven
        formatting: bullet points, bolded key numbers, rarely exceeds 150 words
        signature: "Rachel Whitford | VP Sales, Cerulean Analytics | (512) 555-0173"
        quirk: "Opens every Monday morning with a 'Week Ahead' email to her team - three bullets, no fluff."
      slack:
        behavior: "Prefers DMs for sensitive topics, channels for team-wide updates. Sends voice memos when driving between meetings."
        response_time: "< 15 min during business hours"
        pet_peeve: "People who write 'hi Rachel' and wait for a response before stating their question."
      meetings:
        behavior: "Camera always on. Takes notes in a private Notion doc. Ends meetings 5 minutes early."
        verbal_tic: "'What's the ask?' when discussions meander."
        presentation_style: "Leads with the punchline, then backs into the data."
    decision_making:
      style: data-first
      pattern: "Wants to see the numbers, then the narrative that explains them. Skeptical of qualitative arguments without quantitative backing."
      speed: "Fast for deals under $100K, deliberate for enterprise pursuits above $200K."
      escalation_trigger: "Will escalate to Lena when a deal requires pricing exceptions above 20% discount."
    kpis:
      - metric: Net New ARR
        target: "$4.2M/quarter"
      - metric: Pipeline Coverage Ratio
        target: "3.5x"
      - metric: Win Rate (Qualified Opps)
        target: "28%"
      - metric: Average Sales Cycle
        target: "< 68 days"
      - metric: Average Deal Size
        target: "$95K"
    pain_points:
      - "Product ships features that don't align with what prospects are asking for in competitive deals against Acme."
      - "CS team doesn't flag expansion opportunities early enough - revenue is left on the table."
      - "Q4 miss was partly due to two enterprise deals slipping because legal review took 4 weeks."
    relationships:
      lena_strom: "Direct manager. High trust but Lena pushes hard - Rachel feels she needs to over-prepare for every 1:1."
      priya_narayanan: "Close ally. They present a united revenue-team front in leadership meetings."
      tomas_rezende: "Tension over feature prioritization. Rachel views Tomás as brilliant but disconnected from commercial reality."
      marcus_tan_ohara: "Cordial but strained - Marcus blocked a pricing discount Rachel needed for a $300K deal last quarter."
      kenji_watanabe: "Depends on him heavily for data. Sometimes forgets to include him in strategic discussions."
      siobhan_omalley: "Her top performer. Advocates for Siobhán's resource requests internally."
      diego_fuentes_rios: "Appreciates his competitive intel but wishes he'd simplify the battle cards."
    tools_used:
      - Salesforce
      - Gong
      - Slack
      - Google Calendar
      - Google Slides
      - Notion
      - Clari
      - Zoom
    blind_spots:
      - "Over-indexes on enterprise deals and underweights SMB segment performance."
      - "Dismisses CS health-score data as 'anecdotal' when it contradicts her pipeline narrative."
      - "Her Q4 post-mortem blamed product gaps, but 2 of 4 lost deals cited pricing - not product."

