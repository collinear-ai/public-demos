eekly health monitoring through the renewal close (April 30).\n\nFor DataBridge: I'll schedule a re-engagement call this week. I think the issue is they deployed in a limited capacity and haven't expanded to their other teams. A success planning session might help.\n\nRachel","attachments":[]}]},{"id":"thread_16","subject":"Recruiting Agency Candidates — Platform Engineer","starred":false,"messages":[{"id":"email_0043","from":"kevin_wu","to":["priya_sharma","amir_patel"],"cc":["james_liu"],"timestamp":"2026-03-27T14:00:00Z","body":"Priya, Amir,\n\nWith Alex Torres starting April 6, we have an additional Platform Engineer req open (the second one Priya requested). The recruiting agency sent over 3 candidates. Resumes attached.\n\n**Candidate A — Jordan Mitchell (Cloudflare)**\n- 4 years experience, currently at Cloudflare working on their edge computing platform\n- Strong Go and distributed systems background\n- Built a custom rate limiting service handling 1B+ daily requests\n- Weakness: No Kubernetes experience (Cloudflare uses their own orchestration)\n\n**Candidate B — Priya Kapoor (HashiCorp)**\n- 3 years experience, currently at HashiCorp working on Terraform Cloud\n- Deep Kubernetes and infrastructure-as-code expertise\n- Led the migration of Terraform Cloud's API layer to gRPC\n- Weakness: Less experience with high-throughput data systems\n\n**Candidate C — Tyler Washington (startup)**\n- 2 years experience, currently at a seed-stage startup\n- Full-stack with some infrastructure work\n- Weakness: Too junior for what we need at L3. Better fit for L1-L2.\n\nLet me know who you'd like to phone screen.\n\nKevin","attachments":["Resume_Jordan_Mitchell.pdf","Resume_Priya_Kapoor.pdf","Resume_Tyler_Washington.pdf"]},{"id":"email_0044","from":"priya_sharma","to":["kevin_wu","amir_patel"],"cc":["james_liu"],"timestamp":"2026-03-28T10:00:00Z","body":"Kevin,\n\nThanks for sharing. Here's my take:\n\n**Candidate A (Jordan, Cloudflare)**: Strong yes for phone screen. The rate limiting experience at Cloudflare scale is incredibly relevant — this is literally what we're building. The lack of K8s experience is a gap but learnable, especially with Amir and Wei on the team.\n\n**Candidate B (Priya K., HashiCorp)**: Yes for phone screen. The Terraform Cloud and gRPC experience is valuable. Kubernetes expertise would be great for our infrastructure layer. The data systems gap is less concerning since that's not the primary focus of this role.\n\n**Candidate C (Tyler, startup)**: Pass. Agree with your assessment — too junior for L3. If we open an L1-L2 role later, worth revisiting.\n\nLet's move fast on A and B. With the API Gateway V2 timeline, we need this hire ramped by mid-Q3.\n\nPriya","attachments":[]},{"id":"email_0045","from":"kevin_wu","to":["priya_sharma","amir_patel"],"cc":["james_liu"],"timestamp":"2026-03-28T11:00:00Z","body":"Agreed on all counts. Scheduling phone screens for next week:\n\n- Jordan Mitchell: Tuesday April 1, 11 AM (Amir phone screen)\n- Priya Kapoor: Wednesday April 2, 2 PM (Amir phone screen)\n\nIf either passes, we can fast-track to onsite the following week. Priya, I'll add you to the onsite panel again for the product sense interview.\n\nLet's keep the momentum going!\n\nKevin","attachments":[]}]},{"id":"thread_17","subject":"Benefits Open Enrollment Reminder","starred":false,"messages":[{"id":"email_0046","from":"celeste_dubois","to":["all_employees"],"cc":["nadira_khoury"],"timestamp":"2026-03-24T08:00:00Z","body":"Hi everyone,\n\nFriendly reminder that benefits open enrollment closes this Friday, March 28th at 5 PM PT.\n\nIf you haven't made your selections yet, please log into Rippling and complete your enrollment. Key items to review:\n\n**Health Insurance:**\n- PPO Gold: $450/month (employee), $1,100/month (family)\n- PPO Silver: $320/month (employee), $800/month (family)\n- HDHP with HSA: $180/month (employee), $450/month (family)\n\n**Dental & Vision:**\n- Dental Standard: $25/month (employee)\n- Vision Standard: $15/month (employee)\n\n**401(k):**\n- Company match: 50% up to 6% of salary\n- Changes to contribution % can be made at any time (not limited to open enrollment)\n\n**New this year:**\n- Fertility benefits through Carrot (up to $10K lifetime)\n- Enhanced mental health coverage (therapy sessions covered at 100%)\n- Pet insurance available through Nationwide\n\nIf you have any questions about plan options, I'm available for 15-minute consults this week. Just grab time on my calendar.\n\nBest,\nCeleste Dubois\nPeople Operations","attachments":[]}]},{"id":"thread_18","subject":"Expense Report: Product Conference — SaaStr Annual 2026","starred":false,"messages":[{"id":"email_0047","from":"priya_sharma","to":["patricia_hayes"],"cc":["elena_vasquez","sanya_mirovic"],"timestamp":"2026-03-19T16:00:00Z","body":"Patricia,\n\nSubmitting my expense report for the SaaStr Annual conference (March 10-12, San Jose). I attended with Elena and Derek.\n\nExpenses:\n- Conference registration: $1,295\n- Hotel (2 nights at Marriott San Jose): $478\n- Meals: $187 (3 dinners with customers/prospects, within $100/meal policy)\n- Uber/Lyft: $64\n- Parking: $35\n\nTotal: $2,059\n\nReceipts are attached in Expensify (Report #4521). All expenses are within company policy.\n\nHighlights from the conference: Great customer discovery conversations. Met with 3 enterprise prospects who are interested in API Gateway V2. Also attended a fantastic session on PLG in enterprise SaaS that I'm incorporating into our self-serve onboarding strategy.\n\nThanks,\nPriya","attachments":["Expense_Report_4521.pdf"]},{"id":"email_0048","from":"patricia_hayes","to":["priya_sharma"],"cc":["sanya_mirovic"],"timestamp":"2026-03-20T10:00:00Z","body":"Priya,\n\nExpense report #4521 is approved. Everything looks good and within policy. Jessica will process the reimbursement — expect it in your next paycheck (April 1).\n\nGlad the conference was productive!\n\nPatricia","attachments":[]}]},{"id":"thread_19","subject":"Product Team Offsite Planning — April 14-15","starred":false,"messages":[{"id":"email_0049","from":"elena_vasquez","to":["priya_sharma","derek_nguyen","maya_johnson","raj_krishnamurthy"],"cc":[],"timestamp":"2026-03-25T16:00:00Z","body":"Team,\n\nI've booked the product team offsite for April 14-15 at Cavallo Point Lodge in Sausalito. It's a beautiful venue right by the Golden Gate Bridge — perfect for a mix of strategy work and team bonding.\n\nProposed agenda:\n\n**Day 1 (April 14):**\n- 9:00 AM: Arrive, breakfast\n- 10:00 AM: H1 retrospective — what worked, what didn't\n- 12:00 PM: Lunch\n- 1:00 PM: Q3 progress check — API Gateway V2, Self-Serve, Analytics\n- 3:00 PM: Q4 brainstorm — what's next?\n- 5:00 PM: Free time / hike\n- 7:00 PM: Team dinner\n\n**Day 2 (April 15):**\n- 9:00 AM: Breakfast\n- 10:00 AM: Customer empathy session — review top 10 customer feedback themes\n- 12:00 PM: Lunch\n- 1:00 PM: Product vision 2027 — where do we want to be in 18 months?\n- 3:00 PM: Action items and commitments\n- 4:00 PM: Wrap up\n\nPlease hold these dates. Travel and meals are covered by the company. Let me know if the agenda looks good or if you'd like to add anything.\n\nElena","attachments":[]},{"id":"email_0050","from":"priya_sharma","to":["elena_vasquez"],"cc":["derek_nguyen","maya_johnson","raj_krishnamurthy"],"timestamp":"2026-03-26T09:00:00Z","body":"Elena, this looks amazing! Cavallo Point is a great choice.\n\nAgenda feedback:\n- **H1 retro**: Love this. I'd suggest we also include a 'lessons from Meridian' deep-dive since it was such a defining moment for the team.\n- **Q4 brainstorm**: I'd like to bring some preliminary thoughts on platform partnerships (API marketplace, integration ecosystem). This could be a big growth lever.\n- **Customer empathy session**: Can we invite Lena Okafor-Wright for this part? Her customer insight is invaluable and would make the discussion much richer.\n\nAlso — Derek mentioned he's on PTO April 7-11 (sister's wedding) so he'll be refreshed and ready for the offsite. Just making sure the dates work for everyone.\n\nLooking forward to it!\n\nPriya","attachments":[]},{"id":"email_0051","from":"derek_nguyen","to":["elena_vasquez","priya_sharma"],"cc":["maya_johnson","raj_krishnamurthy"],"timestamp":"2026-03-26T10:00:00Z","body":"Dates work perfectly for me — I'll be back from PTO and ready to go.\n\nGreat agenda Elena. A few additions from my side:\n- **Self-serve deep-dive**: I'd love 30 minutes to walk through the user research findings and the onboarding prototype. Getting the team's feedback in person would be really valuable.\n- **Raj's analytics**: Raj, can you prepare a data-driven view of our product usage trends? I think grounding the Q4 brainstorm in data would help us prioritize.\n- **Maya's design vision**: Maya, what about a 'design principles for 2027' session? As we scale the product, having shared design principles will keep us aligned.\n\n+1 on inviting Rachel for the customer empathy session. She always brings incredible insight.\n\nCan't wait! 🏔️\n\nDerek","attachments":[]}]},{"id":"thread_20","subject":"Incident Postmortem Review — May 15 Database Connection Leak","starred":false,"messages":[{"id":"email_0052","from":"sam_okafor","to":["james_liu","marcus_chen","amir_patel"],"cc":["priya_sharma","wei_zhang","fatima_alhassan"],"timestamp":"2026-03-18T08:00:00Z","body":"Team,\n\nI'm re-sharing the May 15, 2025 incident postmortem because it's directly relevant to the current Meridian latency investigation. The root causes are connected.\n\nPostmortem document is in the shared drive: Incident_Postmortem_May_15.docx\n\n**Quick recap:**\n- **What happened**: 45 minutes of downtime on May 15, 2025 due to database connection pool exhaustion\n- **Root cause**: Under high concurrency, our connection pool was leaking connections. Connections were being acquired but not properly released when requests timed out, causing the pool to fill up and eventually reject all new connections.\n- **Impact**: 45 minutes of service degradation affecting all customers. 100% error rate for 12 minutes at peak.\n- **Resolution**: Emergency increase of pool size + code fix for connection leak\n\n**The connection to Meridian's current issue:**\nThe May 15 fix was a band-aid — we increased pool sizes and fixed the leak, but we didn't address the underlying architectural limitation. As customers like Meridian scaled up their usage, the static pool sizing became a bottleneck again. This is exactly what the current connection pooling redesign (PR #1847) addresses permanently.\n\n**Action item #3 from the May 15 postmortem was literally: 'Redesign connection pooling for multi-tenant scale.'** We're now delivering on that.\n\nI'm flagging this because the narrative is powerful for the Meridian QBR: we learned from a past incident, invested in a proper architectural solution, and delivered it. This shows engineering maturity.\n\nSam","attachments":["Incident_Postmortem_May_15.docx"]},{"id":"email_0053","from":"priya_sharma","to":["sam_okafor","james_liu"],"cc":["marcus_chen","amir_patel","lena_okafor_wright"],"timestamp":"2026-03-18T10:00:00Z","body":"Sam, thanks for connecting the dots. This is exactly the kind of narrative we need.\n\nI'm incorporating this into the QBR deck. The story arc is:\n1. May 15 incident exposed a fundamental limitation in our connection pooling\n2. We didn't just patch it — we committed to a proper architectural redesign\n3. The API Gateway V2 connection pooling is the result of that commitment\n4. The fix has already brought Meridian's p99 from 800ms+ to 178ms\n5. This is just the beginning — rate limiting, better monitoring, and more are coming\n\nThis demonstrates that we're a vendor who learns, invests, and delivers. CloudPeak can't tell that story.\n\nRachel — adding you here because this context is gold for the QBR. Can we reference the incident timeline (anonymized) in the presentation?\n\nPriya","attachments":[]}]},{"id":"thread_21","subject":"Jira Weekly Digest — Sprint 24","starred":false,"messages":[{"id":"email_0054","from":"jira_automation","to":["priya_sharma"],"cc":[],"timestamp":"2026-03-28T07:00:00Z","body":"Sprint 24 Weekly Digest — Week of March 23-28, 2026\n\n**Sprint Progress: 78% complete (33/42 points)**\n\n**Completed this week (21 points):**\n- NEXUS-1180: Connection pool dynamic sizing [8 pts] — Amir Patel, Wei Zhang ✅\n- NEXUS-1181: Connection draining during deploys [5 pts] — Fatima Al-Hassan ✅\n- NEXUS-1183: Dashboard redesign — monitoring views [5 pts] — Aarav Iyer ✅\n- NEXUS-1186: Snowflake migration — final batch models [3 pts] — Miguel Santos ✅\n\n**In Progress (9 points):**\n- NEXUS-1182: Rate limiter POC [5 pts] — Wei Zhang 🔄 60%\n- NEXUS-1184: Auth integration — service mesh [3 pts] — Kenji Tanaka 🔄 40%\n- NEXUS-1188: QA — Integration test expansion [1 pt] — Nina Kowalski 🔄 80%\n\n**Carried Over to Sprint 25 (12 points):**\n- NEXUS-1185: Dashboard performance optimization [3 pts]\n- NEXUS-1189: Rate limiter Redis integration [5 pts]\n- NEXUS-1190: Tenant config API — schema design [4 pts]\n\n**Bugs Filed:**\n- NEXUS-1204: Connection recycling edge case — pool timeout [P2]\n- NEXUS-1205: Connection leak under high concurrency reconnect [P1] ← Fixed\n- NEXUS-1206: Stale connection detection race condition [P2]\n- NEXUS-1215: Meridian usage data schema validation [P2]\n- NEXUS-1225: Self-serve signup performance regression [P1] ← Fixed\n\n**Velocity Trend:**\n- Sprint 22: 38 pts\n- Sprint 23: 41 pts\n- Sprint 24: 33 pts (projected, lower due to Meridian priority work)\n\n— Jira Automation","attachments":[]}]},{"id":"thread_22","subject":"Deploy Notification: v2.14.3","starred":false,"messages":[{"id":"email_0055","from":"deploy_bot","to":["engineering_team"],"cc":["priya_sharma"],"timestamp":"2026-03-26T09:05:00Z","body":"🚀 **Production Deploy: v2.14.3**\n\n**Deploy Time:** March 26, 2026 08:00 UTC\n**Deploy Duration:** 4 minutes\n**Rollout Strategy:** Canary (10% → 50% → 100%)\n**Status:** ✅ Complete — all systems nominal\n\n**Changes included:**\n\n1. **Connection Pooling Optimizations (PR #1847)**\n   - Dynamic pool sizing based on tenant load\n   - Graceful connection draining during deployments\n   - Circuit breaker integration for connection failures\n   - Pre-warming on startup (hot-fixed from canary incident)\n   Authors: Amir Patel, Wei Zhang, Fatima Al-Hassan\n\n2. **Rate Limiting Preparation Hooks (PR #1852)**\n   - Redis integration scaffolding\n   - Tenant config schema for rate limit settings\n   - Envoy filter chain preparation\n   Authors: Wei Zhang, Fatima Al-Hassan\n\n3. **Tenant Configuration API (PR #1856)**\n   - Updated schema to support rate limiting configuration\n   - New endpoints for per-tenant settings management\n   Authors: Kenji Tanaka\n\n**Monitoring:**\n- Meridian Corp p99: 178ms (within 200ms SLA) ✅\n- Global p99: 145ms ✅\n- Error rate: 0.02% ✅\n- CPU/Memory: nominal ✅\n\n**Rollback plan:** Automatic rollback triggers on >1% error rate or >500ms p99.\n\n— Deploy Bot 🤖","attachments":[]}]}]},"docs":[{"id":"doc_01","name":"Q3_Product_Roadmap.docx","type":"word","last_edited_by":"elena_vasquez","last_edited":"2026-03-21","content":"# Q3 2026 Product Roadmap — Nexus Cloud\n\n## Executive Summary\n\nQ3 2026 is a pivotal quarter for Nexus Cloud. Following the successful Series C raise, we are investing aggressively in our enterprise platform capabilities. Our three strategic pillars — API Gateway V2, Self-Serve Onboarding, and Enterprise Analytics — directly address the top customer requests and position us to capture significant market share in the cloud infrastructure space.\n\n## Pillar 1: API Gateway V2 (60% Engineering Allocation)\n\n**Owner:** Priya Sharma (Sr. Product Manager)\n**Engineering Lead:** Amir Patel (Platform Lead)\n**Target:** GA by end of September 2026\n\n### Objectives\n- Complete the connection pooling redesign to eliminate latency issues at scale\n- Deliver per-tenant rate limiting with customizable rules\n- Build a tenant configuration API for self-serve management\n- Launch a new monitoring dashboard with real-time per-tenant metrics\n\n### Key Deliverables\n| Deliverable | Owner | Target Date | Status |\n|---|---|---|---|\n| Connection pooling redesign | Amir Patel, Wei Zhang | April 30 | In Progress (70%) |\n| Auth integration | Kenji Tanaka | May 15 | In Progress (40%) |\n| Rate limiting — Envoy edge layer | Wei Zhang | June 30 | Design Complete |\n| Rate limiting — Redis per-tenant | Fatima Al-Hassan | July 31 | Design Complete |\n| Tenant configuration API | Kenji Tanaka | June 15 | Not Started |\n| Monitoring dashboard | Lisa Park, Aarav Iyer | July 15 | In Progress (60%) |\n| Integration tests (95% coverage) | Nina Kowalski, Callum Reeves | Ongoing | At 87% |\n\n### Dependencies\n- Self-Serve Onboarding (Pillar 2) depends on the tenant configuration API\n- Marketing launch campaign timing aligned with GA\n- SOC2 documentation must cover new architecture\n\n### Risks\n1. **Rate limiting complexity**: Hybrid Envoy + Redis approach is technically complex. Mitigated with 2-week buffer and incremental delivery.\n2. **Staffing**: New hire (Alex Torres, April 6) needs 4 weeks to ramp. Second platform engineer hire in progress.\n3. **Meridian dependency**: If Meridian renewal requires accelerated features, it may impact timeline.\n\n## Pillar 2: Self-Serve Onboarding (25% Engineering Allocation)\n\n**Owner:** Derek Nguyen (Product Manager)\n**Engineering Lead:** Lisa Park (Frontend Lead)\n**Target:** Beta by end of September 2026\n\n### Objectives\n- Reduce time-to-first-API-call from 45 minutes to under 5 minutes\n- Provide interactive quickstart guides for the top 5 use cases\n- Enable sandbox environments for free-tier experimentation\n- Build a template gallery for common integration patterns\n\n### Customer Insight\nUser research (8 interviews in March) showed: developers rank time-to-first-API-call as the #1 factor in platform adoption. Interactive guides outperform static docs 3:1. Sandbox environments are table stakes for developer-focused products.\n\n## Pillar 3: Enterprise Analytics Overhaul (15% Engineering Allocation)\n\n**Owner:** Raj Krishnamurthy (Product Analyst)\n**Engineering:** Shared with Data team (Carlos Ruiz, Miguel Santos)\n**Target:** Phase 1 by August 2026\n\n### Objectives\n- Custom dashboards for enterprise accounts\n- Advanced usage analytics with trend analysis\n- Data export capabilities (CSV, API, webhook)\n\n## Success Metrics\n\n| Metric | Current | Q3 Target |\n|---|---|---|\n| API p99 latency (enterprise) | 178ms | <150ms |\n| Time-to-first-API-call | 45 min | <5 min |\n| Enterprise accounts with rate limiting | 0 | 10+ |\n| Customer health score (avg) | 74 | 80+ |\n| NPS | 52 | 60+ |\n\n## Approved by\n- Elena Vasquez, VP Product — March 21, 2026\n- Diana Torres, CEO — March 21, 2026\n- Marcus Chen, CTO — March 21, 2026"},{"id":"doc_02","name":"API_Gateway_Tech_Spec.docx","type":"word","last_edited_by":"priya_sharma","last_edited":"2026-03-19","content":"# API Gateway V2 — Technical Specification\n\n**Author:** Priya Sharma | **Reviewers:** James Liu, Marcus Chen, Amir Patel\n**Status:** Approved | **Last Updated:** March 19, 2026\n\n## 1. Architecture Overview\n\nAPI Gateway V2 represents a fundamental redesign of our request routing and management layer. The new architecture introduces three key components: a dynamic connection pooling engine, a hybrid rate limiting system, and a tenant configuration API.\n\nThe system operates within our existing service mesh (Envoy-based) and integrates with the multi-tenant isolation layer. All inter-service communication uses gRPC with mTLS. The gateway sits at the edge of our infrastructure and handles all inbound API requests before routing them to the appropriate backend services.\n\n### Architecture Diagram\n```\nClient → CloudFront CDN → Envoy Edge (Rate Limiting L1)\n    → API Gateway V2\n        → Connection Pool Manager (Dynamic Sizing)\n        → Auth Service (mTLS + JWT validation)\n        → Rate Limiter (Redis L2 — per-tenant)\n        → Request Router → Backend Services\n    → Monitoring Pipeline (OpenTelemetry → Prometheus → Grafana)\n```\n\n## 2. Connection Pooling Design\n\n### Problem Statement\nOur original connection pool used static sizing (100 connections per pod). As enterprise customers like Meridian Corp scaled to 15M+ daily API calls, the static pool became a bottleneck. Connections were created and torn down for each request, adding ~600ms of overhead.\n\n### Solution: Dynamic Pool Sizing\nThe new connection pool dynamically adjusts based on rolling 5-minute request rates per tenant. Key components:\n\n- **Auto-scaler**: Monitors request rate and adjusts pool size between min (20) and max (500) connections per tenant\n- **Pre-warming**: On pod startup, pre-warms connections based on historical tenant load patterns. This prevents cold-start latency penalties (learned from the March 26 canary incident).\n- **Graceful draining**: During deploys, connections drain over 10 seconds before the pod terminates, preventing in-flight request failures\n- **Circuit breaker**: If a backend service is unhealthy, the pool stops sending connections to it after 5 consecutive failures, with exponential backoff retry\n\n### Performance Targets\n- p99 latency: <200ms (currently achieving 178ms)\n- Connection reuse rate: >95%\n- Memory overhead: <50MB per 1000 connections\n\n## 3. Rate Limiting Architecture\n\n### Hybrid Approach: Envoy Edge + Redis Per-Tenant\n\n**Layer 1 — Envoy Edge (fast path)**:\nGlobal rate limits enforced at the edge using Envoy's built-in rate limiting filter. Rules are pre-loaded from configuration. This handles basic DDoS protection and global API limits with sub-1ms overhead.\n\n**Layer 2 — Redis Per-Tenant (configurable path)**:\nPer-tenant rate limits stored in Redis Cluster (3 nodes, read replicas). Uses sliding window algorithm implemented in Lua scripts for atomic increment + check operations. Supports:\n- Requests per second/minute/hour per tenant\n- Burst allowances (token bucket within sliding window)\n- Custom windows per tenant\n- Real-time configuration changes without deploys\n\n### Failure Mode Design\n**Principle: Fail open, never block customer traffic due to our own infrastructure issues.**\n\n- If Redis is unavailable: Fall back to Envoy edge limits using last-known-good cached configuration\n- If Envoy rate limiter errors: Pass traffic through (fail open) and alert\n- Degraded mode indicator in monitoring dashboard when operating on cached limits\n\n## 4. Tenant Configuration API\n\nRESTful API for managing per-tenant settings:\n- `GET /api/v2/tenants/{id}/config` — retrieve tenant configuration\n- `PUT /api/v2/tenants/{id}/config` — update tenant configuration\n- `GET /api/v2/tenants/{id}/rate-limits` — retrieve rate limit rules\n- `PUT /api/v2/tenants/{id}/rate-limits` — update rate limit rules\n\nConfiguration changes propagate to Redis within 5 seconds. Envoy cache refresh happens on a 30-second interval.\n\n## 5. Decision Log\n\n| Decision | Options Considered | Choice | Rationale |\n|---|---|---|---|\n| Rate limiting approach | Envoy-only vs Redis-only vs Hybrid | Hybrid | Envoy for performance, Redis for per-tenant flexibility |\n| Redis topology | Single node vs Cluster | Cluster (3 nodes) | HA requirement, enterprise SLA |\n| Failure mode | Fail open vs Fail closed | Fail open | Never block customer traffic due to our infra issues |\n| Pool sizing algorithm | Static vs Dynamic | Dynamic | Learned from Meridian incident — static doesn't scale |\n| Telemetry | Custom vs OpenTelemetry | OpenTelemetry | Vendor-neutral, industry standard, SOC2 compliant |\n\n## 6. Open Questions (Resolved)\n\n1. **Redis cluster topology**: Resolved — 3-node cluster with read replicas (Marcus recommendation)\n2. **Migration path**: Resolved — Phased rollout: new tenants first, then small accounts, enterprise last (James recommendation)\n3. **Telemetry retention**: Resolved — 90 days hot storage, 1 year cold storage (Marcus, aligned with SOC2)"},{"id":"doc_03","name":"Sprint_24_Retro_Notes.docx","type":"word","last_edited_by":"james_liu","last_edited":"2026-04-03","content":"# Sprint 24 Retrospective Notes\n\n**Sprint:** 24 (March 17 — April 3, 2026)\n**Facilitator:** James Liu\n**Attendees:** Priya Sharma, Amir Patel, Lisa Park, Carlos Ruiz, Nina Kowalski, Sam Okafor, Wei Zhang, Fatima Al-Hassan, Aarav Iyer\n\n## Sprint Summary\n\nSprint 24 was defined by the Meridian Corp latency escalation. We made the right call to reprioritize mid-sprint, and the team delivered an exceptional response. However, the unplanned work exposed gaps in our planning and testing processes.\n\n**Velocity:** 33 points completed (out of 42 planned). 78% completion rate.\n**Carryover:** 3 stories (12 points) moved to Sprint 25.\n\n## What Went Well\n\n### 1. Meridian Latency Hotfix Turnaround\nThe cross-functional response to the Meridian escalation was outstanding. From Rachel's initial alert to the fix being deployed, the entire arc took 10 days. Key highlights:\n- Root cause identified within 24 hours (Amir, Wei)\n- Interim fix deployed in 48 hours, reducing p99 from 820ms to 450ms\n- Full fix (dynamic connection pooling) deployed in 10 days, achieving 178ms p99\n- Customer confirmed improvement and QBR was a success\n\n### 2. Connection Pooling Redesign Quality\nThe new dynamic connection pooling is performing better than expected:\n- p99 latency: 145ms under sustained 10K req/s load\n- Memory usage: 2.1GB per pod (down from 4.5GB spikes)\n- CPU overhead: reduced 35%\nCallum Reeves' load testing was thorough and gave us confidence to ship.\n\n### 3. Snowflake Migration\nMiguel and Anna completed the Snowflake migration on schedule with zero data loss. 3x query performance improvement. Carlos' planning and the parallel validation approach were key to the smooth cutover.\n\n## What Didn't Go Well\n\n### 1. Scope Creep / Unplanned Work\nWe added 3 unplanned stories mid-sprint (total 15 points) for the Meridian fix. While this was the right business decision, it pushed auth integration, dashboard performance optimization, and the rate limiter Redis integration to Sprint 25. We need better buffer planning to absorb priority changes.\n\n### 2. Testing Gaps — Cold Start Issue\nThe v2.14.3 deploy surfaced a cold-start issue during canary rollout. The connection pool pre-warming logic wasn't tested in the deploy pipeline. This should have been caught before production. The issue was resolved quickly (45 min, zero customer impact) but it shouldn't have happened.\n\n### 3. Communication During Escalation\nSome team members learned about the Meridian escalation through Slack channels rather than direct communication. We need a clearer escalation protocol that ensures the right people are notified immediately.\n\n## Action Items\n\n| # | Action | Owner | Due |\n|---|---|---|---|\n| 1 | Add cold-start testing to deploy pipeline | Amir Patel | Sprint 25 |\n| 2 | Update deploy checklist with pre-warming verification | Sam Okafor | Sprint 25 |\n| 3 | Create P0 escalation protocol document | James Liu | April 10 |\n| 4 | Build 15% buffer into Sprint 25 capacity | Priya Sharma | Sprint 25 planning |\n| 5 | Expand integration tests for deploy scenarios | Nina Kowalski | Sprint 25-26 |\n| 6 | Set up automated customer health alerts | Priya Sharma | April 15 |\n\n## Sprint 25 Focus\n- Complete rate limiting Redis integration\n- Auth integration completion\n- Dashboard performance optimization\n- Begin tenant configuration API implementation"},{"id":"doc_04","name":"Incident_Postmortem_May_15.docx","type":"word","last_edited_by":"sam_okafor","last_edited":"2026-03-18","content":"# Incident Postmortem — May 15, 2025\n\n## Incident Summary\n\n**Severity:** P1 — Major Service Degradation\n**Duration:** 45 minutes (14:23 — 15:08 UTC)\n**Impact:** All customers experienced elevated latency and error rates. 100% error rate for 12 minutes at peak.\n**Affected Services:** API Gateway, Connection Pool Manager\n**On-Call Engineer:** Sam Okafor\n**Incident Commander:** James Liu\n\n## Timeline\n\n| Time (UTC) | Event |\n|---|---|\n| 14:23 | PagerDuty alert: API error rate exceeds 5% threshold |\n| 14:25 | Sam acknowledges alert, begins investigation |\n| 14:28 | Error rate escalates to 25%. Sam pages James and Amir. |\n| 14:32 | Root cause hypothesis: connection pool exhaustion. All 100 connections per pod are in use with 500+ requests queued. |\n| 14:35 | James declares P1 incident, opens war room channel |\n| 14:38 | Amir confirms: connections are being acquired but not released on request timeout. Connection leak confirmed. |\n| 14:42 | Decision: increase pool size to 500 as emergency measure while fixing the leak |\n| 14:48 | Pool size increase deployed. Error rate begins to drop. |\n| 14:55 | Error rate at 2%. Most requests succeeding but with elevated latency. |\n| 15:02 | Amir pushes connection leak fix — proper connection release in timeout handler |\n| 15:08 | Error rate at 0.1% (normal). p99 latency at 250ms (slightly elevated). Incident resolved. |\n| 15:30 | Post-incident monitoring confirms stable metrics. All-clear given. |\n\n## Root Cause Analysis\n\nThe database connection pool had a bug in the timeout handling path. When a request timed out waiting for a database response, the connection was not properly released back to the pool. Under normal load, this was invisible because connections eventually timed out and were reclaimed by the pool's idle connection sweeper (every 60 seconds). However, under the high concurrency experienced on May 15 (spike from a customer running a bulk import), connections were exhausted faster than the sweeper could reclaim them.\n\nThe fundamental issue was twofold:\n1. **Bug**: Connection leak in the timeout handler (immediate cause)\n2. **Architecture**: Static pool sizing (100 per pod) with no dynamic scaling (contributing cause)\n\n## Resolution\n\n1. **Immediate**: Increased static pool size from 100 to 500 connections per pod\n2. **Short-term**: Fixed connection leak in timeout handler (PR #1623)\n3. **Long-term (PENDING)**: Redesign connection pooling for dynamic multi-tenant scaling\n\n## Impact Assessment\n\n- **Downtime**: 45 minutes of degraded service, 12 minutes of complete outage\n- **Customers affected**: All (47 active accounts)\n- **Financial impact**: 3 SLA credit requests totaling ~$15K\n- **Reputation impact**: Moderate. Several enterprise customers expressed concern.\n\n## Action Items\n\n| # | Action | Owner | Status |\n|---|---|---|---|\n| 1 | Fix connection leak in timeout handler | Amir Patel | ✅ Complete |\n| 2 | Increase pool size as interim measure | Sam Okafor | ✅ Complete |\n| 3 | Redesign connection pooling for multi-tenant scale | Amir Patel | 🔄 In Progress (API Gateway V2) |\n| 4 | Add connection pool monitoring alerts | Kenji Tanaka | ✅ Complete |\n| 5 | Create runbook for connection pool exhaustion | Sam Okafor | ✅ Complete |\n| 6 | Load test connection pool under high concurrency | Callum Reeves | ✅ Complete |\n\n## Lessons Learned\n\n1. Static resource sizing doesn't work at enterprise scale. We need dynamic, per-tenant resource management.\n2. Timeout handling paths need dedicated testing — they're often the least-tested code paths.\n3. Our monitoring caught the issue quickly (2 min to alert) but we need per-tenant monitoring to catch degradation before it becomes an outage.\n4. The incident response process worked well. Team coordination was effective and the war room model is the right approach for P1 incidents."},{"id":"doc_05","name":"Employee_Handbook_Excerpt.docx","type":"word","last_edited_by":"nadira_khoury","last_edited":"2026-01-15","content":"# Nexus Cloud Employee Handbook (Excerpt)\n\n**Last Updated:** January 15, 2026\n**Maintained by:** Nadira Khoury, Head of People\n\n## Paid Time Off (PTO) Policy\n\nNexus Cloud offers an unlimited PTO policy with a 15-day minimum annual requirement. We trust our team members to manage their time responsibly and take the time they need to rest and recharge.\n\n### Guidelines\n- **Minimum**: All employees are required to take at least 15 days of PTO per calendar year. Managers are responsible for ensuring their teams meet this minimum.\n- **Approval**: PTO requests of 5 or fewer consecutive days require manager approval with at least 1 week notice. Requests exceeding 5 consecutive days require 2 weeks notice and VP approval.\n- **Blackout periods**: No blackout periods exist, but please be mindful of team commitments, sprint cycles, and customer-facing obligations. Coordinate with your team to ensure coverage.\n- **Holidays**: Nexus Cloud observes 10 company holidays per year (listed in Rippling). Offices are closed on these days.\n- **Parental leave**: 16 weeks fully paid for primary caregivers, 8 weeks for secondary caregivers.\n\n## Expense Policy\n\n### Meals\n- **Team meals**: Up to $100 per person for team dinners and client meals. Manager approval required.\n- **Individual meals during travel**: Up to $75 per day ($25 breakfast, $25 lunch, $25 dinner).\n- **Office meals**: Catered lunches are provided twice per week for in-office employees.\n\n### Travel\n- **Flights**: Economy class for flights under 4 hours. Business class allowed for flights over 4 hours with VP approval.\n- **Hotels**: Up to $300/night in SF and NYC, $250/night elsewhere. Manager approval for exceptions.\n- **Ground transport**: Uber/Lyft approved for business travel. Personal vehicle reimbursed at IRS standard rate.\n- **Conference attendance**: Pre-approved by manager. Registration, travel, and accommodation covered.\n- **Per-trip limit**: $500 total for non-flight expenses without VP approval. Exceeding requires VP sign-off.\n\n### Submission\nAll expenses must be submitted through Expensify within 30 days of the expense. Receipts required for all expenses over $25. Expense reports are reviewed by Finance within 5 business days.\n\n## Remote Work Policy\n\nNexus Cloud operates a hybrid model. In-office employees (SF and NYC) are expected in the office Tuesday through Thursday. Monday and Friday are flexible work-from-home days.\n\n### Remote Employees\n- Fully remote employees must be in a US time zone (Pacific, Mountain, Central, or Eastern)\n- Remote employees are expected to visit the SF office at least once per quarter for team events\n- Company covers up to $1,000 for home office setup (one-time) and $100/month for internet\n- All remote employees receive a $500 annual co-working space stipend\n\n### Equipment\n- All employees receive a company laptop (MacBook Pro), external monitor, and standard peripherals\n- Additional equipment requests over $200 require manager approval\n- Equipment must be returned upon departure from the company"},{"id":"doc_06","name":"Competitive_Analysis.docx","type":"word","last_edited_by":"priya_sharma","last_edited":"2026-03-24","content":"# Competitive Analysis — Cloud Infrastructure Platform Market\n\n**Author:** Priya Sharma | **Last Updated:** March 24, 2026\n\n## Market Overview\n\nThe cloud infrastructure platform market is growing at 28% CAGR and expected to reach $45B by 2028. Key trends driving growth: enterprise cloud migration, API-first architectures, and the need for multi-tenant infrastructure management.\n\n## Competitive Feature Matrix\n\n| Feature | Nexus Cloud | CloudPeak | Stratosphere | AeroAPI |\n|---|---|---|---|---|\n| **Multi-tenant isolation** | ✅ Industry-leading | ⚠️ Basic | ✅ Good | ❌ None |\n| **Dynamic connection pooling** | ✅ New (V2) | ❌ Static only | ⚠️ Semi-dynamic | ❌ None |\n| **Per-tenant rate limiting** | 🔄 Q3 2026 | ✅ Available | ❌ Global only | ⚠️ Basic |\n| **Self-serve onboarding** | 🔄 Q3 2026 | ✅ Good | ⚠️ Limited | ✅ Best-in-class |\n| **Enterprise analytics** | ⚠️ Basic | ✅ Good | ✅ Good | ❌ None |\n| **SOC2 Type II** | 🔄 May 2026 | ✅ Certified | ✅ Certified | ❌ No |\n| **Pricing (per API call)** | $0.003 | $0.002 | $0.004 | $0.001 |\n| **Enterprise support** | ✅ Dedicated CSM | ✅ Dedicated | ⚠️ Shared | ❌ Community |\n\n## Competitor Deep Dives\n\n### CloudPeak (Primary Threat)\n- **Founded**: 2020, Series B ($45M), 120 employees\n- **Strengths**: Per-tenant rate limiting (already shipping), competitive pricing ($0.002/call), growing enterprise presence\n- **Weaknesses**: Multi-tenant isolation is basic (noisy neighbor issues reported), no dynamic connection pooling, smaller engineering team limits innovation speed\n- **Recent move**: Announced 'Enterprise Shield' tier with dedicated support and custom SLAs\n- **Our response**: API Gateway V2 closes the rate limiting gap while maintaining our connection pooling and isolation advantages. Our architecture is fundamentally more sophisticated.\n\n### Stratosphere (Secondary Competitor)\n- **Founded**: 2019, Series C ($80M), 200 employees\n- **Strengths**: Mature product, good analytics, SOC2 certified\n- **Weaknesses**: Higher pricing ($0.004/call), slow innovation cycle, no per-tenant rate limiting\n- **Our response**: We compete on innovation speed and platform sophistication. Stratosphere is the incumbent we're disrupting.\n\n### AeroAPI (Emerging — SMB focused)\n- **Founded**: 2023, Series A ($12M), 35 employees\n- **Strengths**: Best self-serve onboarding, lowest pricing, developer-friendly\n- **Weaknesses**: No enterprise features, no multi-tenant isolation, no SOC2\n- **Our response**: Different market segment. They serve SMB/startup, we serve mid-market to enterprise. Not a direct threat today but watch their upmarket movement.\n\n## Key Differentiators (Our Competitive Moat)\n\n1. **Multi-tenant isolation**: Zero noisy-neighbor guarantee. No competitor matches this.\n2. **Dynamic connection pooling**: Unique in the market. Automatically scales per tenant.\n3. **Engineering depth**: Our architecture-first approach vs. competitors' feature-first approach gives us a more robust, scalable platform.\n4. **Customer success model**: Dedicated CSMs for enterprise accounts with proactive health monitoring.\n\n## Recommended Sales Positioning\n\nLead with reliability and architecture depth. Don't compete on price — compete on total cost of ownership (fewer incidents = less engineering time = lower TCO). Use the Meridian latency fix story as proof of responsiveness."},{"id":"doc_07","name":"New_Hire_Onboarding_Checklist.docx","type":"word","last_edited_by":"nadira_khoury","last_edited":"2026-04-01","content":"# New Hire Onboarding Checklist — Nexus Cloud\n\n**Template Version:** 3.2 | **Last Updated:** April 1, 2026\n\n## Pre-Start (1 week before)\n\n- [ ] IT provisions laptop (MacBook Pro M3) and ships to new hire — **Owner: Ingrid Solberg**\n- [ ] Create accounts: Google Workspace, Slack, GitHub, Jira, Greenhouse, Rippling, Expensify — **Owner: Ingrid Solberg**\n- [ ] Manager prepares 30/60/90 day plan — **Owner: Hiring Manager**\n- [ ] Assign onboarding buddy from the team — **Owner: Hiring Manager**\n- [ ] Send welcome package (branded swag, office supplies) — **Owner: Ingrid Solberg**\n- [ ] Add to team calendar and relevant Slack channels — **Owner: Ingrid Solberg**\n\n## Week 1: Foundation\n\n### Day 1\n- [ ] Welcome meeting with manager (30 min) — **Owner: Hiring Manager**\n- [ ] Office tour or virtual office walkthrough — **Owner: Ingrid Solberg**\n- [ ] IT setup assistance (VPN, 2FA, email) — **Owner: Ingrid Solberg**\n- [ ] Security training (1 hour, required) — **Owner: Sam Okafor**\n- [ ] HR orientation: benefits, policies, Rippling tour — **Owner: Celeste Dubois**\n- [ ] Team lunch (company-paid) — **Owner: Team**\n\n### Days 2-3\n- [ ] Product overview session (1 hour) — **Owner: Product Manager**\n- [ ] Engineering architecture overview (1 hour) — **Owner: Engineering Lead**\n- [ ] Development environment setup — **Owner: Onboarding Buddy**\n- [ ] Read key documentation: Employee Handbook, Engineering Wiki, Product Roadmap\n\n### Days 4-5\n- [ ] 1:1 with skip-level manager (30 min) — **Owner: Skip-level Manager**\n- [ ] Meet cross-functional partners (PM, Design, Sales, CS) — **Owner: Hiring Manager**\n- [ ] First codebase walkthrough with buddy — **Owner: Onboarding Buddy**\n- [ ] End-of-week check-in with manager — **Owner: Hiring Manager**\n\n## Week 2: Depth\n\n- [ ] Deep-dive on team's codebase and current projects — **Owner: Onboarding Buddy**\n- [ ] Shadow on-call rotation (observe, don't respond) — **Owner: DevOps Lead**\n- [ ] Attend all regular team meetings (standups, planning, retro)\n- [ ] Review open Jira tickets and choose first starter ticket\n- [ ] 1:1 with all team members (15 min each) — **Owner: New Hire**\n\n## Week 3: Contribution\n\n- [ ] Pick up first ticket(s) — starter bugs or small features\n- [ ] Submit first code review (reviewing others' PRs)\n- [ ] Attend sprint planning as a participating team member\n- [ ] Begin contributing to design discussions\n- [ ] Mid-onboarding check-in with HR — **Owner: Nadira Khoury**\n\n## Week 4: Integration\n\n- [ ] Submit first pull request\n- [ ] Present a brief \"what I've learned\" at team standup\n- [ ] Complete 30-day review with manager — **Owner: Hiring Manager**\n- [ ] Provide onboarding feedback (survey in Lattice) — **Owner: New Hire**\n- [ ] Transition from buddy system to independent work\n\n## Success Criteria (30 days)\n- Has merged at least 1 PR\n- Can navigate codebase independently\n- Understands team's current sprint priorities\n- Has met all key cross-functional partners\n- Feels comfortable asking questions and contributing in meetings"},{"id":"doc_08","name":"Marketing_Campaign_Brief_Q3_Launch.docx","type":"word","last_edited_by":"maren_lindqvist","last_edited":"2026-03-28","content":"# Marketing Campaign Brief — API Gateway V2 Launch\n\n**Campaign Name:** \"Infrastructure That Scales With You\"\n**Campaign Owner:** Maren Lindqvist, Director of Marketing\n**Product Owner:** Priya Sharma, Sr. Product Manager\n**Target Launch:** September 2026 (aligned with GA)\n**Budget:** $65,000 ($50K paid media, $15K events)\n\n## Campaign Objective\n\nPosition Nexus Cloud's API Gateway V2 as the premier enterprise API infrastructure solution. Drive awareness among platform engineering teams and generate qualified pipeline for the sales team. Target: 200 MQLs, 50 SQLs, $500K in attributed pipeline.\n\n## Target Audience\n\n**Primary:** Platform engineering leaders and senior engineers at companies with 500+ engineers. Titles: VP of Platform, Director of Infrastructure, Senior Platform Engineer, SRE Lead.\n\n**Secondary:** CTOs and VP Engineering at mid-market companies (200-500 employees) evaluating cloud infrastructure solutions.\n\n**Persona pain points:**\n- Managing API infrastructure at scale without custom tooling\n- Noisy neighbor problems in multi-tenant environments\n- Lack of granular rate limiting controls\n- Poor visibility into per-tenant performance\n\n## Key Messaging\n\n**Tagline:** \"Enterprise API infrastructure that scales with you\"\n\n**Positioning statement:** Nexus Cloud API Gateway V2 is the only cloud infrastructure platform that combines dynamic connection pooling, per-tenant rate limiting, and zero-noise multi-tenant isolation — all without the complexity of building it yourself.\n\n**Three pillars of messaging:**\n1. **Scale without limits**: Dynamic connection pooling that automatically adjusts to your usage patterns\n2. **Control at every level**: Per-tenant rate limiting with real-time configuration — no deploys needed\n3. **Reliability you can prove**: Built-in monitoring, SOC2 certified, and backed by dedicated enterprise support\n\n## Channel Strategy\n\n### Content Marketing (Zuri Abebe)\n- 4-part blog series: (1) Why we built it, (2) Connection pooling deep-dive, (3) Rate limiting at scale, (4) Customer story\n- 1 whitepaper: \"The Enterprise Guide to API Infrastructure\"\n- 2 case studies: Meridian Corp (anonymized) and Pinnacle Financial\n- Schedule: Blog series starts July, whitepaper August, case studies September\n\n### Paid Media (Pavel Novák)\n- LinkedIn: Sponsored content + InMail targeting platform engineering titles\n- Google Ads: Search campaigns on \"API gateway enterprise\" and related terms\n- Budget: $50K over Q3 (front-loaded for awareness, shifting to demand gen in September)\n- KPIs: 1M impressions, 5K clicks, 200 MQLs\n\n### Events (Yuna Seo)\n- CloudNative Summit booth + 2 speaking slots (April)\n- \"API Gateway Best Practices\" webinar with Priya + Marcus (April 22)\n- Product Hunt launch (September, aligned with GA)\n\n### Design (Mateo Ríos)\n- Booth graphics, ad creative, one-pager, updated pitch deck\n- Website landing page for API Gateway V2\n\n## Timeline\n\n| Milestone | Date | Owner |\n|---|---|---|\n| Campaign brief finalized | April 10 | Sarah |\n| Blog series outline approved | April 15 | Emma |\n| Ad creative ready | May 1 | Tyler |\n| CloudNative Summit | April (TBD) | Olivia |\n| Webinar #1 | April 22 | Olivia |\n| Blog series begins | July 1 | Emma |\n| Product Hunt prep | August 15 | Josh |\n| GA launch day | September (TBD) | All |\n\n## Measurement\n\n| Metric | Target |\n|---|---|\n| Blog series total views | 25,000 |\n| Webinar registrations | 500 |\n| MQLs attributed | 200 |\n| SQLs attributed | 50 |\n| Pipeline attributed | $500,000 |"},{"id":"doc_09","name":"Customer_Health_Dashboard.xlsx","type":"excel","last_edited_by":"riku_ito","last_edited":"2026-03-26","sheets":{"All Accounts":[["Account","Tier","ARR","Health Score","NPS","Renewal Date","CSM","Notes"],["Meridian Corp","Enterprise",480000,68,35,"2026-04-30","Lena Okafor-Wright","Latency fix deployed. QBR March 31. CloudPeak threat. Health improving from 42."],["Apex Manufacturing","Enterprise",320000,82,65,"2026-08-15","Lena Okafor-Wright","Stable. Expanding usage. Happy with platform performance."],["Pinnacle Financial","Enterprise",210000,88,72,"2027-03-15","Theo Kapla // ============ MARKDOWN ============
function md(raw){
  let s=esc(raw);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
    if(/[┌┐└┘├┤┬┴┼─│]/.test(code))return'<div class="ascii-tree">'+code+'</div>';
    return'<pre><code>'+code+'</code></pre>';
  });
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/((?:^\|.+\|$\n?)+)/gm,function(block){
    const rows=block.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2)return block;
    const isSep=r=>/^\|[\s\-:|]+\|$/.test(r);
    let html='<table>';let headerDone=false;
    rows.forEach((row,i)=>{
      if(isSep(row)){headerDone=true;return;}
      const cells=row.split('|').slice(1,-1).map(c=>c.trim());
      if(!headerDone&&i===0)html+='<thead><tr>'+cells.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>';
      else html+='<tr>'+cells.map(c=>'<td>'+c+'</td>').join('')+'</tr>';
    });
    html+='</tbody></table>';return html;
  });
  s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^---+$/gm,'<hr>');
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/((?:^[\s]*[-*] .+$\n?)+)/gm,function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\s*[-*] /,''));
    return'<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
  });
  s=s.replace(/((?:^\d+\. .+$\n?)+)/gm,function(block){
    const items=block.trim().split('\n').map(l=>l.replace(/^\d+\. /,''));
    return'<ol>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ol>';
  });
  s=s.replace(/\n\n+/g,'</p><p>');
  s=s.replace(/\n/g,'<br>');
  if(!/^<[huptdob]/.test(s))s='<p>'+s+'</p>';
  s=s.replace(/<p>\s*<\/p>/g,'');
  s=s.replace(/<p>(<(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote))/g,'$1');
  s=s.replace(/(<\/(?:h[1-4]|table|ul|ol|pre|div|hr|blockquote)>)<\/p>/g,'$1');
  return s;
}

function colLabel(c){let s='';while(c>=0){s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26)-1;}return s;}

function renderExcel(sheets,pfx){
  const names=Object.keys(sheets).filter(n=>sheets[n]&&sheets[n].length>0);
  if(!names.length)return'<div style="padding:40px;text-align:center;color:var(--g400)">No data.</div>';
  let h='<div class="excel-tabs">';
  names.forEach((n,i)=>{h+='<button class="excel-tab'+(i===0?' active':'')+'" onclick="switchXl(this,\''+pfx+'\',this.dataset.sn)" data-sn="'+esc(n)+'">'+esc(n)+'</button>';});
  h+='</div>';
  names.forEach((n,i)=>{
    const rows=sheets[n],maxC=Math.max(...rows.map(r=>r.length),0);
    let t='<table class="xl"><thead><tr><th></th>';
    for(let c=0;c<maxC;c++)t+='<th>'+colLabel(c)+'</th>';
    t+='</tr></thead><tbody>';
    rows.forEach((row,ri)=>{
      t+='<tr><td class="rn">'+(ri+1)+'</td>';
      for(let c=0;c<maxC;c++){const v=c<row.length?row[c]:null;if(v===null)t+='<td></td>';else if(typeof v==='number')t+='<td class="num">'+v+'</td>';else t+='<td title="'+esc(String(v))+'">'+esc(String(v).substring(0,80))+'</td>';}
      t+='</tr>';
    });
    t+='</tbody></table>';
    h+='<div class="excel-pane" data-pfx="'+pfx+'" data-sn="'+esc(n)+'" style="'+(i>0?'display:none':'')+'">' +t+'</div>';
  });
  return h;
}
function switchXl(el,pfx,sn){
  el.parentElement.querySelectorAll('.excel-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('.excel-pane[data-pfx="'+pfx+'"]').forEach(p=>{p.style.display=p.dataset.sn===sn?'':'none';});
}

function renderTeamsMessages(){
  const teams=DATA.seed_data.teams;
  let messages;
  if(currentDm!==null)messages=teams.dms[currentDm].messages;
  else{const ch=teams.channels.find(c=>c.name===currentChannel);messages=ch?ch.messages:[];}
  let h='',lastFrom=null;
  messages.forEach(msg=>{
    const grouped=msg.from===lastFrom;
    h+='<div class="teams-msg'+(grouped?' grouped':'')+'">';
    h+='<div class="msg-avatar" style="background:'+empColor(msg.from)+'">'+empInitials(msg.from)+'</div>';

    if(!grouped)h+='<div class="msg-header"><span class="msg-name">'+esc(empName(msg.from))+'</span><span class="msg-time">'+formatMsgTime(msg.timestamp)+'</span></div>';
    h+='<div class="msg-text">'+esc(msg.text)+'</div>';

function renderCalendar(){
  const cal=DATA.seed_data.calendar;
  const people=Object.keys(cal);
  let h='<div class="cal-layout">';
  h+='<div class="cal-person-tabs">';
  people.forEach(pid=>{h+='<button class="cal-person-tab'+(pid===calPerson?' active':'')+'" onclick="switchCalPerson(\''+pid+'\')">'+esc(empName(pid))+'</button>';});
  h+='</div>';
  h+='<div class="cal-legend">';
  [['one_on_one','1:1','#007AFF'],['team','Team','#34C759'],['cross_func','Cross-functional','#AF52DE'],['external','External','#F5A623'],['personal','Personal','#8E8E93'],['focus','Focus Time','#D4D4D4'],['company','Company','#FF3B30']].forEach(([cls,label,color])=>{
    h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:'+color+'"></div>'+label+'</div>';
  });
  h+='</div>';
  h+=renderCalMonth(calYear,calMonth,cal[calPerson]);
  h+='<div id="cal-day-detail"></div></div>';
  return h;
}
function renderCalMonth(year,month,events){
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let h='<div class="cal-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{h+='<div class="cal-dow">'+d+'</div>';});
  for(let i=0;i<firstDay;i++){const d=new Date(year,month,-(firstDay-i-1));h+='<div class="cal-day other-month"><div class="day-num">'+d.getDate()+'</div></div>';}
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayEvents=(events||[]).filter(e=>e.start&&e.start.startsWith(dateStr));
    h+='<div class="cal-day" onclick="selectCalDay(\''+dateStr+'\')">';
    h+='<div class="day-num">'+d+'</div>';
    dayEvents.slice(0,3).forEach(ev=>{h+='<div class="cal-event '+(ev.category||'team')+'" title="'+esc(ev.title)+'">'+esc(ev.title)+'</div>';});
    if(dayEvents.length>3)h+='<div style="font-size:10px;color:var(--g400)">+'+( dayEvents.length-3)+' more</div>';
    h+='</div>';
  }
  const totalCells=firstDay+daysInMonth;const remaining=(7-(totalCells%7))%7;
  for(let i=1;i<=remaining;i++)h+='<div class="cal-day other-month"><div class="day-num">'+i+'</div></div>';
  h+='</div>';return h;
}
function selectCalDay(dateStr){
  calSelectedDate=dateStr;
  const events=(DATA.seed_data.calendar[calPerson]||[]).filter(e=>e.start&&e.start.startsWith(dateStr));
  const d=new Date(dateStr+'T12:00:00');
  const formatted=d.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  let h='<div class="cal-day-detail"><h3>'+formatted+'</h3>';
  if(!events.length)h+='<p style="color:var(--g400);font-size:14px;margin-top:8px">No events scheduled</p>';
  else{
    events.sort((a,b)=>a.start.localeCompare(b.start)).forEach(ev=>{
      const startTime=new Date(ev.start).toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'});
      const endTime=new Date(ev.end).toLocaleTimeString('en',{hour:'numeric',minute:'2-digit'});
      const catColor={one_on_one:'#007AFF',team:'#34C759',cross_func:'#AF52DE',external:'#F5A623',personal:'#8E8E93',focus:'#D4D4D4',company:'#FF3B30'}[ev.category]||'#999';
      h+='<div class="cal-detail-event" style="border-left-color:'+catColor+'">';
      h+='<div class="ev-time">'+startTime+' — '+endTime+'</div>';
      h+='<div class="ev-title">'+esc(ev.title)+'</div>';
      if(ev.location)h+='<div class="ev-loc">📍 '+esc(ev.location)+'</div>';
      if(ev.attendees&&ev.attendees.length){
        h+='<div class="ev-attendees">';
        ev.attendees.forEach(a=>{h+='<span class="ev-attendee '+(a.status||'')+'">'+esc(empName(a.id))+'</span>';});
        h+='</div>';
      }
      if(ev.description)h+='<div class="ev-desc">'+esc(ev.description)+'</div>';
      h+='</div>';
    });
  }
  h+='</div>';
  document.getElementById('cal-day-detail').innerHTML=h;
}
function switchCalPerson(pid){
  calPerson=pid;calSelectedDate=null;
  document.getElementById('env-content').innerHTML=renderCalendar();
}

  let h='<div class="email-thread-header">'+esc(thread.subject)+'</div>';

  docs.forEach((doc,i)=>{
    const icon=doc.type==='excel'?'📊':doc.type==='ppt'?'📈':'📄';

  });
  h+='</div><div class="docs-viewer" id="docs-viewer">'+renderDocContent(currentDoc)+'</div></div>';
  return h;
}
function renderDocContent(idx){
  const doc=DATA.seed_data.docs[idx];
  if(!doc)return'';
  let h='<div class="docs-viewer-header"><div class="doc-title">'+esc(doc.name)+'</div>';
  h+='<div class="doc-meta">Last edited by '+esc(empName(doc.last_edited_by))+' on '+doc.last_edited+'</div></div>';
  h+='<div class="docs-viewer-body">';
  if(doc.type==='word')h+='<div class="md-content" style="max-height:none;border:none;background:transparent;padding:0">'+md(doc.content)+'</div>';
  else if(doc.type==='excel')h+=renderExcel(doc.sheets,'docxl-'+idx);
  else if(doc.type==='ppt')h+=renderSlides(doc.slides,idx);
  h+='</div>';return h;
}
function renderSlides(slides,docIdx){
  currentSlide=0;
  let h='<div class="slide-carousel"><div class="slide-nav">';
  h+='<button class="slide-nav-btn" id="slide-prev-'+docIdx+'" onclick="slideNav('+docIdx+',-1)" disabled>← Previous</button>';
  h+='<span class="slide-counter" id="slide-counter-'+docIdx+'">Slide 1 of '+slides.length+'</span>';
  h+='<button class="slide-nav-btn" id="slide-next-'+docIdx+'" onclick="slideNav('+docIdx+',1)">Next →</button></div>';
  slides.forEach((s,i)=>{
    h+='<div class="slide-card" id="slide-'+docIdx+'-'+i+'" style="'+(i>0?'display:none':'')+'"><div class="slide-title">'+esc(s.title)+'</div><div class="slide-content">'+esc(s.content)+'</div></div>';
  });
  h+='</div>';return h;
}
function slideNav(docIdx,dir){
  const doc=DATA.seed_data.docs[docIdx];
  const slides=doc.slides;
  document.getElementById('slide-'+docIdx+'-'+currentSlide).style.display='none';
  currentSlide=Math.max(0,Math.min(slides.length-1,currentSlide+dir));
  document.getElementById('slide-'+docIdx+'-'+currentSlide).style.display='';
  document.getElementById('slide-counter-'+docIdx).textContent='Slide '+(currentSlide+1)+' of '+slides.length;
  document.getElementById('slide-prev-'+docIdx).disabled=currentSlide===0;
  document.getElementById('slide-next-'+docIdx).disabled=currentSlide===slides.length-1;
}
function selectDoc(idx){
  currentDoc=idx;currentSlide=0;
  document.querySelectorAll('.docs-file-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.getElementById('docs-viewer').innerHTML=renderDocContent(idx);
}

  if(e.skills&&e.skills.length)h+='<div class="detail-section"><div class="detail-label">Skills</div><div class="detail-value">'+e.skills.map(s=>'<span class="badge badge-info" style="margin-right:4px">'+esc(s)+'</span>').join('')+'</div></div>';
  if(isProtag){
    if(proto.current_goals){h+='<div class="detail-section"><div class="detail-label">Current Goals</div>';proto.current_goals.forEach(g=>{h+='<div class="detail-value" style="margin-bottom:4px">• '+esc(g)+'</div>';});h+='</div>';}
    if(proto.review_history){h+='<div class="detail-section"><div class="detail-label">Review History</div>';proto.review_history.forEach(r=>{h+='<div style="margin-bottom:8px"><strong>'+esc(r.cycle)+': '+esc(r.rating)+'</strong><div style="font-size:12px;color:var(--g500);margin-top:2px">'+esc(r.summary)+'</div></div>';});h+='</div>';}
  }
  h+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function switchHRTab(el,tab){
  hrTab=tab;
  el.parentElement.querySelectorAll('.env-tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('hr-content').innerHTML=hrTab==='directory'?renderHRDirectory():renderHROrgChart();
}
function setHRFilter(f){hrFilter=f;document.getElementById('hr-content').innerHTML=renderHRDirectory();}
function hrSearchChange(val){hrSearch=val;document.getElementById('hr-content').innerHTML=renderHRDirectory();}

// ============ INIT ============
function init(){renderToolNav();renderEnvironment();}

DATA=JSON.parse(document.getElementById('edata').textContent);
init();
</script>
<script>
(function(){
  var saved = localStorage.getItem('theme-enterprise');
  if (saved === 'dark') document.documentElement.classList.add('dark');
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.checked = document.documentElement.classList.contains('dark');
    btn.addEventListener('change', function(){
      document.documentElement.classList.toggle('dark');
      var isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme-enterprise', isDark ? 'dark' : 'light');
      this.checked = isDark;
    });
  });
})();
</script>
